<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGT Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;
--red:#ED1C24;--red2:#c41920;--red-glow:rgba(237,28,36,.12);
--white:#fff;--txt:#e5e5e5;--txt2:#999;--txt3:#666;
--border:#2a2a2a;--border2:#333;
--t1:#3b82f6;--t3:#a855f7;--t4:#06b6d4;--pack:#f59e0b;--prod:#22c55e;--adm:#6b7280;
--radius:10px;--radius-sm:6px;
--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;padding:24px}
.auth-wrap::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 0);background-size:24px 24px;pointer-events:none;z-index:1}

.auth-deco{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:hidden}
.auth-collage{position:absolute;animation:collageIn 1.2s cubic-bezier(.2,.8,.2,1) .2s both;filter:drop-shadow(0 20px 40px rgba(0,0,0,.5))}
@keyframes collageIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes floatSlow{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-10px) rotate(-4deg)}}
.auth-collage-mega{width:min(48vw,620px);height:auto;left:-4%;bottom:-6%;transform:rotate(-6deg);animation:collageIn 1.2s cubic-bezier(.2,.8,.2,1) .2s both,floatSlow 9s ease-in-out infinite 1.4s;opacity:.85}

.auth-box{position:relative;z-index:10;width:100%;max-width:420px;padding:40px 36px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;text-align:left;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 1px rgba(237,28,36,.08)}
.auth-box::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}

.auth-logo{margin-bottom:22px}
.auth-logo svg{width:78px;height:auto;display:block}

.auth-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.auth-eyebrow .line{color:var(--red);font-size:16px;font-weight:900;line-height:1}
.auth-eyebrow .mono{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--txt2)}

.auth-hero-title{font-family:var(--font);font-weight:800;font-size:36px;line-height:1;letter-spacing:-.03em;margin-bottom:12px;color:var(--white)}
.auth-hero-title .hl{background:var(--red);color:var(--white);padding:0 8px;display:inline-block}
.auth-hero-title .ast{color:var(--red);font-size:.9em}
.auth-hero-sub{color:var(--txt2);font-size:13px;line-height:1.5;margin-bottom:28px;max-width:340px}

.auth-field{margin-bottom:14px;text-align:left}
.auth-field label{font-family:var(--mono);font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;display:block;font-weight:500}
.auth-field input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--txt);font-size:14px;font-family:var(--font);outline:none;transition:.15s}
.auth-field input:focus{border-color:var(--red);background:var(--bg3)}
.auth-pass-wrap{position:relative}
.auth-pass-wrap input{padding-right:44px}
.auth-pass-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--txt3);cursor:pointer;border-radius:2px;transition:color .15s}
.auth-pass-toggle:hover{color:var(--red)}
.auth-pass-toggle:focus{outline:none;color:var(--red)}
.auth-btn{width:100%;padding:14px;background:var(--red);color:var(--white);border:none;border-radius:2px;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:10px;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.01em;text-transform:uppercase}
.auth-btn:hover{background:var(--red2)}
.auth-btn .arrow{transition:transform .2s}
.auth-btn:hover .arrow{transform:translateX(4px)}
.auth-err{color:var(--red);font-size:12px;margin-top:12px;display:none;font-family:var(--mono);padding:8px 12px;background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.3);border-radius:2px}

.auth-footer{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:16px;border-top:1px solid var(--border);font-size:10px;color:var(--txt3);font-family:var(--mono);letter-spacing:.05em}

@media(max-width:768px){
.auth-collage-mega{width:90vw;opacity:.5}
.auth-hero-title{font-size:28px}
}

/* LAYOUT */
.app{display:none;height:100vh}
.app.active{display:block}
.main{margin-left:240px;height:100vh;display:flex;flex-direction:column;width:calc(100% - 240px)}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .15s}
.sb-logo:hover{background:var(--bg3)}
.sb-logo-svg{width:56px;height:auto;display:block;transition:transform .2s}
.sb-logo:hover .sb-logo-svg{transform:scale(1.05)}
.sb-logo .hub-badge{font-size:10px;font-weight:700;background:var(--red);color:var(--white);padding:2px 8px;border-radius:3px;letter-spacing:1px}
.ver-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;background:linear-gradient(135deg,var(--red),#c0161d);color:#fff;padding:3px 9px;border-radius:12px;letter-spacing:.5px;font-family:var(--mono,monospace);box-shadow:0 2px 6px rgba(237,28,36,.35);text-transform:uppercase}
.ver-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;box-shadow:0 0 6px #fff;animation:verPulse 2s ease-in-out infinite}
@keyframes verPulse{0%,100%{opacity:1}50%{opacity:.3}}
.ver-badge-sidebar{margin-left:auto}
.ver-badge-topbar{}
@media(max-width:480px){.ver-badge{font-size:10px;padding:2px 7px}}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:16px 20px 6px;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--txt2);cursor:pointer;font-size:13px;transition:.15s;border-left:3px solid transparent}
.sb-item:hover{background:var(--bg3);color:var(--txt)}
.sb-item.active{color:var(--white);background:var(--red-glow);border-left-color:var(--red)}
.sb-item svg{width:16px;height:16px;flex-shrink:0}
.sb-item .sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--red);color:var(--white);padding:1px 6px;border-radius:10px}
.sb-sub{padding-left:28px}
.sb-sub .sb-item{font-size:12px;padding:8px 20px}
.sb-user{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-uinfo{flex:1;min-width:0}.sb-uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-urole{font-size:10px;color:var(--txt2)}
.sb-logout{background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px}
.sb-logout:hover{color:var(--red)}

.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.topbar-date{font-size:12px;color:var(--txt2);font-family:var(--mono)}
.menu-toggle{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg3);border:none;color:var(--txt);cursor:pointer}
.topbar-logo{display:none;width:32px;height:32px;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;padding:0;flex-shrink:0;transition:transform .15s}
.topbar-logo:hover{transform:scale(1.08)}
.topbar-logo svg{width:100%;height:auto}
.content{flex:1;overflow-y:auto;padding:24px}

/* PILLS */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pill{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:.15s;white-space:nowrap;font-family:var(--font)}
.pill:hover{border-color:var(--txt3);color:var(--txt)}
.pill.active{background:var(--red);border-color:var(--red);color:var(--white)}
.pill-dates{display:flex;gap:8px;align-items:center;margin-left:8px}
.pill-dates input{padding:5px 10px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:var(--mono)}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-sel{padding:7px 12px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:var(--font);min-width:120px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.cl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cv{font-size:28px;font-weight:800;line-height:1}
.cs{font-size:12px;color:var(--txt2);margin-top:6px}
.card-blue::before{background:var(--t1)}.card-purple::before{background:var(--t3)}.card-cyan::before{background:var(--t4)}.card-green::before{background:var(--prod)}.card-amber::before{background:var(--pack)}

/* TABLES */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.tbl-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-h h3{font-size:14px;font-weight:700}
.tbl-r{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.rt{text-align:right}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-r{background:var(--red);color:var(--white)}.btn-r:hover{background:var(--red2)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--txt)}.btn-o:hover{border-color:var(--txt3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px;display:flex;align-items:center}.btn-icon:hover{color:var(--red)}
.btn-del{color:var(--txt3)}.btn-del:hover{color:var(--red)}

/* BADGES */
.bg{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bg-t1{background:rgba(59,130,246,.15);color:var(--t1)}.bg-t3{background:rgba(168,85,247,.15);color:var(--t3)}
.bg-t4{background:rgba(6,182,212,.15);color:var(--t4)}.bg-pack{background:rgba(245,158,11,.15);color:var(--pack)}
.bg-prod{background:rgba(34,197,94,.15);color:var(--prod)}.bg-adm{background:rgba(107,114,128,.15);color:var(--adm)}
.bg-red{background:rgba(237,28,36,.15);color:var(--red)}.bg-green{background:rgba(34,197,94,.15);color:var(--prod)}
.bg-amber{background:rgba(245,158,11,.15);color:var(--pack)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column}
.modal-lg{max-width:800px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-b{padding:20px;overflow-y:auto;flex:1}
.modal-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* FORMS */
.f-field{margin-bottom:16px}
.f-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.f-input,.f-sel,.f-area{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-size:13px;font-family:var(--font);outline:none;transition:.2s}
.f-input:focus,.f-sel:focus,.f-area:focus{border-color:var(--red)}
.f-area{min-height:80px;resize:vertical}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* PROGRESS */
.pbar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.pbar-red{background:var(--red)}.pbar-green{background:var(--prod)}.pbar-amber{background:var(--pack)}.pbar-blue{background:var(--t1)}

/* TIMER */
.timer-display{font-size:60px;font-weight:800;font-family:var(--mono);text-align:center;margin:24px 0;letter-spacing:2px}
.timer-display.running{color:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.timer-btn{padding:12px 32px;border-radius:var(--radius);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);transition:.15s}
.timer-start{background:var(--red);color:var(--white)}.timer-start:hover{background:var(--red2)}
.timer-stop{background:var(--bg4);color:var(--txt)}.timer-stop:hover{background:var(--border2)}

/* SCORE */
.score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0}
.score-ring.good{background:rgba(34,197,94,.15);color:var(--prod);border:3px solid var(--prod)}
.score-ring.ok{background:rgba(245,158,11,.15);color:var(--pack);border:3px solid var(--pack)}
.score-ring.bad{background:rgba(237,28,36,.15);color:var(--red);border:3px solid var(--red)}
.score-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-bar label{font-size:12px;color:var(--txt2);width:80px;text-align:right;flex-shrink:0}
.score-bar .sbar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.score-bar .sbar-fill{height:100%;border-radius:3px}
.score-bar .sval{font-size:12px;font-weight:700;width:30px;text-align:right}

/* STATUS PILLS */
.st-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.st-draft{background:rgba(107,114,128,.15);color:var(--adm)}
.st-pending_leader_review{background:rgba(59,130,246,.15);color:var(--t1)}
.st-leader_reviewing{background:rgba(168,85,247,.15);color:var(--t3)}
.st-budget_sent{background:rgba(245,158,11,.15);color:var(--pack)}
.st-account_approved{background:rgba(34,197,94,.15);color:var(--prod)}
.st-account_rejected{background:rgba(237,28,36,.15);color:var(--red)}
.st-scheduling{background:rgba(6,182,212,.15);color:var(--t4)}
.st-scheduled{background:rgba(6,182,212,.25);color:var(--t4)}
.st-in_capture{background:rgba(237,28,36,.15);color:var(--red)}
.st-in_edit{background:rgba(168,85,247,.15);color:var(--t3)}
.st-in_review{background:rgba(245,158,11,.15);color:var(--pack)}
.st-delivered{background:rgba(34,197,94,.15);color:var(--prod)}
.st-cancelled{background:rgba(237,28,36,.08);color:var(--txt3);text-decoration:line-through}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--txt3)}

/* CHECKBOX GRID */
.chk-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chk-item{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;transition:.15s;user-select:none}
.chk-item:hover{border-color:var(--txt3)}
.chk-item.checked{background:var(--red-glow);border-color:var(--red);color:var(--white)}
.chk-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--red);cursor:pointer}
.empty svg{margin-bottom:12px}
.loading{text-align:center;padding:48px;color:var(--txt3)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;animation:fadeIn .3s}
.toast-item.success{border-left:3px solid var(--prod)}.toast-item.error{border-left:3px solid var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* INACTIVITY / CONFIRM MODAL (centro da tela, anti-fraude + confirmações) */
.imod-backdrop{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInFast .2s;backdrop-filter:blur(4px)}
.imod-card{background:var(--bg2);border:2px solid var(--red);border-radius:14px;padding:36px 32px;max-width:460px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.imod-icon{font-size:56px;margin-bottom:18px;line-height:1}
.imod-title{font-size:24px;font-weight:800;margin:0 0 14px;color:var(--txt);font-family:var(--font-cond,'Barlow Condensed',system-ui);letter-spacing:-.5px}
.imod-desc{font-size:15px;color:var(--txt2);line-height:1.5;margin:0 0 28px}
.imod-desc b{color:var(--txt);font-weight:700}
.imod-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.imod-btn{padding:12px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;min-width:140px;transition:transform .1s,opacity .15s;font-family:inherit}
.imod-btn:hover{transform:translateY(-1px)}
.imod-btn:active{transform:translateY(0)}
.imod-btn-keep,.imod-btn-ok{background:var(--red);color:#fff}
.imod-btn-keep:hover,.imod-btn-ok:hover{opacity:.9}
.imod-btn-stop,.imod-btn-cancel{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}
.imod-btn-stop:hover,.imod-btn-cancel:hover{background:var(--bg)}
@keyframes fadeInFast{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@media(max-width:480px){
  .imod-card{padding:26px 20px}
  .imod-title{font-size:20px}
  .imod-desc{font-size:14px}
  .imod-btn{min-width:unset;flex:1;padding:12px 16px;font-size:13px}
}

/* MOBILE */
@media(max-width:768px){
.sidebar{transform:translateX(-100%);width:260px}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0;width:100%}
.menu-toggle{display:flex}
.topbar-logo{display:flex}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.overlay.show{display:block}
.content{padding:16px}
.cards{grid-template-columns:1fr 1fr}
.f-row,.f-row3{grid-template-columns:1fr}
.timer-display{font-size:40px}
.pills{gap:4px}.pill{padding:5px 10px;font-size:11px}
.modal{max-width:100%;margin:8px}

/* Topbar fix */
.topbar{padding:12px 14px;gap:8px;flex-wrap:nowrap}
.topbar-title{font-size:15px;min-width:0;flex:1;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-title #pg-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-date{display:none}
.topbar > span[style*="font-size:9px"]{display:none!important}

/* Brand Guardian hero — stack timer below */
.bg-hero-wrap{grid-template-columns:1fr!important;gap:20px}
.bg-hero-title{font-size:clamp(56px,14vw,90px)!important;line-height:.95}
.bg-hero-sub{font-size:13px}
.bg-timer-widget{width:100%}
.bg-timer-clock{font-size:30px}
.bg-hero-collage{display:none}

/* Cards 1 per row */
.bg-cards{grid-template-columns:1fr!important;gap:12px;margin-bottom:32px}
.bg-card{min-height:auto;padding:20px 18px}
.bg-card-head{margin-bottom:18px}
.bg-card-icon{margin-bottom:16px}
.bg-card-icon svg{width:36px;height:36px}
.bg-card-title{font-size:18px}
.bg-card-desc{font-size:13px;padding-bottom:14px}

/* Lead Designer section header */
.bg-section-head{flex-wrap:wrap;gap:8px}
.bg-section-title{font-size:18px}
.bg-section-sub{margin-left:0;font-size:11px;width:100%}

/* Agent pages hero */
.ag-hero-collage{width:100px!important;top:-10px!important;opacity:.4!important}
.ag-hero h1{font-size:26px!important}

/* Back button spacing */
.bg-back{margin-bottom:18px;font-size:10px}

/* Tables scrollable */
.tbl-r{overflow-x:auto}
.tbl-r table{min-width:540px}
}
@media(max-width:480px){
.cards{grid-template-columns:1fr}
.topbar-title #pg-title{font-size:14px}
.bg-hero-title{font-size:clamp(48px,13vw,76px)!important}
.bg-timer-clock{font-size:26px}
.bg-card-title{font-size:17px}
}

/* ═══════════════════════════════════════════════
   BRAND GUARDIAN AGENTES
   ═══════════════════════════════════════════════ */
.ag-hero{margin-bottom:36px;animation:fadeIn .6s .1s both;position:relative;min-height:160px}
.ag-hero > *:not(.ag-hero-collage){position:relative;z-index:2}
.ag-hero-collage{position:absolute;top:-30px;right:0;width:200px;height:auto;opacity:.85;pointer-events:none;z-index:1;filter:drop-shadow(0 12px 28px rgba(0,0,0,.5));animation:collageIn 1.2s cubic-bezier(.2,.8,.2,1) .3s both}
.ag-hero-briefing .ag-hero-collage{transform:rotate(6deg)}
.ag-hero-arte .ag-hero-collage{transform:rotate(-8deg)}

@media(max-width:900px){
.ag-hero-collage{width:120px;opacity:.45}
}

.ag-hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ag-hero-meta .line{color:var(--red);font-size:18px;font-weight:900;line-height:1}
.ag-hero-meta .mono{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2)}
.ag-hero h1{font-family:var(--font);font-weight:800;font-size:clamp(28px,4vw,44px);line-height:1;letter-spacing:-.03em;margin-bottom:14px;color:var(--white)}
.ag-hero h1 .hl{background:var(--red);color:var(--white);padding:0 10px;display:inline-block}
.ag-hero h1 .ast{color:var(--red);font-size:.9em;margin-left:.05em}
.ag-hero p{color:var(--txt2);font-size:15px;max-width:620px;line-height:1.55}
.ag-field{margin-bottom:22px}
.ag-label{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em}
.ag-label .req{font-size:10px;color:var(--red);font-weight:600;letter-spacing:.08em}
.ag-label .opt{font-size:10px;color:var(--txt3);font-weight:500;letter-spacing:.08em}
.ag-label .cnt{font-size:10px;color:var(--txt3);font-family:var(--mono);letter-spacing:.05em}
.ag-sel,.ag-input,.ag-textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--txt);font-family:var(--font);font-size:14px;transition:border-color .15s}
.ag-sel:focus,.ag-input:focus,.ag-textarea:focus{outline:none;border-color:var(--red)}
.ag-textarea{resize:vertical;min-height:200px;font-family:var(--mono);font-size:13px;line-height:1.5}
.ag-warn{font-size:12px;color:var(--pack);margin-top:6px;min-height:16px}
.ag-warn-err{color:var(--red)}
.ag-tabs{display:flex;gap:2px;background:var(--bg2);padding:4px;border-radius:var(--radius-sm);margin-bottom:10px;border:1px solid var(--border)}
.ag-tab{flex:1;padding:8px 14px;background:transparent;border:none;color:var(--txt2);font-size:13px;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,color .15s}
.ag-tab:hover{color:var(--txt)}
.ag-tab-active{background:var(--bg3);color:var(--white);font-weight:600}
.ag-dropzone{border:2px dashed var(--border2);border-radius:var(--radius);padding:32px 24px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.ag-dropzone:hover{border-color:var(--red);background:var(--red-glow)}
.ag-dropzone.drag{border-color:var(--red);background:var(--red-glow)}
.ag-dropzone.disabled{opacity:.5;cursor:not-allowed}
.ag-dz-icon{color:var(--txt3);margin-bottom:10px}
.ag-dz-title{color:var(--txt);font-size:14px;font-weight:500;margin-bottom:4px}
.ag-dz-title .link{color:var(--red);text-decoration:underline}
.ag-dz-sub{color:var(--txt3);font-size:11px;font-family:var(--mono)}
.ag-file-prev{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-top:10px}
.ag-file-prev-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
.ag-file-prev-name{font-size:13px;font-weight:500;color:var(--txt)}
.ag-file-prev details{margin-top:10px}
.ag-file-prev summary{cursor:pointer;font-size:11px;color:var(--txt2);font-family:var(--mono)}
.ag-file-prev pre{margin-top:8px;max-height:200px;overflow:auto;background:var(--bg);padding:10px;border-radius:var(--radius-sm);font-size:11px;color:var(--txt2);white-space:pre-wrap;word-wrap:break-word}
.ag-actions{display:flex;gap:10px;align-items:center;margin-top:20px}
.ag-hint{font-size:12px;color:var(--txt3);margin-top:8px}
.ag-hint-err{color:var(--red)}
.ag-loading{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center;margin-top:20px}
.ag-loader-dots{display:inline-flex;gap:4px;margin-bottom:12px}
.ag-loader-dots span{width:8px;height:8px;border-radius:50%;background:var(--red);animation:ag-pulse 1.4s infinite}
.ag-loader-dots span:nth-child(2){animation-delay:.2s}
.ag-loader-dots span:nth-child(3){animation-delay:.4s}
@keyframes ag-pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
.ag-loader-txt{color:var(--txt);font-size:14px;font-weight:500}
.ag-loader-sub{color:var(--txt3);font-size:11px;font-family:var(--mono);margin-top:4px}
.ag-result{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:24px}
.ag-result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.ag-result-head .lbl{font-size:11px;color:var(--txt3);font-family:var(--mono);text-transform:uppercase}
.ag-res-sum{margin-bottom:20px}
.ag-res-sum-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.ag-res-sum-lbl{font-size:11px;color:var(--txt3);font-family:var(--mono);text-transform:uppercase}
.ag-res-sum-txt{color:var(--txt);font-size:14px;line-height:1.5}
.ag-tipo-badge{display:inline-block;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:11px;color:var(--red);font-family:var(--mono);text-transform:uppercase}
.ag-score{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:14px;background:var(--bg3);border-radius:var(--radius-sm)}
.ag-score-lbl{font-size:11px;color:var(--txt3);font-family:var(--mono);text-transform:uppercase;min-width:90px}
.ag-score-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.ag-score-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--prod));transition:width .8s ease}
.ag-score-val{font-size:14px;font-weight:700;color:var(--txt);font-family:var(--mono);min-width:50px;text-align:right}
.ag-checklist{list-style:none;padding:0;margin:0 0 20px}
.ag-checklist-item{display:flex;gap:12px;padding:12px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:6px;border-left:3px solid transparent}
.ag-checklist-item.ok{border-left-color:var(--prod)}
.ag-checklist-item.partial{border-left-color:var(--pack)}
.ag-checklist-item.missing{border-left-color:var(--red)}
.ag-check-icon{font-size:16px;flex-shrink:0}
.ag-check-field{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px}
.ag-check-value{font-size:12px;color:var(--txt);margin-bottom:4px;font-style:italic}
.ag-check-note{font-size:11px;color:var(--txt2);line-height:1.4}
.ag-res-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.ag-res-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.ag-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ag-dot-red{background:var(--red)}
.ag-dot-yellow{background:var(--pack)}
.ag-dot-green{background:var(--prod)}
.ag-dot-white{background:var(--txt)}
.ag-gap-list,.ag-incons-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.ag-gap-item,.ag-incons-item{padding:12px;background:var(--bg3);border-radius:var(--radius-sm)}
.ag-gap-field{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px;text-transform:uppercase}
.ag-gap-sug{font-size:13px;color:var(--txt);line-height:1.5}
.ag-incons-desc{font-size:13px;color:var(--txt);line-height:1.5;margin-bottom:6px}
.ag-incons-fix{font-size:12px;color:var(--txt2);line-height:1.4}
.ag-incons-fix .lbl{color:var(--pack);font-weight:600;text-transform:uppercase;font-size:10px}
.ag-next{font-size:14px;color:var(--txt);line-height:1.6;padding:12px 14px;background:var(--bg3);border-radius:var(--radius-sm)}
.ag-res-err{padding:16px;background:rgba(237,28,36,.1);border:1px solid rgba(237,28,36,.3);border-radius:var(--radius-sm);color:var(--red);font-size:13px}
.ag-res-err strong{display:block;margin-bottom:6px;font-size:14px}
.ag-onepager-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;background:var(--red);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.ag-onepager-btn:hover{background:var(--red2)}
/* Arte agent */
.ag-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
.ag-thumb{position:relative;aspect-ratio:1;background:var(--bg3);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.ag-thumb img{width:100%;height:100%;object-fit:cover}
.ag-thumb-remove{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ag-thumb-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);color:#fff;font-size:10px;padding:6px 8px 4px;font-family:var(--mono)}
.ag-thumb.processing{animation:ag-proc 1.5s infinite}
.ag-thumb.done{border-color:var(--prod)}
.ag-thumb.error{border-color:var(--red)}
@keyframes ag-proc{0%,100%{opacity:1}50%{opacity:.5}}
.ag-progress{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:12px;max-width:300px;margin-left:auto;margin-right:auto}
.ag-progress-fill{height:100%;background:var(--red);transition:width .3s}
.ag-arte-sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.ag-arte-sum-cell{text-align:center;padding:14px;background:var(--bg3);border-radius:var(--radius-sm)}
.ag-arte-sum-val{font-size:28px;font-weight:800;font-family:var(--mono)}
.ag-arte-sum-val.ok{color:var(--prod)}
.ag-arte-sum-val.warn{color:var(--pack)}
.ag-arte-sum-val.rep{color:var(--red)}
.ag-arte-sum-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;font-family:var(--mono);margin-top:4px}
.ag-arte-cards{display:flex;flex-direction:column;gap:14px}
.ag-arte-card{display:grid;grid-template-columns:180px 1fr;gap:14px;background:var(--bg3);border-radius:var(--radius-sm);overflow:hidden;border-left:3px solid transparent}
.ag-arte-card.approved{border-left-color:var(--prod)}
.ag-arte-card.warn{border-left-color:var(--pack)}
.ag-arte-card.reproved{border-left-color:var(--red)}
.ag-arte-card.error{border-left-color:var(--red)}
.ag-arte-card-img{aspect-ratio:1;background:var(--bg)}
.ag-arte-card-img img{width:100%;height:100%;object-fit:contain}
.ag-arte-card-body{padding:14px 14px 14px 0}
.ag-arte-status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ag-arte-status.approved{background:rgba(34,197,94,.15);color:var(--prod)}
.ag-arte-status.warn{background:rgba(245,158,11,.15);color:var(--pack)}
.ag-arte-status.reproved{background:rgba(237,28,36,.15);color:var(--red)}
.ag-arte-status.error{background:rgba(237,28,36,.15);color:var(--red)}
.ag-arte-status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.ag-arte-card-name{display:block;font-size:12px;color:var(--txt3);font-family:var(--mono);margin-bottom:8px}
.ag-arte-just{font-size:13px;color:var(--txt);line-height:1.5;margin-bottom:10px}
.ag-arte-crit{display:flex;flex-wrap:wrap;gap:4px}
.ag-arte-crit-item{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.ag-arte-crit-item.ok{background:rgba(34,197,94,.15);color:var(--prod)}
.ag-arte-crit-item.fail{background:rgba(237,28,36,.15);color:var(--red)}
/* ═══════════════════════════════════════════════
   BRAND GUARDIAN DASHBOARD UNIFICADO
   ═══════════════════════════════════════════════ */
.bg-hero-wrap{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;margin-bottom:40px;position:relative}
.bg-hero-wrap .bg-hero{margin-bottom:0;position:relative;z-index:2}

/* Hero collage */
.bg-hero-collage{position:absolute;top:-30px;right:calc(340px + 40px);width:220px;height:auto;opacity:.18;pointer-events:none;z-index:0;transform:rotate(-8deg);animation:collageIn 1.2s cubic-bezier(.2,.8,.2,1) .3s both}
@media(max-width:1100px){.bg-hero-collage{display:none}}
.bg-hero{margin-bottom:40px;animation:fadeIn .6s .1s both;min-width:0;text-align:left}
.bg-hero-title{text-align:left!important}
.bg-hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.bg-meta-line{color:var(--red);font-size:18px;font-weight:900;line-height:1}
.bg-meta-mono{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2)}
.bg-hero-title{font-family:var(--font);font-weight:800;font-size:clamp(64px,10vw,130px);line-height:.9;letter-spacing:-.035em;margin-bottom:20px;color:var(--white);text-align:left;white-space:normal}
.bg-hero-title br{display:block;content:""}
.bg-hero-title .bg-hl{background:var(--red);color:var(--white);padding:0 14px;display:inline-block;line-height:1}
.bg-hero-title .bg-ast{color:var(--red);font-size:.85em;display:inline-block;margin-left:.02em}
.bg-hero-sub{color:var(--txt2);font-size:15px;max-width:620px;line-height:1.55}

/* TIMER WIDGET */
.bg-timer-widget{width:340px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;animation:fadeIn .6s .2s both}
.bg-timer-widget::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--border2);transition:background .3s}
.bg-timer-widget.is-running::before{background:var(--red)}
.bg-timer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em}
.bg-timer-eyebrow{display:inline-flex;align-items:center;gap:6px;color:var(--txt2)}
.bg-timer-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--txt3)}
.bg-timer-eyebrow .dot.on{background:var(--red);box-shadow:0 0 0 3px rgba(237,28,36,.2);animation:pulse 2s infinite}
.bg-timer-today{color:var(--txt3)}
.bg-timer-today b{color:var(--white);font-weight:600}
.bg-timer-clock{font-family:var(--mono);font-weight:700;font-size:36px;letter-spacing:1px;color:var(--white);margin-bottom:10px;line-height:1;font-variant-numeric:tabular-nums}
.bg-timer-widget.is-running .bg-timer-clock{color:var(--red)}
.bg-timer-desc{color:var(--txt);font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bg-timer-meta{color:var(--txt3);font-size:11px;font-family:var(--mono);margin-bottom:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bg-timer-coworkers{display:flex;align-items:center;gap:10px;margin:0 0 14px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);border-left:2px solid var(--red)}
.bg-timer-avatars{display:flex;gap:-4px}
.bg-timer-avatar{width:24px;height:24px;border-radius:50%;background:var(--red);color:var(--white);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bg2);margin-left:-6px;flex-shrink:0}
.bg-timer-avatar:first-child{margin-left:0}
.bg-timer-avatar-more{background:var(--bg);color:var(--txt2);font-size:9px}
.bg-timer-coworkers-label{font-size:11px;color:var(--txt2);line-height:1.3}
.bg-timer-actions{display:flex;gap:8px}
.bg-timer-btn{flex:1;padding:8px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--txt);font-family:var(--font);text-transform:lowercase;letter-spacing:.02em;transition:.15s}
.bg-timer-btn:hover{border-color:var(--border2);color:var(--white)}
.bg-timer-btn-start{background:var(--red);color:var(--white);border-color:var(--red)}
.bg-timer-btn-start:hover{background:var(--red2);border-color:var(--red2);color:var(--white)}
.bg-timer-btn-stop{background:var(--bg);color:var(--red);border-color:var(--red)}
.bg-timer-btn-stop:hover{background:var(--red);color:var(--white)}
.bg-timer-btn-ghost{background:transparent;border-color:var(--border)}

@media(max-width:900px){
.bg-hero-wrap{grid-template-columns:1fr;gap:20px}
.bg-timer-widget{width:100%}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardRise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.bg-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:56px}
.bg-card{position:relative;padding:28px 24px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:transform .25s,border-color .2s,background .2s;display:flex;flex-direction:column;min-height:280px;overflow:hidden;animation:cardRise .6s both}
.bg-card:nth-child(1){animation-delay:.15s}
.bg-card:nth-child(2){animation-delay:.25s}
.bg-card::before{content:"";position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--red);transform:scaleY(0);transform-origin:top;transition:transform .3s}
.bg-card:hover{transform:translateY(-4px);border-color:var(--border2);background:var(--bg3)}
.bg-card:hover::before{transform:scaleY(1)}
.bg-card:hover .bg-card-arrow{color:var(--red);transform:translateX(4px)}
.bg-card:hover .bg-card-icon{color:var(--red)}
.bg-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.bg-card-num{color:var(--txt2)}
.bg-card-status{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;background:rgba(237,28,36,.1);color:var(--red);border:1px solid rgba(237,28,36,.3)}
.bg-card-icon{color:var(--white);margin-bottom:22px;transition:color .25s;display:flex;align-items:center}
.bg-card-title{font-family:var(--font);font-weight:800;font-size:22px;letter-spacing:-.02em;margin-bottom:8px;line-height:1.15;color:var(--white)}
.bg-card-desc{color:var(--txt2);font-size:13px;line-height:1.55;margin-bottom:auto;padding-bottom:18px}
.bg-card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em}
.bg-card-tag{color:var(--txt3)}
.bg-card-arrow{color:var(--txt2);font-size:20px;transition:color .25s,transform .25s}
.bg-card-soon{cursor:not-allowed;opacity:.5}
.bg-card-soon:hover{transform:none;border-color:var(--border);background:var(--bg2)}
.bg-card-soon:hover::before{transform:scaleY(0)}
.bg-card-status-soon{background:var(--bg3);color:var(--txt3);border:1px solid var(--border)}
.bg-card-icon-muted{color:var(--txt3)}
.bg-card-title-muted{color:var(--txt2)}
.bg-card-desc-muted{color:var(--txt3)}

.bg-section-head{display:flex;align-items:center;gap:14px;margin:0 0 20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.bg-section-meta{font-family:var(--mono);font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.bg-section-title{font-family:var(--font);font-weight:800;font-size:24px;letter-spacing:-.02em;color:var(--white)}
.bg-section-sub{color:var(--txt2);font-size:13px;margin-left:auto;font-family:var(--mono)}

/* Back link inside agent pages */
.bg-back{display:inline-flex;align-items:center;gap:8px;color:var(--txt2);font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;margin-bottom:28px;cursor:pointer;border:none;padding:0;background:none;transition:color .2s;font-weight:500}
.bg-back::before{content:"←";color:var(--red);font-size:14px;transition:transform .2s}
.bg-back:hover{color:var(--white)}
.bg-back:hover::before{transform:translateX(-3px)}

/* Brand Guardian shortcuts on Home */
.home-ag-card{display:grid;grid-template-columns:auto auto 1fr auto;align-items:center;gap:14px;padding:16px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,border-color .2s,background .2s}
.home-ag-card::before{content:"";position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--red);transform:scaleY(0);transform-origin:top;transition:transform .3s}
.home-ag-card:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--bg3)}
.home-ag-card:hover::before{transform:scaleY(1)}
.home-ag-card:hover .home-ag-arrow{color:var(--red);transform:translateX(3px)}
.home-ag-card:hover .home-ag-icon{color:var(--red)}
.home-ag-num{font-family:var(--mono);font-size:11px;color:var(--txt3);letter-spacing:.1em;font-weight:600}
.home-ag-icon{color:var(--white);transition:color .2s;display:flex;align-items:center}
.home-ag-body{min-width:0}
.home-ag-title{font-family:var(--font);font-weight:700;font-size:14px;color:var(--white);margin-bottom:2px;letter-spacing:-.01em}
.home-ag-desc{font-size:12px;color:var(--txt2);line-height:1.3}
.home-ag-arrow{color:var(--txt2);font-size:18px;transition:color .2s,transform .2s}

// Helper: clientes visíveis pro usuário (account/prod_leader filtra por time)
function visibleClientIds(){
  if(isA()) return null; // null = todos
  if(isAcc()||isPL()){
    const myTeam=S.user.team;
    return S.clients.filter(c=>c.team===myTeam).map(c=>c.id);
  }
  return []; // user comum/client não tem escopo de time
}
function canSeeClient(clientId){
  const ids=visibleClientIds();
  return ids===null||ids.includes(clientId);
}

function getDateRange(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  const day=s=>s.toISOString().substring(0,10);
  const dow=now.getDay(),mon=new Date(now);mon.setDate(d-(dow===0?6:dow-1));
  const ranges={
    today:[day(now),day(now)],
    yesterday:[day(new Date(y,m,d-1)),day(new Date(y,m,d-1))],
    this_week:[day(mon),day(now)],
    last_week:[day(new Date(mon.getTime()-7*864e5)),day(new Date(mon.getTime()-864e5))],
    this_month:[`${y}-${String(m+1).padStart(2,'0')}-01`,day(now)],
    last_month:[`${y}-${String(m).padStart(2,'0')||12}-01`,`${y}-${String(m+1).padStart(2,'0')}-00`].map((v,i)=>{if(i===0){const mm=m===0?12:m;const yy=m===0?y-1:y;return `${yy}-${String(mm).padStart(2,'0')}-01`}const ld=new Date(y,m,0);return day(ld)}),
    this_year:[`${y}-01-01`,day(now)],
    custom:[customFrom||day(now),customTo||day(now)]
  };
  return ranges[dateRange]||ranges.this_month;
}

async function sbGet(table,params=''){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{headers:HDR_R});
  if(!r.ok)throw new Error(`GET ${table}: ${r.status}`);return r.json();
}
async function sbPost(table,data){
  const r=await fetch(`${SB_URL}/${table}`,{method:'POST',headers:HDR,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(`POST ${table}: ${r.status}`);return r.json();
}
async function sbPatch(table,params,data){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{method:'PATCH',headers:HDR,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(`PATCH ${table}: ${r.status}`);return r.json();
}
async function sbDel(table,params){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{method:'DELETE',headers:{...HDR_R,'Prefer':'return=representation'}});
  if(!r.ok)throw new Error(`DEL ${table}: ${r.status}`);return r.json();
}
async function sbUpsert(table,data,onConflict='account_id,month'){
  const url=`${SB_URL}/${table}${onConflict?'?on_conflict='+onConflict:''}`;
  const r=await fetch(url,{method:'POST',headers:{...HDR,'Prefer':'return=representation,resolution=merge-duplicates'},body:JSON.stringify(data)});
  if(!r.ok){const t=await r.text();throw new Error(`UPSERT ${table}: ${r.status} ${t}`)}return r.json();
}

function openM(id){$(id).classList.add('open');
  // Prevent event bubbling on modal inputs (fixes artifact viewer issue)
  setTimeout(()=>{$(id).querySelectorAll('input,textarea,select').forEach(el=>{el.addEventListener('keydown',e=>e.stopPropagation());el.addEventListener('keyup',e=>e.stopPropagation());el.addEventListener('keypress',e=>e.stopPropagation())})},50);
}
function closeM(id){$(id).classList.remove('open')}
function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast-item ${type}`;el.innerHTML=`${type==='success'?'✓':'✕'} ${msg}`;$('toast').appendChild(el);setTimeout(()=>el.remove(),3500)}

async function doLogin(){
  // Normalize inputs — trim, lowercase email, strip zero-width chars
  const emailRaw=$('a-email').value||'';
  const passRaw=$('a-pass').value||'';
  const email=emailRaw.trim().toLowerCase().replace(/[\u200B-\u200D\uFEFF]/g,'');
  const pass=passRaw.replace(/[\u200B-\u200D\uFEFF]/g,'');
  if(!email||!pass){showErr('Preencha todos os campos');return}
  try{
    const emailField=email.includes('@')?'email':'name';
    const members=await sbGet('tt_members',`${emailField}=ilike.${encodeURIComponent(email)}&is_active=eq.true`);
    if(!members.length){showErr(`Usuário "${email}" não encontrado`);return}
    const u=members[0];
    if(u.login_password!==pass){
      // Debug info to help diagnose mobile issues
      const hint=pass.length!==passRaw.length?' (espaços removidos)':'';
      showErr(`Senha incorreta · ${pass.length} caracteres digitados${hint}`);
      return;
    }
    S.user=u;
    localStorage.setItem('tgt_hub_user',JSON.stringify(u));
    await initApp();
  }catch(e){showErr('Erro de conexão: '+e.message)}
}
function showErr(msg){const el=$('a-err');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}

function togglePass(){
  const input=$('a-pass'),show=$('eye-show'),hide=$('eye-hide');
  if(input.type==='password'){input.type='text';show.style.display='none';hide.style.display='block'}
  else{input.type='password';show.style.display='block';hide.style.display='none'}
}

async function doLogout(){
  S.user=null;localStorage.removeItem('tgt_hub_user');
  $('app').style.display='none';$('auth-screen').style.display='flex';
}

async function initApp(){
  $('auth-screen').style.display='none';$('app').style.display='block';
  // Injeta versão nos badges de topo
  const vLabel='v'+HUB_VERSION;
  const vSb=$('ver-badge-sb');if(vSb)vSb.textContent=vLabel;
  const vTb=$('ver-badge-tb');if(vTb)vTb.textContent=vLabel;
  $('u-name').textContent=S.user.name.split(' ')[0];
  $('u-role').textContent=S.user.job_title||S.user.access_level;
  $('u-av').textContent=S.user.name.charAt(0);
  $('cur-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  buildNav();
  await loadData();
  // Landing page por role
  if(isCli()) nav('d-client-view');
  else nav('qc'); // Todos os demais caem no Brand Guardian (pode ir pro Timer pela UI)
  if(!isCli()) startTick();
  // Check running timer
  if(!isCli()){
    const re=S.entries.find(e=>e.is_running&&e.member_id===S.user.id);
    if(re){running=true;timerStart=new Date(re.started_at);activeEntryId=re.id;startActivityTracking()}
  }
}

async function loadData(){
  try{
    const [members,clients,cats]=await Promise.all([
      sbGet('tt_members','is_active=eq.true&order=team,name'),
      sbGet('tt_clients','is_active=eq.true&order=team,name'),
      sbGet('categories','order=name')
    ]);
    S.members=members;S.clients=clients;S.categories=cats;
    // Load entries for date range
    await loadEntries();
    // Equipment
    try{S.equipment=await sbGet('equipment','order=name')}catch(e){S.equipment=[]}
    // AV Requests
    try{S.av_requests=await sbGet('av_requests','order=created_at.desc')}catch(e){S.av_requests=[]}
    try{S.av_budgets=await sbGet('av_budgets','order=created_at.desc')}catch(e){S.av_budgets=[]}
    // Score ADM
    try{S.scores=await sbGet('score_adm','order=month.desc,account_id')}catch(e){S.scores=[]}
    // Commission rules
    try{S.commission_rules=await sbGet('commission_rules','order=prod_type')}catch(e){S.commission_rules=[]}
    try{S.cost_defaults=await sbGet('cost_defaults','order=cost_type')}catch(e){S.cost_defaults=[]}
    try{S.qc_requests=await sbGet('qc_requests','order=submitted_at.desc')}catch(e){S.qc_requests=[]}
  }catch(e){console.error('loadData:',e);toast('Erro ao carregar dados','error')}
}

async function loadEntries(){
  const [from,to]=getDateRange();
  let params=`started_at=gte.${from}T00:00:00&started_at=lte.${to}T23:59:59&order=started_at.desc`;
  
  if(isCli()){
    // Client sees entries for their company only
    if(S.user.client_id) params=`client_id=eq.${S.user.client_id}&${params}`;
    else{S.entries=[];return}
  }else if(isA()||isPL()){
    // Admin and Prod Leader see all
  }else if(isAcc()){
    // Account sees own entries + entries from their team members
    // For now load all, filter client-side after loading account associations
  }else{
    // User sees only own
    params=`member_id=eq.${S.user.id}&${params}`;
  }
  
  S.entries=await sbGet('tt_time_entries',params);
  
  // Also always load running entries (except for clients)
  if(!isCli()){
    try{
      const runningEntries=await sbGet('tt_time_entries','is_running=eq.true');
      runningEntries.forEach(r=>{if(!S.entries.find(e=>e.id===r.id))S.entries.push(r)});
    }catch(e){}
  }
}

function buildNav(){
  const n=$('sb-nav');
  let h='';
  const role=S.user.access_level;
  
  // CLIENT: minimal nav
  if(isCli()){
    h+=`<div class="sb-section">Minha Conta</div>`;
    h+=`<div class="sb-item" data-p="d-client-view" onclick="nav('d-client-view')">${ICONS.dash} Dashboard</div>`;
    h+=`<div class="sb-item" data-p="p-my-prods" onclick="nav('p-my-prods')">${ICONS.prod} Minhas Produções</div>`;
    n.innerHTML=h;return;
  }
  
  // TIMER section — everyone except client
  h+=`<div class="sb-section">Tempo</div>`;
  h+=`<div class="sb-item" data-p="timer" onclick="nav('timer')">${ICONS.timer} Timer</div>`;
  h+=`<div class="sb-item" data-p="entries" onclick="nav('entries')">${ICONS.entries} Lançamentos</div>`;
  
  // DASHBOARD section
  h+=`<div class="sb-section">Dashboard</div>`;
  h+=`<div class="sb-item" data-p="d-my" onclick="nav('d-my')">${ICONS.dash} Meu Painel</div>`;
  if(isA()){
    const runningNow=S.entries.filter(e=>e.is_running).length;
    h+=`<div class="sb-item" data-p="d-adm" onclick="nav('d-adm')">${ICONS.dash} Painel ADM${runningNow?` <span class="sb-badge">${runningNow}</span>`:''}</div>`;
  }
  if(isA()||isAcc()||isPL()){
    h+=`<div class="sb-item" data-p="d-client" onclick="nav('d-client')">${ICONS.clients} Por Cliente</div>`;
    h+=`<div class="sb-item" data-p="d-team" onclick="nav('d-team')">${ICONS.members} Por Time</div>`;
    h+=`<div class="sb-item" data-p="d-person" onclick="nav('d-person')">${ICONS.members} Por Pessoa</div>`;
  }
  if(isA()){
    h+=`<div class="sb-item" data-p="d-finance" onclick="nav('d-finance')">${ICONS.money} Financeiro</div>`;
  }
  if(isA()||isAcc()){
    const autoCount=S.entries.filter(e=>e.auto_closed).length;
    h+=`<div class="sb-item" data-p="d-audit" onclick="nav('d-audit')">${ICONS.members} Auditoria${autoCount?` <span class="sb-badge">${autoCount}</span>`:''}</div>`;
  }
  
  // PROD section — admin, account, prod_leader
  if(canSeeProdAV()){
    h+=`<div class="sb-section">Produção AV</div>`;
    // Badge: cada role vê o que precisa agir
    // Admin → aprovar orçamentos (budget_sent)
    // prod_leader → analisar solicitações novas e configurar aprovadas
    // account → ver suas solicitações rejeitadas (precisa ajustar)
    let pendingCount=0;
    if(isA()){
      pendingCount=S.av_requests.filter(r=>r.status==='budget_sent').length;
    }else if(isPL()){
      pendingCount=S.av_requests.filter(r=>['pending_leader_review','leader_reviewing','account_approved'].includes(r.status)).length;
    }else if(isAcc()){
      const myClientIds=S.clients.filter(c=>c.team===S.user.team).map(c=>c.id);
      pendingCount=S.av_requests.filter(r=>r.status==='account_rejected'&&(myClientIds.includes(r.client_id)||r.requested_by===S.user.id)).length;
    }
    const badgeHtml=pendingCount?`<span class="sb-badge">${pendingCount}</span>`:'';
    h+=`<div class="sb-item" data-p="p-requests" onclick="nav('p-requests')">${ICONS.prod} Solicitações ${badgeHtml}</div>`;
    if(canManageProdAV()){
      h+=`<div class="sb-item" data-p="p-calendar" onclick="nav('p-calendar')">${ICONS.cal} Calendário</div>`;
      h+=`<div class="sb-item" data-p="p-equip" onclick="nav('p-equip')">${ICONS.box} Equipamentos</div>`;
      h+=`<div class="sb-item" data-p="p-config" onclick="nav('p-config')">${ICONS.gear} Config Prod</div>`;
    }
  }
  
  // EXTRAS section — accounts + admin
  if(isA()||isAcc()){
    h+=`<div class="sb-section">Extras & Comissões</div>`;
    h+=`<div class="sb-item" data-p="extras" onclick="nav('extras')">${ICONS.money} Lançar Extra</div>`;
    h+=`<div class="sb-item" data-p="extras-hist" onclick="nav('extras-hist')">${ICONS.entries} Meus Extras</div>`;
  }
  
  // BRAND GUARDIAN — todos exceto cliente
  if(canUseBG()){
    const qcPending=canReviewBG()?S.qc_requests.filter(r=>r.qc_status==='pending').length:0;
    const qcBadge=qcPending?` <span class="sb-badge">${qcPending}</span>`:'';
    h+=`<div class="sb-section">Brand Guardian</div>`;
    h+=`<div class="sb-item" data-p="qc" onclick="nav('qc')">${ICONS.qc} Brand Guardian${qcBadge}</div>`;
  }
  
  // SCORE ADM — admin only
  if(isA()){
    h+=`<div class="sb-section">Gestão</div>`;
    h+=`<div class="sb-item" data-p="score" onclick="nav('score')">${ICONS.score} Score ADM</div>`;
  }
  
  // CADASTROS — admin only
  if(isA()){
    h+=`<div class="sb-section">Cadastros</div>`;
    h+=`<div class="sb-item" data-p="members" onclick="nav('members')">${ICONS.members} Membros</div>`;
    h+=`<div class="sb-item" data-p="clients" onclick="nav('clients')">${ICONS.clients} Clientes</div>`;
  }
  n.innerHTML=h;
}

// TIMER ANTI-FRAUDE + 1-POR-PESSOA
// ═══════════════════════════════════════════════
let lastActivityLocal=Date.now();
let activityInterval=null;
let autoStopTimeout=null;
let warningModalOpen=false;
const ACTIVITY_EVENTS=['mousemove','mousedown','keydown','scroll','touchstart'];
const INACTIVITY_WARN_MS=15*60*1000;   // 15 min sem atividade → mostra aviso
const WARN_RESPONSE_MS=2*60*1000;       // 2 min pra responder → senão fecha
const MAX_ENTRY_MS=4*60*60*1000;        // 4h — teto absoluto por entry (anti-esquecimento/fraude)

function onUserActivity(){
  lastActivityLocal=Date.now();
  // Se aviso tava aberto, fecha (usuário voltou)
  if(warningModalOpen){
    closeInactivityWarning();
    // Ping server
    if(activeEntryId){
      sbPatch('tt_time_entries',`id=eq.${activeEntryId}`,{last_activity_at:new Date().toISOString()}).catch(()=>{});
    }
  }
}

function startActivityTracking(){
  stopActivityTracking();
  lastActivityLocal=Date.now();
  ACTIVITY_EVENTS.forEach(ev=>window.addEventListener(ev,onUserActivity,{passive:true}));
  // Check every 60s if inactivity crossed threshold
  activityInterval=setInterval(checkInactivity,60*1000);
}

function stopActivityTracking(){
  if(activityInterval){clearInterval(activityInterval);activityInterval=null}
  if(autoStopTimeout){clearTimeout(autoStopTimeout);autoStopTimeout=null}
  ACTIVITY_EVENTS.forEach(ev=>window.removeEventListener(ev,onUserActivity));
  closeInactivityWarning();
}

function checkInactivity(){
  if(!running||!activeEntryId)return;
  // Teto absoluto: se entry passou de MAX_ENTRY_MS, fecha sem aviso
  const entry=S.entries.find(e=>e.id===activeEntryId);
  if(entry&&entry.started_at){
    const entryAgeMs=Date.now()-new Date(entry.started_at).getTime();
    if(entryAgeMs>=MAX_ENTRY_MS){
      autoCloseTimer('max_duration_4h');
      return;
    }
  }
  const idleMs=Date.now()-lastActivityLocal;
  if(idleMs>=INACTIVITY_WARN_MS&&!warningModalOpen){
    showInactivityWarning();
  }
}

function showInactivityWarning(){
  warningModalOpen=true;
  const el=document.createElement('div');
  el.id='inactivity-modal';
  el.className='imod-backdrop';
  el.innerHTML=`
    <div class="imod-card">
      <div class="imod-icon">⏱</div>
      <h2 class="imod-title">Ainda está trabalhando?</h2>
      <p class="imod-desc">Seu timer está rodando há mais de 15 min sem atividade no computador.<br><br>Se você não responder em <b>2 minutos</b>, o timer vai parar automaticamente e <b>só será contado o tempo até a última atividade detectada</b>.</p>
      <div class="imod-actions">
        <button class="imod-btn imod-btn-stop" onclick="inactivityStopNow()">Parar agora</button>
        <button class="imod-btn imod-btn-keep" onclick="inactivityKeepGoing()">Sim, continuar</button>
      </div>
    </div>
  `;
  document.body.appendChild(el);
  // Auto-stop after 3 min if no response
  autoStopTimeout=setTimeout(()=>autoCloseTimer('inactivity_1h'),WARN_RESPONSE_MS);
}

function closeInactivityWarning(){
  warningModalOpen=false;
  if(autoStopTimeout){clearTimeout(autoStopTimeout);autoStopTimeout=null}
  const el=document.getElementById('inactivity-modal');
  if(el)el.remove();
}

async function inactivityKeepGoing(){
  lastActivityLocal=Date.now();
  closeInactivityWarning();
  if(activeEntryId){
    try{await sbPatch('tt_time_entries',`id=eq.${activeEntryId}`,{last_activity_at:new Date().toISOString()})}catch(e){}
  }
  toast('Ok, continuando!');
}

async function inactivityStopNow(){
  closeInactivityWarning();
  await stopTimer();
}

async function autoCloseTimer(reason){
  if(!activeEntryId)return;
  try{
    const entry=S.entries.find(e=>e.id===activeEntryId);
    const startMs=entry?.started_at?new Date(entry.started_at).getTime():Date.now();
    let endedAt;
    
    if(reason==='max_duration_4h'){
      // Teto absoluto atingido — registra até MAX_ENTRY_MS após o início
      endedAt=new Date(startMs+MAX_ENTRY_MS);
    }else{
      // Inatividade — registra apenas até a última atividade detectada
      // lastActivityLocal está em ms (Date.now base)
      endedAt=new Date(lastActivityLocal);
      // Salvaguarda: se algum erro, no mínimo 1 minuto
      if(endedAt.getTime()<startMs+60000){
        endedAt=new Date(startMs+60000);
      }
    }
    
    const mondayItemId=entry?.monday_item_id;
    const mondayBoardId=entry?.monday_board_id;
    
    await sbPatch('tt_time_entries',`id=eq.${activeEntryId}`,{
      is_running:false,
      ended_at:endedAt.toISOString(),
      auto_closed:true,
      auto_close_reason:reason
    });
    running=false;timerStart=null;activeEntryId=null;timerSec=0;
    stopActivityTracking();
    closeInactivityWarning();
    await loadEntries();
    
    // Monday sync v0.18 — remove o nome do user da People column
    if(mondayItemId&&mondayBoardId){
      const othersRunning=S.entries.filter(e=>e.is_running&&e.monday_item_id===mondayItemId);
      if(othersRunning.length===0){
        try{await hubTimerAction('stop',mondayBoardId,mondayItemId)}catch(e){}
      }
    }
    
    // Mostra aviso permanente ao usuário
    const minutosContados=Math.round((endedAt.getTime()-startMs)/60000);
    const motivoTxt=reason==='max_duration_4h'
      ?`limite máximo de 4h por entry atingido. Foram registradas ${minutosContados} min.`
      :`inatividade. Foram registrados ${minutosContados} min até a última atividade detectada.`;
    alert('⏱ Seu timer foi parado automaticamente: '+motivoTxt+'\n\nSe você estava trabalhando ativamente, lembre-se de responder ao aviso "Ainda está trabalhando?" quando ele aparecer.');
    buildNav();
    if(curPage==='timer'||curPage==='qc')nav(curPage);
  }catch(e){console.error('autoClose failed:',e)}
}

// confirmDialog helper — promise-based modal
function confirmDialog(title,html,okText,cancelText){
  return new Promise(resolve=>{
    const el=document.createElement('div');
    el.className='imod-backdrop';
    el.innerHTML=`
      <div class="imod-card">
        <h2 class="imod-title">${title}</h2>
        <p class="imod-desc">${html}</p>
        <div class="imod-actions">
          <button class="imod-btn imod-btn-cancel" id="cd-cancel">${cancelText||'Cancelar'}</button>
          <button class="imod-btn imod-btn-ok" id="cd-ok">${okText||'Confirmar'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(el);
    el.querySelector('#cd-ok').onclick=()=>{el.remove();resolve(true)};
    el.querySelector('#cd-cancel').onclick=()=>{el.remove();resolve(false)};
  });
}

async function startTimer(){
  const client=$('t-client')?.value,action=$('t-action')?.value,desc=$('t-desc')?.value||'';
  if(!client){toast('Selecione um cliente','error');return}
  
  // PONTO 2: Check if user already has a running timer
  const existing=S.entries.find(e=>e.is_running&&e.member_id===S.user.id);
  if(existing){
    const cli=S.clients.find(c=>c.id===existing.client_id);
    const cliName=cli?cli.name:'outro projeto';
    const mins=Math.floor((Date.now()-new Date(existing.started_at).getTime())/60000);
    const hrs=Math.floor(mins/60);const mn=mins%60;
    const duration=hrs>0?`${hrs}h${String(mn).padStart(2,'0')}`:`${mn} min`;
    const confirmed=await confirmDialog(
      'Timer já ativo',
      `Você já está rodando no projeto <b>${cliName}</b> há <b>${duration}</b>.<br><br>Deseja parar aquele e iniciar este novo?`,
      'Sim, trocar',
      'Cancelar'
    );
    if(!confirmed)return;
    // Stop the previous one before starting new
    activeEntryId=existing.id;
    await stopTimer(true); // silent mode
  }
  
  try{
    const now=new Date().toISOString();
    const data={member_id:S.user.id,client_id:client,action:action||null,description:desc,started_at:now,is_running:true,last_activity_at:now};
    const res=await sbPost('tt_time_entries',data);
    activeEntryId=res[0].id;timerStart=new Date();running=true;timerSec=0;
    lastActivityLocal=Date.now();
    toast('Timer iniciado');nav('timer');
    startActivityTracking();
    // (v0.18) reconcile removido — o sync Monday é via /api/monday-timer com People column
  }catch(e){toast('Erro: '+e.message,'error')}
}

let editingEntryId=null;

  if(!isA()){toast('Apenas admin pode editar lançamentos','error');return}

  editingEntryId=id;
  const startISO=e.started_at?new Date(e.started_at):new Date();
  const endISO=e.ended_at?new Date(e.ended_at):new Date();
  // Local datetime (YYYY-MM-DDTHH:mm) sem timezone
  const toLocal=d=>{
    const off=d.getTimezoneOffset()*60000;
    return new Date(d.getTime()-off).toISOString().slice(0,16);
  };
  $('m-entry-title').textContent='Editar Lançamento';
  $('m-entry-body').innerHTML=`
    <div style="background:rgba(237,28,36,.06);border:1px solid rgba(237,28,36,.2);border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--txt2)">

    </div>
    <div class="f-field"><label class="f-label">Descrição</label><input class="f-input" id="ee-desc" value="${(e.description||'').replace(/"/g,'&quot;')}"></div>

      <div class="f-field"><label class="f-label">Ação</label><select class="f-sel" id="ee-action"><option value="">—</option>${ACTIONS.map(a=>`<option value="${a}" ${a===e.action?'selected':''}>${a}</option>`).join('')}</select></div>
    </div>
    <div class="f-field"><label class="f-label">Pessoa</label><select class="f-sel" id="ee-member">${S.members.map(m=>`<option value="${m.id}" ${m.id===e.member_id?'selected':''}>${m.name}</option>`).join('')}</select></div>
    <div class="f-row">
      <div class="f-field"><label class="f-label">Início</label><input class="f-input" type="datetime-local" id="ee-start" value="${toLocal(startISO)}" oninput="recalcEditHours()"></div>
      <div class="f-field"><label class="f-label">Fim</label><input class="f-input" type="datetime-local" id="ee-end" value="${toLocal(endISO)}" oninput="recalcEditHours()"></div>
    </div>
    <div class="f-row">
      <div class="f-field"><label class="f-label">Horas <span style="font-size:10px;color:var(--txt3);font-weight:400">(calculado automaticamente, mas editável)</span></label><input class="f-input" type="number" id="ee-hours" step="any" min="0" value="${e.hours||0}"></div>
      <div class="f-field"><label class="f-label">Data <span style="font-size:10px;color:var(--txt3);font-weight:400">(do lançamento)</span></label><input class="f-input" type="date" id="ee-date" value="${e.date||(e.started_at||'').substring(0,10)}"></div>
    </div>
    ${e.auto_closed?`<div style="font-size:11px;color:var(--txt3);margin-top:6px">Marcado como AUTO (motivo: ${e.auto_close_reason||'—'}). Editar valores não remove a marcação automática.</div>`:''}
  `;
  $('m-entry-save').onclick=saveEditEntry;
  openM('m-entry');
}

// Ao mudar início/fim, recalcula automaticamente o campo horas
function recalcEditHours(){
  const s=$('ee-start')?.value, e=$('ee-end')?.value;
  if(!s||!e)return;
  const ms=new Date(e).getTime()-new Date(s).getTime();
  if(ms<=0||isNaN(ms))return;
  const h=ms/3600000;
  const fld=$('ee-hours');
  if(fld) fld.value=Math.round(h*100)/100;
}

async function saveEditEntry(){
  if(!editingEntryId)return;
  const desc=$('ee-desc')?.value||'';
  const client=$('ee-client')?.value;
  const action=$('ee-action')?.value||null;
  const memberId=$('ee-member')?.value;
  const startStr=$('ee-start')?.value;
  const endStr=$('ee-end')?.value;
  const hours=parseFloat($('ee-hours')?.value);
  const date=$('ee-date')?.value;
  if(!startStr||!endStr||!client||!memberId){toast('Início, fim, cliente e pessoa são obrigatórios','error');return}
  const start=new Date(startStr), end=new Date(endStr);
  if(end<=start){toast('O horário de fim precisa ser depois do início','error');return}
  if(isNaN(hours)||hours<=0){toast('Horas inválidas','error');return}
  try{
    await sbPatch('tt_time_entries',`id=eq.${editingEntryId}`,{
      description:desc,
      client_id:client,
      action:action,
      member_id:memberId,
      started_at:start.toISOString(),
      ended_at:end.toISOString(),
      hours:hours,
      duration_minutes:Math.round(hours*60),
      date:date||start.toISOString().substring(0,10)
    });
    closeM('m-entry');
    editingEntryId=null;
    await loadEntries();
    toast('Lançamento atualizado');
    renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function pgAudit(el){
  if(!(isA()||isAcc())){el.innerHTML='<div class="empty">Acesso restrito</div>';return}
  
  // Carrega entries auto-fechados dos últimos 30 dias
  const since=new Date(Date.now()-30*86400000).toISOString();
  let autoClosed=[];
  try{
    autoClosed=await sbGet('tt_time_entries',`auto_closed=eq.true&started_at=gte.${since}&order=started_at.desc`);
  }catch(e){autoClosed=[]}
  
  // Agrupa por membro
  const byMember={};
  autoClosed.forEach(e=>{
    const mid=e.member_id;
    if(!byMember[mid])byMember[mid]={member_id:mid,entries:[],totalHours:0};
    byMember[mid].entries.push(e);
    byMember[mid].totalHours+=Number(e.hours||0);
  });
  
  // Filtra por time se account
  let memberIds=Object.keys(byMember);
  if(isAcc()&&!isA()){
    memberIds=memberIds.filter(mid=>{
      const m=S.members.find(mm=>mm.id===mid);
      return m&&m.team===S.user.team;
    });
  }
  
  const ranking=memberIds.map(mid=>{
    const m=S.members.find(mm=>mm.id===mid);
    return{
      member_id:mid,
      name:m?m.name:'—',
      team:m?m.team:'',
      count:byMember[mid].entries.length,
      hours:byMember[mid].totalHours,
      entries:byMember[mid].entries
    };
  }).sort((a,b)=>b.count-a.count);
  
  const totalCount=ranking.reduce((s,r)=>s+r.count,0);
  const totalHours=ranking.reduce((s,r)=>s+r.hours,0);
  const uniqueUsers=ranking.length;
  
  // Entries recentes (tabela)
  const recent=autoClosed.filter(e=>{
    if(isA())return true;
    const m=S.members.find(mm=>mm.id===e.member_id);
    return m&&m.team===S.user.team;
  }).slice(0,50);
  
  el.innerHTML=`
    <div style="background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.25);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
      <div style="font-size:22px">⚠️</div>
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--red)">Timers parados automaticamente por inatividade</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">O sistema pergunta "ainda está trabalhando?" após 50min sem atividade no computador. Se a pessoa não responder em 3min, o timer é parado e registra 30min na sessão. Esta página mostra quem teve timers parados assim nos últimos 30 dias.</div>
      </div>
    </div>
    
    <div class="cards">
      <div class="card"><div class="cl">Total de Auto-stops (30d)</div><div class="cv">${totalCount}</div></div>
      <div class="card card-blue"><div class="cl">Pessoas Afetadas</div><div class="cv">${uniqueUsers}</div></div>
      <div class="card" style="--c:var(--red)"><div class="cl">Horas Registradas</div><div class="cv">${fH(totalHours)}</div><div class="cs">soma dos 30min gravados por auto-stop</div></div>
    </div>
    
    ${ranking.length?`
    <div class="tbl"><div class="tbl-h"><h3>Ranking por Pessoa</h3><span class="bg-section-sub">Quantas vezes cada pessoa teve auto-stop nos últimos 30 dias</span></div>
    <div class="tbl-r"><table><thead><tr><th>Pessoa</th><th>Time</th><th class="rt">Ocorrências</th><th class="rt">Horas auto-fechadas</th><th>Risco</th></tr></thead>
    <tbody>
    ${ranking.map(r=>{
      const risk=r.count>=5?{label:'ALTO',color:'var(--red)'}:r.count>=2?{label:'MÉDIO',color:'var(--pack)'}:{label:'BAIXO',color:'var(--prod)'};
      return`<tr>
        <td style="font-weight:600">${r.name}</td>
        <td>${r.team?`<span class="bg ${TBC(r.team)}">${TB(r.team)}</span>`:'—'}</td>
        <td class="rt" style="font-weight:700;font-family:var(--mono);color:${risk.color}">${r.count}</td>
        <td class="rt" style="font-family:var(--mono)">${fH(r.hours)}</td>
        <td><span style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;background:${risk.color}22;color:${risk.color}">${risk.label}</span></td>
      </tr>`;
    }).join('')}
    </tbody></table></div></div>
    `:'<div class="empty">Nenhum timer auto-fechado nos últimos 30 dias 🎉</div>'}
    
    ${recent.length?`
    <div class="tbl" style="margin-top:24px"><div class="tbl-h"><h3>Ocorrências Recentes</h3><span class="bg-section-sub">${recent.length} últimas (de ${autoClosed.length} totais)</span></div>
    <div class="tbl-r"><table><thead><tr><th>Data/Hora</th><th>Pessoa</th><th>Cliente</th><th>Descrição</th><th class="rt">Duração</th><th>Motivo</th></tr></thead>
    <tbody>
    ${recent.map(e=>{
      const m=S.members.find(mm=>mm.id===e.member_id);
      const c=S.clients.find(cc=>cc.id===e.client_id);
      const startedAt=new Date(e.started_at);
      const dateStr=startedAt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+startedAt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const reasonMap={'inactivity_1h':'Sem atividade 50min+3min'};
      const reasonLabel=reasonMap[e.auto_close_reason]||e.auto_close_reason||'—';
      return`<tr>
        <td style="font-family:var(--mono);font-size:11px">${dateStr}</td>
        <td style="font-weight:600">${m?m.name:'—'}</td>
        <td>${c?c.name:'—'}</td>
        <td style="color:var(--txt2);font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.description||'—'}</td>
        <td class="rt" style="font-family:var(--mono)">${fH(e.hours||0.5)}</td>
        <td style="font-size:11px;color:var(--txt2)">${reasonLabel}</td>
      </tr>`;
    }).join('')}
    </tbody></table></div></div>
    `:''}
  `;
}

function renderProdReqRows(reqs,filter){
  let filtered=reqs;
  if(filter==='leader')filtered=reqs.filter(r=>['pending_leader_review','leader_reviewing','account_rejected'].includes(r.status));
  else if(filter==='account')filtered=reqs.filter(r=>r.status==='budget_sent');
  else if(filter==='approved')filtered=reqs.filter(r=>r.status==='account_approved');
  else if(filter==='production')filtered=reqs.filter(r=>['scheduled','in_capture','in_edit','in_review'].includes(r.status));
  else if(filter==='done')filtered=reqs.filter(r=>['delivered','cancelled'].includes(r.status));
  if(!filtered.length)return'<tr><td colspan="6" class="empty">Nenhuma solicitação neste filtro</td></tr>';
  return filtered.map(r=>{
    const c=S.clients.find(cl=>cl.id===r.client_id);const m=S.members.find(mm=>mm.id===r.requested_by);
    const isAction=(['pending_leader_review','leader_reviewing','account_rejected'].includes(r.status)&&canManageProdAV())||(r.status==='budget_sent'&&canApproveBudget())||(r.status==='account_approved'&&canManageProdAV());
    const hl=isAction?'background:rgba(237,28,36,.04);border-left:3px solid var(--red);':'';
    const icon=r.status==='account_rejected'?'🔄':r.status==='budget_sent'?'⚠️':r.status==='account_approved'?'✅':'';
    return`<tr style="cursor:pointer;${hl}" onclick="showRequestDetail('${r.id}')"><td style="font-weight:600">${icon} ${r.title}</td><td>${c?c.name:'—'}</td><td>${PROD_TYPES[r.prod_type]||r.prod_type}</td><td><span class="st-pill st-${r.status}">${AV_STATUSES[r.status]||r.status}</span></td><td>${fD(r.desired_deadline)}</td><td>${m?m.name.split(' ')[0]:'—'}</td></tr>`}).join('');
}

function filterProdReqs(filter){
  document.querySelectorAll('#prod-filter-tabs .pill').forEach(p=>p.classList.remove('active'));
  const btn=$(`prod-filter-${filter}`);if(btn)btn.classList.add('active');
  const tbody=$('prod-req-tbody');
  if(tbody)tbody.innerHTML=renderProdReqRows(S.av_requests,filter);
}
