<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGT Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;
--red:#ED1C24;--red2:#c41920;--red-glow:rgba(237,28,36,.12);
--white:#fff;--txt:#e5e5e5;--txt2:#999;--txt3:#666;
--border:#2a2a2a;--border2:#333;
--t1:#3b82f6;--t3:#a855f7;--t4:#06b6d4;--pack:#f59e0b;--prod:#22c55e;--adm:#6b7280;
--radius:10px;--radius-sm:6px;
--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-box{width:360px;padding:48px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;text-align:center}
.auth-logo{margin-bottom:24px}
.auth-logo svg{width:120px;height:auto}
.auth-title{font-size:13px;color:var(--txt2);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase}
.auth-field{margin-bottom:16px;text-align:left}
.auth-field label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.auth-field input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-size:14px;font-family:var(--font);outline:none;transition:.2s}
.auth-field input:focus{border-color:var(--red)}
.auth-btn{width:100%;padding:14px;background:var(--red);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:8px;transition:.2s}
.auth-btn:hover{background:var(--red2)}
.auth-err{color:var(--red);font-size:12px;margin-top:12px;display:none}

/* LAYOUT */
.app{display:none;height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo svg{width:80px;height:auto}
.sb-logo .hub-badge{font-size:10px;font-weight:700;background:var(--red);color:var(--white);padding:2px 8px;border-radius:3px;letter-spacing:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:16px 20px 6px;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--txt2);cursor:pointer;font-size:13px;transition:.15s;border-left:3px solid transparent}
.sb-item:hover{background:var(--bg3);color:var(--txt)}
.sb-item.active{color:var(--white);background:var(--red-glow);border-left-color:var(--red)}
.sb-item svg{width:16px;height:16px;flex-shrink:0}
.sb-item .sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--red);color:var(--white);padding:1px 6px;border-radius:10px}
.sb-sub{padding-left:28px}
.sb-sub .sb-item{font-size:12px;padding:8px 20px}
.sb-user{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-uinfo{flex:1;min-width:0}.sb-uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-urole{font-size:10px;color:var(--txt2)}
.sb-logout{background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px}
.sb-logout:hover{color:var(--red)}

.main{margin-left:240px;height:100vh;display:flex;flex-direction:column}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.topbar-date{font-size:12px;color:var(--txt2);font-family:var(--mono)}
.menu-toggle{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg3);border:none;color:var(--txt);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:24px}

/* PILLS */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pill{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:.15s;white-space:nowrap;font-family:var(--font)}
.pill:hover{border-color:var(--txt3);color:var(--txt)}
.pill.active{background:var(--red);border-color:var(--red);color:var(--white)}
.pill-dates{display:flex;gap:8px;align-items:center;margin-left:8px}
.pill-dates input{padding:5px 10px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:var(--mono)}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-sel{padding:7px 12px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:var(--font);min-width:120px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.cl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cv{font-size:28px;font-weight:800;line-height:1}
.cs{font-size:12px;color:var(--txt2);margin-top:6px}
.card-blue::before{background:var(--t1)}.card-purple::before{background:var(--t3)}.card-cyan::before{background:var(--t4)}.card-green::before{background:var(--prod)}.card-amber::before{background:var(--pack)}

/* TABLES */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.tbl-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-h h3{font-size:14px;font-weight:700}
.tbl-r{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.rt{text-align:right}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-r{background:var(--red);color:var(--white)}.btn-r:hover{background:var(--red2)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--txt)}.btn-o:hover{border-color:var(--txt3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px;display:flex;align-items:center}.btn-icon:hover{color:var(--red)}
.btn-del{color:var(--txt3)}.btn-del:hover{color:var(--red)}

/* BADGES */
.bg{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bg-t1{background:rgba(59,130,246,.15);color:var(--t1)}.bg-t3{background:rgba(168,85,247,.15);color:var(--t3)}
.bg-t4{background:rgba(6,182,212,.15);color:var(--t4)}.bg-pack{background:rgba(245,158,11,.15);color:var(--pack)}
.bg-prod{background:rgba(34,197,94,.15);color:var(--prod)}.bg-adm{background:rgba(107,114,128,.15);color:var(--adm)}
.bg-red{background:rgba(237,28,36,.15);color:var(--red)}.bg-green{background:rgba(34,197,94,.15);color:var(--prod)}
.bg-amber{background:rgba(245,158,11,.15);color:var(--pack)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column}
.modal-lg{max-width:800px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-b{padding:20px;overflow-y:auto;flex:1}
.modal-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* FORMS */
.f-field{margin-bottom:16px}
.f-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.f-input,.f-sel,.f-area{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-size:13px;font-family:var(--font);outline:none;transition:.2s}
.f-input:focus,.f-sel:focus,.f-area:focus{border-color:var(--red)}
.f-area{min-height:80px;resize:vertical}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* PROGRESS */
.pbar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.pbar-red{background:var(--red)}.pbar-green{background:var(--prod)}.pbar-amber{background:var(--pack)}.pbar-blue{background:var(--t1)}

/* TIMER */
.timer-display{font-size:60px;font-weight:800;font-family:var(--mono);text-align:center;margin:24px 0;letter-spacing:2px}
.timer-display.running{color:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.timer-btn{padding:12px 32px;border-radius:var(--radius);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);transition:.15s}
.timer-start{background:var(--red);color:var(--white)}.timer-start:hover{background:var(--red2)}
.timer-stop{background:var(--bg4);color:var(--txt)}.timer-stop:hover{background:var(--border2)}

/* SCORE */
.score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0}
.score-ring.good{background:rgba(34,197,94,.15);color:var(--prod);border:3px solid var(--prod)}
.score-ring.ok{background:rgba(245,158,11,.15);color:var(--pack);border:3px solid var(--pack)}
.score-ring.bad{background:rgba(237,28,36,.15);color:var(--red);border:3px solid var(--red)}
.score-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-bar label{font-size:12px;color:var(--txt2);width:80px;text-align:right;flex-shrink:0}
.score-bar .sbar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.score-bar .sbar-fill{height:100%;border-radius:3px}
.score-bar .sval{font-size:12px;font-weight:700;width:30px;text-align:right}

/* STATUS PILLS */
.st-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.st-solicitado{background:rgba(59,130,246,.15);color:var(--t1)}
.st-briefing{background:rgba(168,85,247,.15);color:var(--t3)}
.st-orcamento{background:rgba(245,158,11,.15);color:var(--pack)}
.st-aprovado{background:rgba(34,197,94,.15);color:var(--prod)}
.st-agendado{background:rgba(6,182,212,.15);color:var(--t4)}
.st-producao{background:rgba(237,28,36,.15);color:var(--red)}
.st-edicao{background:rgba(168,85,247,.15);color:var(--t3)}
.st-finalizado{background:rgba(107,114,128,.15);color:var(--adm)}
.st-cancelado{background:rgba(237,28,36,.08);color:var(--txt3);text-decoration:line-through}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--txt3)}
.empty svg{margin-bottom:12px}
.loading{text-align:center;padding:48px;color:var(--txt3)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;animation:fadeIn .3s}
.toast-item.success{border-left:3px solid var(--prod)}.toast-item.error{border-left:3px solid var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
@media(max-width:768px){
.sidebar{transform:translateX(-100%);width:260px}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.menu-toggle{display:flex}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.overlay.show{display:block}
.content{padding:16px}
.cards{grid-template-columns:1fr 1fr}
.f-row,.f-row3{grid-template-columns:1fr}
.timer-display{font-size:40px}
.pills{gap:4px}.pill{padding:5px 10px;font-size:11px}
.modal{max-width:100%;margin:8px}
}
@media(max-width:480px){.cards{grid-template-columns:1fr}}
</style>
</head>

function getDateRange(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  const day=s=>s.toISOString().substring(0,10);
  const dow=now.getDay(),mon=new Date(now);mon.setDate(d-(dow===0?6:dow-1));
  const ranges={
    today:[day(now),day(now)],
    yesterday:[day(new Date(y,m,d-1)),day(new Date(y,m,d-1))],
    this_week:[day(mon),day(now)],
    last_week:[day(new Date(mon.getTime()-7*864e5)),day(new Date(mon.getTime()-864e5))],
    this_month:[`${y}-${String(m+1).padStart(2,'0')}-01`,day(now)],
    last_month:[`${y}-${String(m).padStart(2,'0')||12}-01`,`${y}-${String(m+1).padStart(2,'0')}-00`].map((v,i)=>{if(i===0){const mm=m===0?12:m;const yy=m===0?y-1:y;return `${yy}-${String(mm).padStart(2,'0')}-01`}const ld=new Date(y,m,0);return day(ld)}),
    this_year:[`${y}-01-01`,day(now)],
    custom:[customFrom||day(now),customTo||day(now)]
  };
  return ranges[dateRange]||ranges.this_month;
}

async function sbGet(table,params=''){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{headers:HDR_R});
  if(!r.ok)throw new Error(`GET ${table}: ${r.status}`);return r.json();
}
async function sbPost(table,data){
  const r=await fetch(`${SB_URL}/${table}`,{method:'POST',headers:HDR,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(`POST ${table}: ${r.status}`);return r.json();
}
async function sbPatch(table,params,data){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{method:'PATCH',headers:HDR,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(`PATCH ${table}: ${r.status}`);return r.json();
}
async function sbDel(table,params){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{method:'DELETE',headers:{...HDR_R,'Prefer':'return=representation'}});
  if(!r.ok)throw new Error(`DEL ${table}: ${r.status}`);return r.json();
}

function openM(id){$(id).classList.add('open');
  // Prevent event bubbling on modal inputs (fixes artifact viewer issue)
  setTimeout(()=>{$(id).querySelectorAll('input,textarea,select').forEach(el=>{el.addEventListener('keydown',e=>e.stopPropagation());el.addEventListener('keyup',e=>e.stopPropagation());el.addEventListener('keypress',e=>e.stopPropagation())})},50);
}
function closeM(id){$(id).classList.remove('open')}
function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast-item ${type}`;el.innerHTML=`${type==='success'?'✓':'✕'} ${msg}`;$('toast').appendChild(el);setTimeout(()=>el.remove(),3500)}

async function doLogin(){
  const email=$('a-email').value.trim(),pass=$('a-pass').value.trim();
  if(!email||!pass){showErr('Preencha todos os campos');return}
  try{
    // Login by tt_members.login_password
    const emailField=email.includes('@')?'email':'name';
    const members=await sbGet('tt_members',`${emailField}=eq.${encodeURIComponent(email)}&is_active=eq.true`);
    if(!members.length){showErr('Usuário não encontrado');return}
    const u=members[0];
    if(u.login_password!==pass){showErr('Senha incorreta');return}
    S.user=u;
    localStorage.setItem('tgt_hub_user',JSON.stringify(u));
    await initApp();
  }catch(e){showErr('Erro: '+e.message)}
}
function showErr(msg){const el=$('a-err');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}

async function doLogout(){
  S.user=null;localStorage.removeItem('tgt_hub_user');
  $('app').style.display='none';$('auth-screen').style.display='flex';
}

async function initApp(){
  $('auth-screen').style.display='none';$('app').style.display='flex';
  $('u-name').textContent=S.user.name.split(' ')[0];
  $('u-role').textContent=S.user.job_title||S.user.access_level;
  $('u-av').textContent=S.user.name.charAt(0);
  $('cur-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  buildNav();
  await loadData();
  nav('timer');
  startTick();
  // Check running timer
  const re=S.entries.find(e=>e.is_running&&e.member_id===S.user.id);
  if(re){running=true;timerStart=new Date(re.started_at);activeEntryId=re.id}
}

async function loadData(){
  try{
    const [members,clients,cats]=await Promise.all([
      sbGet('tt_members','is_active=eq.true&order=team,name'),
      sbGet('tt_clients','is_active=eq.true&order=team,name'),
      sbGet('categories','order=name')
    ]);
    S.members=members;S.clients=clients;S.categories=cats;
    // Load entries for date range
    await loadEntries();
    // Equipment
    try{S.equipment=await sbGet('equipment','order=name')}catch(e){S.equipment=[]}
    // AV Requests
    try{S.av_requests=await sbGet('av_requests','order=created_at.desc')}catch(e){S.av_requests=[]}
    // Score ADM
    try{S.scores=await sbGet('score_adm','order=month.desc,account_id')}catch(e){S.scores=[]}
    // Commission rules
    try{S.commission_rules=await sbGet('commission_rules','order=prod_type')}catch(e){S.commission_rules=[]}
    try{S.cost_defaults=await sbGet('cost_defaults','order=cost_type')}catch(e){S.cost_defaults=[]}
  }catch(e){console.error('loadData:',e);toast('Erro ao carregar dados','error')}
}

async function loadEntries(){
  const [from,to]=getDateRange();
  const params=isA()?`started_at=gte.${from}T00:00:00&started_at=lte.${to}T23:59:59&order=started_at.desc`
    :isAcc()?`started_at=gte.${from}T00:00:00&started_at=lte.${to}T23:59:59&order=started_at.desc`
    :`member_id=eq.${S.user.id}&started_at=gte.${from}T00:00:00&started_at=lte.${to}T23:59:59&order=started_at.desc`;
  S.entries=await sbGet('tt_time_entries',params);
  // Also always load running entries
  try{
    const running=await sbGet('tt_time_entries','is_running=eq.true');
    running.forEach(r=>{if(!S.entries.find(e=>e.id===r.id))S.entries.push(r)});
  }catch(e){}
}

function nav(page){
  curPage=page;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.p===page));
  $('pg-title').textContent=TITLES[page]||page;
  if(window.innerWidth<=768){$('sidebar').classList.remove('open');$('overlay').classList.remove('show')}
  renderPage();
}

async function renderPage(){
  const el=$('pg');
  el.innerHTML='<div class="loading"><div class="spin"></div> Carregando...</div>';
  try{
    const pages={
      timer:pgTimer,entries:pgEntries,
      'd-my':pgDashMy,'d-client':pgDashClient,'d-team':pgDashTeam,'d-person':pgDashPerson,'d-finance':pgDashFinance,
      'p-requests':pgProdRequests,'p-calendar':pgProdCalendar,'p-equip':pgProdEquip,'p-config':pgProdConfig,
      score:pgScore,members:pgMembers,clients:pgClients

  }catch(ex){el.innerHTML=`<div class="empty">Erro: ${ex.message}</div>`;console.error(ex)}
}

function datePillsHTML(){
  const opts=[['today','Hoje'],['yesterday','Ontem'],['this_week','Semana'],['last_week','Sem. passada'],['this_month','Mês'],['last_month','Mês passado'],['this_year','Ano'],['custom','Personalizado']];

async function startTimer(){
  const client=$('t-client')?.value,action=$('t-action')?.value,desc=$('t-desc')?.value||'';
  if(!client){toast('Selecione um cliente','error');return}
  try{
    const data={member_id:S.user.id,client_id:client,action:action||null,description:desc,started_at:new Date().toISOString(),is_running:true};
    const res=await sbPost('tt_time_entries',data);
    activeEntryId=res[0].id;timerStart=new Date();running=true;timerSec=0;
    toast('Timer iniciado');nav('timer');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function stopTimer(){
  if(!activeEntryId)return;
  try{
    const ended=new Date().toISOString();
    await sbPatch('tt_time_entries',`id=eq.${activeEntryId}`,{is_running:false,ended_at:ended});
    running=false;timerStart=null;activeEntryId=null;timerSec=0;
    await loadEntries();toast('Timer parado');nav('timer');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function saveManualEntry(){

  try{

}

async function pgProdCalendar(el){
  // Simple month calendar with scheduled productions
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDay=first.getDay()||7;// Monday=1
  const days=[];
  for(let i=1-startDay+1;i<=last.getDate();i++){
    const d=new Date(y,m,i);
    days.push({date:d,day:i,inMonth:i>=1&&i<=last.getDate()});
  }
  // Pad to 42
  while(days.length<42)days.push({date:new Date(y,m,days.length+1-startDay+2),day:days.length+1,inMonth:false});
  
  const monthName=now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 style="text-transform:capitalize">${monthName}</h3>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:var(--radius);overflow:hidden">
      ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div style="padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--txt2);background:var(--bg2)">${d}</div>`).join('')}
      ${days.map(d=>{
        const isToday=d.inMonth&&d.date.toDateString()===now.toDateString();
        return`<div style="padding:8px;min-height:80px;background:${d.inMonth?'var(--bg2)':'var(--bg)'};${isToday?'border:1px solid var(--red);':''}"><div style="font-size:12px;${d.inMonth?'':'color:var(--txt3)'}${isToday?';color:var(--red);font-weight:700':''};">${d.inMonth?d.day:''}</div></div>`}).join('')}
    </div>
    <div style="margin-top:16px;color:var(--txt2);font-size:12px">As produções agendadas aparecerão aqui conforme forem criadas nas solicitações.</div>`;
}

async function saveScore(){
  const account=$('sc-account')?.value,month=$('sc-month')?.value;
  const p1=parseFloat($('sc-p1')?.value),p2=parseFloat($('sc-p2')?.value),p3=parseFloat($('sc-p3')?.value),p4=parseFloat($('sc-p4')?.value);
  if(!account||!month||isNaN(p1)||isNaN(p2)||isNaN(p3)||isNaN(p4)){toast('Preencha todos os campos','error');return}
  const data={account_id:account,month,p1_score:p1,p1_notes:$('sc-p1n')?.value||null,p2_score:p2,p2_notes:$('sc-p2n')?.value||null,p3_score:p3,p3_notes:$('sc-p3n')?.value||null,p4_score:p4,p4_notes:$('sc-p4n')?.value||null,block_status:$('sc-block')?.value||'none',block_notes:$('sc-bn')?.value||null,evaluated_by:S.user.id,updated_at:new Date().toISOString()};
  try{
    // Upsert: try patch first, then post
    const existing=S.scores.find(s=>s.account_id===account&&s.month===month);
    if(existing)await sbPatch('score_adm',`id=eq.${existing.id}`,data);
    else await sbPost('score_adm',data);
    closeM('m-score');S.scores=await sbGet('score_adm','order=month.desc,account_id');toast('Avaliação salva');renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

    </div>`;
  $('m-client-save').onclick=saveClient;
  openM('m-client');
}

async function saveClient(){
  const id=$('cl-id')?.value,name=$('cl-name')?.value;
  if(!name){toast('Preencha o nome','error');return}
  const data={name,team:$('cl-team')?.value||null,target_hours_month:parseFloat($('cl-target')?.value)||0,fee_monthly:parseFloat($('cl-fee')?.value)||0};
  try{
    if(id)await sbPatch('tt_clients',`id=eq.${id}`,data);
    else{data.is_active=true;await sbPost('tt_clients',data)}
    closeM('m-client');S.clients=await sbGet('tt_clients','is_active=eq.true&order=team,name');toast('Cliente salvo');renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

// ═══════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════
(async()=>{
  const saved=localStorage.getItem('tgt_hub_user');
  if(saved){
    try{
      S.user=JSON.parse(saved);
      // Verify user still exists
      const check=await sbGet('tt_members',`id=eq.${S.user.id}&is_active=eq.true`);
      if(check.length){S.user=check[0];await initApp();return}
    }catch(e){}
    localStorage.removeItem('tgt_hub_user');
  }
  $('auth-screen').style.display='flex';
})();
</script>
