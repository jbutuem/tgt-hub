const MONDAY_PROD_BOARD='18408377895';
const MONDAY_PROD_STATUS_MAP={
  pending_leader_review:'Aguardando Líder',leader_reviewing:'Aguardando Líder',
  budget_sent:'Orçamento Enviado',account_approved:'Aprovado Account',account_rejected:'Cancelado',
  scheduling:'Agendado',scheduled:'Agendado',in_capture:'Em Captação',
  in_edit:'Em Edição',in_review:'Em Revisão',delivered:'Entregue',cancelled:'Cancelado'
};
const MONDAY_PROD_GROUP_MAP={
  pending_leader_review:'group_mm2c3x7w',leader_reviewing:'group_mm2c3x7w',
  budget_sent:'group_mm2c78sr',account_approved:'group_mm2c78sr',
  scheduling:'group_mm2c8fq6',scheduled:'group_mm2c8fq6',
  in_capture:'group_mm2cvbk2',in_edit:'group_mm2cgpex',in_review:'group_mm2cgpex',
  delivered:'group_mm2c3pjp',cancelled:'group_mm2c3pjp'
};

async function mondayCreateProdItem(req){
  try{
    const cl=S.clients.find(c=>c.id===req.client_id);
    const groupId=MONDAY_PROD_GROUP_MAP[req.status]||'group_mm2c3x7w';
    // Step 1: Create item with just the name
    const createQ=`mutation{create_item(board_id:${MONDAY_PROD_BOARD},group_id:"${groupId}",item_name:"${req.title.replace(/"/g,"'")}"){id}}`;
    const r1=await fetch('https://api.monday.com/v2',{method:'POST',headers:{'Content-Type':'application/json','Authorization':MONDAY_API_TOKEN,'API-Version':'2024-10'},body:JSON.stringify({query:createQ})});
    const d1=await r1.json();
    const mondayId=d1?.data?.create_item?.id;
    if(!mondayId){console.error('Monday create failed:',d1);return null}
    // Step 2: Update columns via change_simple_column_value calls
    const updates=[
      {col:'color_mm2ccsjs',val:MONDAY_PROD_STATUS_MAP[req.status]||'Rascunho'},
      {col:'text_mm2cstpc',val:cl?.name||''},
      {col:'text_mm2czjm4',val:req.id}
    ];
    if(req.desired_deadline)updates.push({col:'date_mm2crf2',val:JSON.stringify({date:req.desired_deadline})});
    if(req.quantity_deliverables)updates.push({col:'numeric_mm2cqa1f',val:String(req.quantity_deliverables)});
    if(req.formats)updates.push({col:'text_mm2crdeb',val:req.formats});
    for(const u of updates){
      const isJson=u.val.startsWith('{');
      const val=isJson?u.val.replace(/"/g,'\\"'):`${u.val.replace(/"/g,"'")}`;
      const q=`mutation{change_simple_column_value(board_id:${MONDAY_PROD_BOARD},item_id:${mondayId},column_id:"${u.col}",value:"${val}"){id}}`;
      await fetch('https://api.monday.com/v2',{method:'POST',headers:{'Content-Type':'application/json','Authorization':MONDAY_API_TOKEN,'API-Version':'2024-10'},body:JSON.stringify({query:q})});
    }
    // Save monday item ID back to Supabase
    await sbPatch('av_requests',`id=eq.${req.id}`,{monday_item_id:String(mondayId)});
    return mondayId;
  }catch(e){console.error('Monday create prod error:',e);return null}
}

async function mondayUpdateProdStatus(req,newStatus){
  try{
    if(!req.monday_item_id)return;
    const label=MONDAY_PROD_STATUS_MAP[newStatus];
    if(!label)return;
    const mutQ=`mutation{change_simple_column_value(board_id:${MONDAY_PROD_BOARD},item_id:${req.monday_item_id},column_id:"color_mm2ccsjs",value:"${label}"){id}}`;
    await fetch('https://api.monday.com/v2',{method:'POST',headers:{'Content-Type':'application/json','Authorization':MONDAY_API_TOKEN,'API-Version':'2024-10'},body:JSON.stringify({query:mutQ})});
    // Move to correct group
    const groupId=MONDAY_PROD_GROUP_MAP[newStatus];
    if(groupId){
      const moveQ=`mutation{move_item_to_group(item_id:${req.monday_item_id},group_id:"${groupId}"){id}}`;
      await fetch('https://api.monday.com/v2',{method:'POST',headers:{'Content-Type':'application/json','Authorization':MONDAY_API_TOKEN,'API-Version':'2024-10'},body:JSON.stringify({query:moveQ})});
    }
  }catch(e){console.error('Monday update prod error:',e)}
}

async function saveRequest(){
  const title=$('rq-title')?.value,client=$('rq-client')?.value,type=$('rq-type')?.value;
  if(!title||!client||!type){toast('Preencha título, cliente e tipo','error');return}
  const n=v=>{const s=(v||'').trim();return s===''?null:s};
  const ni=v=>{const x=parseInt(v);return isNaN(x)?null:x};
  // Read checked video types
  const vtypes=[...$('rq-vtypes').querySelectorAll('input:checked')].map(i=>i.value).join(', ');
  // Read checked formats
  const formats=[...$('rq-formats').querySelectorAll('input:checked')].map(i=>i.value).join(', ');
  try{
    const body={
      title:title.trim(),
      client_id:client,
      requested_by:S.user.id,
      prod_type:type,
      objective:n($('rq-obj')?.value),
      expected_impact:null,
      video_type:n(vtypes),
      quantity_deliverables:ni($('rq-qty')?.value)||1,
      formats:n(formats),
      desired_deadline:n($('rq-deadline')?.value),
      reference_links:n($('rq-refs')?.value),
      briefing_notes:n($('rq-notes')?.value),
      client_budget:parseFloat($('rq-budget')?.value)||null,
      status:'pending_leader_review'
    };
    const result=await sbPost('av_requests',body);
    // Create item on Monday board
    const newReq=Array.isArray(result)?result[0]:result;
    if(newReq?.id)mondayCreateProdItem({...body,id:newReq.id});
    closeM('m-req');S.av_requests=await sbGet('av_requests','order=created_at.desc');toast('Solicitação criada');buildNav();renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

function showRequestDetail(id){
  const r=S.av_requests.find(rq=>rq.id===id);
  if(!r)return;
  const c=S.clients.find(cl=>cl.id===r.client_id);
  const m=S.members.find(mm=>mm.id===r.requested_by);
  const nextStatuses=STATUS_FLOW[r.status]||[];
  // Permissões: quem pode agir em cada etapa
  const isLeaderOrAdmin=isA()||isPL();
  const isAccountUser=isAcc();
  // Account pode aprovar/rejeitar quando status é budget_sent
  // Líder/ADM age em todo o resto
  const canAct=(r.status==='budget_sent'||r.status==='account_rejected')?(isAccountUser||isA()):isLeaderOrAdmin;
  const canBudget=isLeaderOrAdmin;
  // Get existing budget
  let bgt=null;
  
  $('m-req-title').textContent=r.title;
  $('m-req-save').style.display='none';
  
  // Load budget then render
  (async()=>{
    try{const bgs=await sbGet('av_budgets',`request_id=eq.${r.id}&order=created_at.desc&limit=1`);bgt=bgs[0]||null}catch(e){}
    renderRequestDetail(r,c,m,bgt,nextStatuses,canAct,canBudget);
    openM('m-req');
  })();
}

function showProdCalendarPopup(){
  // Build a mini month calendar showing existing productions
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const prods=S.av_requests.filter(r=>r.status!=='cancelled'&&r.status!=='delivered');
  const dates={};
  prods.forEach(r=>{
    const bgt=S.av_budgets?.find(b=>b.request_id===r.id);
    const d=bgt?.suggested_capture_date||r.desired_deadline;
    if(d){const key=d.substring(0,10);if(!dates[key])dates[key]=[];dates[key].push(r.title)}
  });
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let cal=`<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)this.remove()">
    <div style="background:var(--bg2);border-radius:var(--radius);padding:20px;max-width:480px;width:90%;max-height:80vh;overflow:auto" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-weight:800;font-size:16px">📅 Agenda de Produções — ${monthNames[m]} ${y}</div>
      <button style="background:none;border:none;color:var(--txt);cursor:pointer;font-size:18px" onclick="this.closest('[style*=fixed]').remove()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
      ${['D','S','T','Q','Q','S','S'].map(d=>`<div style="font-size:10px;font-weight:700;color:var(--txt3);padding:4px">${d}</div>`).join('')}
      ${'<div></div>'.repeat(firstDay)}`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=dates[ds];
    const isToday=d===now.getDate();
    cal+=`<div style="padding:4px;border-radius:4px;font-size:12px;${isToday?'border:2px solid var(--red);font-weight:700;':''}${has?'background:rgba(237,28,36,.15);color:var(--red);font-weight:700;cursor:pointer':''}" ${has?`title="${has.join(', ')}"`:''}>${d}${has?`<div style="font-size:7px;line-height:1.1">${has.length} prod</div>`:''}</div>`;
  }
  cal+=`</div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
      <div style="font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:6px">Produções agendadas:</div>
      ${Object.entries(dates).sort().map(([d,titles])=>`<div style="font-size:11px;padding:3px 0"><span style="color:var(--red);font-weight:700;font-family:var(--mono)">${d.substring(8,10)}/${d.substring(5,7)}</span> — ${titles.join(', ')}</div>`).join('')||'<div style="font-size:11px;color:var(--txt3)">Nenhuma produção agendada este mês</div>'}
    </div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',cal);
}

async function exportBudgetPDF(reqId){

function calcBudget(){
  const v=id=>{const el=$(id);return el?parseFloat(el.value)||0:0};
  const el=id=>$(id);
  // Auto-calculated costs from operational inputs
  const crewQty=v('bg-crew-qty'),crewDays=v('bg-crew-days');
  const crewPeriod=$('bg-crew-period')?parseFloat($('bg-crew-period').value)||1:1;
  const crewExtra=$('bg-crew-extra')?.checked?1.35:1;
  const crewCost=crewQty*crewDays*crewPeriod*getCostRate('crew_daily_rate')*crewExtra;
  const travelCost=v('bg-travel-km')*getCostRate('travel_km')+v('bg-travel-trips')*getCostRate('travel_flat');
  const foodCost=crewQty*crewDays*crewPeriod*getCostRate('food_per_person');
  const editCost=v('bg-edit-hrs')*getCostRate('edit_hour_rate');
  const motionCost=v('bg-motion-hrs')*getCostRate('motion_hour_rate');
  const colorCost=v('bg-color-qty')*getCostRate('color_grade_flat');
  const audioCost=v('bg-audio-qty')*getCostRate('audio_mix_flat');
  // Show sub-totals
  if(el('bg-crew-total'))el('bg-crew-total').textContent=fMoney(crewCost);
  if(el('bg-travel-total'))el('bg-travel-total').textContent=fMoney(travelCost);
  if(el('bg-food-total'))el('bg-food-total').textContent=fMoney(foodCost);
  // Manual costs
  const manualCosts=v('bg-equip')+v('bg-talent')+v('bg-location')+v('bg-other');
  const costs=crewCost+travelCost+foodCost+editCost+motionCost+colorCost+audioCost+manualCosts;
  if(el('bg-total-cost'))el('bg-total-cost').textContent=fMoney(costs);
  if(el('bg-fee-cost-display'))el('bg-fee-cost-display').textContent=fMoney(costs);
  
  const price=v('bg-suggested-price');
  const taxPct=v('bg-tax')/100;
  const taxAmt=price*taxPct;
  if(el('bg-tax-val'))el('bg-tax-val').textContent=fMoney(taxAmt);
  if(el('bg-price-display'))el('bg-price-display').textContent=fMoney(price);
  
  // LUCRO = Preço - Impostos - Custos
  const profit=price-taxAmt-costs;
  const profitPct=price>0?(profit/price)*100:0;
  
  // REGRA DE OURO: Comissão só existe se tem lucro
  let commAcc=0,commLdr=0,accPctLabel='sem lucro';
  if(profit>0){
    const curMonth=new Date().toISOString().substring(0,7);
    const accMembers=S.members.filter(m=>m.access_level==='account');
    let bestPct=0.10;
    accMembers.forEach(a=>{
      const sc=S.scores.find(s=>s.account_id===a.id&&s.month===curMonth);
      if(sc){const pct=scorePctDirect(Number(sc.final_score),sc.block_status);if(pct>bestPct)bestPct=pct}
    });
    commAcc=profit*bestPct;
    commLdr=profit*0.10;
    accPctLabel=`${(bestPct*100).toFixed(0)}% do lucro`;
  }
  
  // Receita TGT = Lucro - Comissões
  const receitaTGT=profit-commAcc-commLdr;
  const receitaTGTPct=price>0?(receitaTGT/price)*100:0;
  if(el('bg-receita-tgt')){el('bg-receita-tgt').textContent=fMoney(receitaTGT);el('bg-receita-tgt').style.color=receitaTGT>=0?'var(--prod)':'var(--red)'}
  if(el('bg-receita-tgt-pct')){el('bg-receita-tgt-pct').textContent=receitaTGTPct.toFixed(1)+'% do preço';el('bg-receita-tgt-pct').style.color=receitaTGT>=0?'var(--txt2)':'var(--red)'}
  if(el('bg-tax-display'))el('bg-tax-display').textContent=fMoney(taxAmt);
  if(el('bg-comm-acc-val')){el('bg-comm-acc-val').textContent=fMoney(commAcc);el('bg-comm-acc-val').style.color=commAcc>0?'var(--t1)':'var(--red)'}
  if(el('bg-comm-acc-info'))el('bg-comm-acc-info').textContent=accPctLabel;
  if(el('bg-comm-ldr-val')){el('bg-comm-ldr-val').textContent=fMoney(commLdr);el('bg-comm-ldr-val').style.color=commLdr>0?'var(--pack)':'var(--red)'}
  
  const alertEl=el('bg-profit-alert');
  if(alertEl){
    if(price>0&&profit<=0)alertEl.innerHTML='<div style="background:rgba(237,28,36,.1);border:2px solid rgba(237,28,36,.3);border-radius:var(--radius);padding:12px 16px;text-align:center"><div style="font-size:13px;font-weight:800;color:var(--red)">⚠ Produção deficitária — sem distribuição de comissão</div><div style="font-size:11px;color:var(--txt2);margin-top:4px">Custos + impostos excedem o preço. Revise os custos ou aumente o preço.</div></div>';
    else if(price>0&&profitPct<15)alertEl.innerHTML='<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius);padding:10px 14px;text-align:center;font-size:11px;color:var(--pack)">Margem baixa ('+profitPct.toFixed(1)+'%). Considere ajustar.</div>';
    else alertEl.innerHTML='';
  }
  
}


function calcBudgetFromReceita(){
  const v=id=>{const el=$(id);return el?parseFloat(el.value)||0:0};
  const crewPeriod=$('bg-crew-period')?parseFloat($('bg-crew-period').value)||1:1;
  const crewExtra=$('bg-crew-extra')?.checked?1.35:1;
  const crewCost=v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*getCostRate('crew_daily_rate')*crewExtra;
  const travelCost=v('bg-travel-km')*getCostRate('travel_km')+v('bg-travel-trips')*getCostRate('travel_flat');
  const foodCost=v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*getCostRate('food_per_person');
  const costs=crewCost+travelCost+foodCost+v('bg-edit-hrs')*getCostRate('edit_hour_rate')+v('bg-motion-hrs')*getCostRate('motion_hour_rate')+v('bg-color-qty')*getCostRate('color_grade_flat')+v('bg-audio-qty')*getCostRate('audio_mix_flat')+v('bg-equip')+v('bg-talent')+v('bg-location')+v('bg-other');
  const receita=v('bg-receita');
  const taxPct=v('bg-tax')/100;
  // Preço = (Custos + Receita desejada) / (1 - taxPct)
  const divisor=1-taxPct;
  const price=divisor>0?Math.round((costs+receita)/divisor):0;
  if($('bg-suggested-price'))$('bg-suggested-price').value=price;
  if($('bg-margin-input')&&price>0)$('bg-margin-input').value=Math.round(receita/price*100);
  calcBudget();
}

}

function calcBudgetFromMarginInput(){
  const v=id=>{const el=$(id);return el?parseFloat(el.value)||0:0};
  const crewPeriod=$('bg-crew-period')?parseFloat($('bg-crew-period').value)||1:1;
  const crewExtra=$('bg-crew-extra')?.checked?1.35:1;
  const crewCost=v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*getCostRate('crew_daily_rate')*crewExtra;
  const travelCost=v('bg-travel-km')*getCostRate('travel_km')+v('bg-travel-trips')*getCostRate('travel_flat');
  const foodCost=v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*getCostRate('food_per_person');
  const costs=crewCost+travelCost+foodCost+v('bg-edit-hrs')*getCostRate('edit_hour_rate')+v('bg-motion-hrs')*getCostRate('motion_hour_rate')+v('bg-color-qty')*getCostRate('color_grade_flat')+v('bg-audio-qty')*getCostRate('audio_mix_flat')+v('bg-equip')+v('bg-talent')+v('bg-location')+v('bg-other');
  const marginPct=v('bg-margin-input')/100;
  const taxPct=v('bg-tax')/100;
  // Preço = Custos / (1 - taxPct - marginPct)
  const divisor=1-taxPct-marginPct;
  const price=divisor>0?Math.round(costs/divisor):0;
  const receita=Math.round(price*marginPct);
  if($('bg-suggested-price'))$('bg-suggested-price').value=price;
  if($('bg-receita'))$('bg-receita').value=receita;
  calcBudget();
}

async function saveBudget(reqId,budgetId){
  const v=id=>{const el=$(id);return el?parseFloat(el.value)||0:0};
  const n=id=>{const el=$(id);return el?(el.value||'').trim()||null:null};
  const price=v('bg-suggested-price');
  // Compute costs from operational inputs
  const crewPeriod=$('bg-crew-period')?parseFloat($('bg-crew-period').value)||1:1;
  const crewExtra=$('bg-crew-extra')?.checked?1.35:1;
  const crewCost=v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*getCostRate('crew_daily_rate')*crewExtra;
  const travelCost=v('bg-travel-km')*getCostRate('travel_km')+v('bg-travel-trips')*getCostRate('travel_flat');
  const foodCost=v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*getCostRate('food_per_person');
  const editCost=v('bg-edit-hrs')*getCostRate('edit_hour_rate');
  const motionCost=v('bg-motion-hrs')*getCostRate('motion_hour_rate');
  const colorCost=v('bg-color-qty')*getCostRate('color_grade_flat');
  const audioCost=v('bg-audio-qty')*getCostRate('audio_mix_flat');
  const costs=crewCost+travelCost+foodCost+editCost+motionCost+colorCost+audioCost+v('bg-equip')+v('bg-talent')+v('bg-location')+v('bg-other');
  const taxPct=v('bg-tax')/100;
  const taxAmt=price*taxPct;
  const profit=price-taxAmt-costs;
  
  // Commissions based on profit (regra de ouro)
  let commAccPct=0,commAccVal=0,commLdrPct=0,commLdrVal=0;
  if(profit>0){
    const curMonth=new Date().toISOString().substring(0,7);
    let bestPct=0.10;
    S.members.filter(m=>m.access_level==='account').forEach(a=>{
      const sc=S.scores.find(s=>s.account_id===a.id&&s.month===curMonth);
      if(sc){const p=scorePctDirect(Number(sc.final_score),sc.block_status);if(p>bestPct)bestPct=p}
    });
    commAccPct=bestPct;commAccVal=profit*bestPct;
    commLdrPct=0.10;commLdrVal=profit*0.10;
  }
  
  const data={
    request_id:reqId,prepared_by:S.user.id,
    has_external_budget:false,client_price:price,
    cost_crew_daily:crewCost,cost_travel:travelCost,cost_food:foodCost,
    cost_equipment:v('bg-equip'),cost_talent:v('bg-talent'),cost_location:v('bg-location'),
    cost_other:v('bg-other'),cost_other_desc:n('bg-other-desc'),
    cost_edit:editCost,cost_motion:motionCost,cost_color_grade:colorCost,cost_audio:audioCost,
    tax_rate:taxPct,
    commission_account_pct:commAccPct,commission_account_value:commAccVal,
    commission_leader_pct:commLdrPct,commission_leader_value:commLdrVal,
    margin_tgt_value:profit-commAccVal-commLdrVal,
    margin_tgt_pct:price>0?((profit-commAccVal-commLdrVal)/price)*100:0,
    leader_notes:n('bg-notes'),
    refined_capture_hours:v('bg-crew-qty')*v('bg-crew-days')*crewPeriod*8,refined_edit_hours:v('bg-edit-hrs'),refined_post_hours:v('bg-motion-hrs'),
    budget_status:'draft',updated_at:new Date().toISOString()
  };
  const capDate=n('bg-cap-date');if(capDate)data.suggested_capture_date=capDate;
  const delDate=n('bg-del-date');if(delDate)data.suggested_delivery_date=delDate;
  try{
    if(budgetId){
      await sbPatch('av_budgets',`id=eq.${budgetId}`,data);
    }else{
      try{await sbPost('av_budgets',data)}catch(e2){
        if(e2.message.includes('409')){
          // Budget already exists for this request — find and patch instead
          const existing=await sbGet('av_budgets',`request_id=eq.${reqId}`);
          if(existing.length)await sbPatch('av_budgets',`id=eq.${existing[0].id}`,data);
          else throw e2;
        }else throw e2;
      }
    }
    toast('Orçamento salvo');
    // Auto-advance status if still pending
    const req=S.av_requests.find(r=>r.id===reqId);
    if(req&&req.status==='pending_leader_review'){
      await sbPatch('av_requests',`id=eq.${reqId}`,{status:'leader_reviewing',updated_at:new Date().toISOString()});
      S.av_requests=await sbGet('av_requests','order=created_at.desc');
      if(req.monday_item_id)mondayUpdateProdStatus({...req,monday_item_id:req.monday_item_id},'leader_reviewing');
      buildNav();
    }
  }catch(e){toast('Erro: '+e.message,'error')}
}

      catEquip.forEach(eq=>{
        const pi=reserved.find(p=>p.equipment_id===eq.id);
        const busyOther=busyByOthers.includes(eq.id);
        const isReserved=!!pi&&pi.status!=='checked_in';
        const isCheckedOut=pi?.status==='checked_out';
        const isReturned=pi?.status==='checked_in';
        
        let border='var(--border)',bg='var(--bg3)',statusText='Disponível',statusColor='var(--prod)';
        if(busyOther){border='var(--txt3)';bg='var(--bg)';statusText='Em outra prod';statusColor='var(--txt3)'}
        else if(isCheckedOut){border='var(--red)';bg='rgba(237,28,36,.08)';statusText='Em uso';statusColor='var(--red)'}
        else if(isReserved){border='var(--pack)';bg='rgba(245,158,11,.08)';statusText='Reservado';statusColor='var(--pack)'}
        
        html+=`<div style="padding:6px 8px;border-radius:var(--radius);border:2px solid ${border};background:${bg};display:flex;align-items:center;justify-content:space-between;gap:4px">`;
        html+=`<div><div style="font-size:11px;font-weight:600">${eq.name}</div><div style="font-size:9px;color:var(--txt3)">${eq.internal_code||''}</div></div>`;
        html+=`<div style="display:flex;align-items:center;gap:4px">`;
        html+=`<span style="font-size:8px;color:${statusColor};font-weight:700">${statusText}</span>`;
        
        if(canEdit){
          if(!isReserved&&!busyOther)html+=`<button class="pill" style="font-size:8px;padding:2px 6px" onclick="addProdEquipment('${reqId}','${eq.id}')">+</button>`;
          if(isReserved&&!isCheckedOut)html+=`<button class="pill" style="font-size:8px;padding:2px 6px" onclick="checkoutEquipment('${pi.id}','${reqId}')">▶</button>`;
          if(isCheckedOut)html+=`<button class="pill" style="font-size:8px;padding:2px 6px;background:var(--prod);color:var(--bg);border-color:var(--prod)" onclick="checkinEquipment('${pi.id}','${eq.id}','${reqId}')">✓</button>`;
          if(isReserved&&!isCheckedOut)html+=`<button style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:10px" onclick="releaseProdEquipment('${pi.id}','${eq.id}','${reqId}')">✕</button>`;
        }
        html+=`</div></div>`;
      });
      html+=`</div></div>`;
    });
    
    listEl.innerHTML=html||'<span style="font-size:12px;color:var(--txt3)">Nenhum equipamento cadastrado</span>';
  }catch(e){console.error('loadProdEquipment error:',e)}
}

async function addProdEquipment(reqId,equipId){
  try{
    await sbPost('production_items',{av_request_id:reqId,equipment_id:equipId,status:'reserved',reserved_from:new Date().toISOString()});
    await sbPatch('equipment',`id=eq.${equipId}`,{status:'reserved'});
    S.equipment=await sbGet('equipment','order=name');
    await loadProdEquipment(reqId);toast('Reservado');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function checkoutEquipment(piId,reqId){
  try{
    await sbPatch('production_items',`id=eq.${piId}`,{status:'checked_out',checkout_at:new Date().toISOString()});
    await loadProdEquipment(reqId);toast('Check-out realizado');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function checkinEquipment(piId,equipId,reqId){
  try{
    await sbPatch('production_items',`id=eq.${piId}`,{status:'checked_in',checkin_at:new Date().toISOString()});
    await sbPatch('equipment',`id=eq.${equipId}`,{status:'available'});
    S.equipment=await sbGet('equipment','order=name');
    await loadProdEquipment(reqId);toast('Equipamento devolvido');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function releaseProdEquipment(piId,equipId,reqId){
  if(!confirm('Liberar este equipamento da produção?'))return;
  try{
    await sbPatch('production_items',`id=eq.${piId}`,{status:'checked_in'});
    await sbPatch('equipment',`id=eq.${equipId}`,{status:'available'});
    S.equipment=await sbGet('equipment','order=name');
    await loadProdEquipment(reqId);toast('Equipamento liberado');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function rejectRequest(id,feedback){
  try{
    await sbPatch('av_requests',`id=eq.${id}`,{status:'account_rejected',rejection_feedback:feedback,updated_at:new Date().toISOString()});
    S.av_requests=await sbGet('av_requests','order=created_at.desc');
    const req=S.av_requests.find(r=>r.id===id);
    if(req)mondayUpdateProdStatus(req,'account_rejected');
    closeM('m-req');toast('Orçamento rejeitado — líder será notificado');buildNav();renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function changeRequestStatus(id,newStatus){
  if(newStatus==='cancelled'&&!confirm('Cancelar esta solicitação?'))return;
  try{
    await sbPatch('av_requests',`id=eq.${id}`,{status:newStatus,updated_at:new Date().toISOString()});
    S.av_requests=await sbGet('av_requests','order=created_at.desc');
    // Sync status to Monday
    const req=S.av_requests.find(r=>r.id===id);
    if(req)mondayUpdateProdStatus(req,newStatus);
    closeM('m-req');
    toast(`Status atualizado: ${AV_STATUSES[newStatus]||newStatus}`);
    buildNav();
    renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),calView='month';

async function pgProdCalendar(el){
  const y=calYear,m=calMonth;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const monthName=first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const today=new Date();
  const todayStr=today.toISOString().substring(0,10);
  
  // Build calendar events from av_requests + av_budgets
  const STATUS_COLORS={
    pending_leader_review:'#579bfc',leader_reviewing:'#579bfc',
    budget_sent:'#ffcb00',account_approved:'#fdab3d',
    scheduling:'#037f4c',scheduled:'#037f4c',
    in_capture:'#e63946',in_edit:'#9d50dd',in_review:'#ff007f',
    delivered:'#00c875',cancelled:'#df2f4a'
  };
  const events=[];
  S.av_requests.filter(r=>r.status!=='cancelled').forEach(r=>{
    const bgt=S.av_budgets.find(b=>b.request_id===r.id);
    const captDate=bgt?.suggested_capture_date?.substring(0,10);
    const delDate=bgt?.suggested_delivery_date?.substring(0,10);
    const deadline=r.desired_deadline?.substring(0,10);
    const date=captDate||deadline;
    if(date)events.push({date,title:r.title,status:r.status,id:r.id,type:'captação',color:STATUS_COLORS[r.status]||'#9d9d9c'});
    if(delDate&&delDate!==date)events.push({date:delDate,title:r.title,status:r.status,id:r.id,type:'entrega',color:'#00c875'});
  });

  if(calView==='week'){
    const ref=new Date(y,m,today.getMonth()===m&&today.getFullYear()===y?today.getDate():1);
    const dow=ref.getDay()||7;const weekStart=new Date(ref);weekStart.setDate(ref.getDate()-(dow-1));
    const weekDays=[];for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);weekDays.push(d)}
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn btn-o btn-sm" onclick="calWeekNav(-1)">◀</button>
          <h3 style="text-transform:capitalize;min-width:200px;text-align:center">${weekDays[0].toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} — ${weekDays[6].toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}</h3>
          <button class="btn btn-o btn-sm" onclick="calWeekNav(1)">▶</button>
        </div>
        <div class="pills" style="margin-bottom:0">
          <div class="pill ${calView==='month'?'active':''}" onclick="calView='month';renderPage()">Mês</div>
          <div class="pill ${calView==='week'?'active':''}" onclick="calView='week';renderPage()">Semana</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:var(--radius);overflow:hidden">
        ${weekDays.map(d=>{
          const ds=d.toISOString().substring(0,10);const isToday=ds===todayStr;
          const dayEvts=events.filter(e=>e.date===ds);
          return`<div style="background:var(--bg2);min-height:200px;padding:10px;${isToday?'border:2px solid var(--red);border-radius:4px;':''}">
            <div style="font-size:11px;color:var(--txt2);margin-bottom:4px">${d.toLocaleDateString('pt-BR',{weekday:'short'})}</div>
            <div style="font-size:18px;font-weight:700;${isToday?'color:var(--red)':''};margin-bottom:8px">${d.getDate()}</div>
            ${dayEvts.map(e=>`<div style="padding:4px 8px;background:${e.color}22;border-left:3px solid ${e.color};border-radius:3px;margin-bottom:4px;font-size:10px;cursor:pointer" onclick="showRequestDetail('${e.id}')" title="${AV_STATUSES[e.status]||e.status}"><span style="font-weight:700">${e.title}</span><div style="font-size:8px;color:var(--txt3);margin-top:1px">${e.type} · ${AV_STATUSES[e.status]||e.status}</div></div>`).join('')}
          </div>`}).join('')}
      </div>`;
    return;
  }
  
  // Month view
  const startDay=(first.getDay()||7);const days=[];
  for(let i=2-startDay;i<=last.getDate();i++)days.push({num:i,inMonth:i>=1&&i<=last.getDate()});
  while(days.length%7!==0)days.push({num:days.length+2-startDay,inMonth:false});
  
  // Legend
  const legend='<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;font-size:10px">'+
    [['#579bfc','Aguardando'],['#ffcb00','Orçamento'],['#fdab3d','Aprovado'],['#037f4c','Agendado'],['#e63946','Em Captação'],['#9d50dd','Em Edição'],['#00c875','Entrega']].map(([c,l])=>
    '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:'+c+'"></div>'+l+'</div>').join('')+'</div>';
  
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-o btn-sm" onclick="calNav(-1)">◀</button>
        <h3 style="text-transform:capitalize;min-width:220px;text-align:center">${monthName}</h3>
        <button class="btn btn-o btn-sm" onclick="calNav(1)">▶</button>
        <button class="btn btn-o btn-sm" onclick="calYear=${today.getFullYear()};calMonth=${today.getMonth()};renderPage()">Hoje</button>
      </div>
      <div class="pills" style="margin-bottom:0">
        <div class="pill ${calView==='month'?'active':''}" onclick="calView='month';renderPage()">Mês</div>
        <div class="pill ${calView==='week'?'active':''}" onclick="calView='week';renderPage()">Semana</div>
      </div>
    </div>
    ${legend}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:var(--radius);overflow:hidden">
      ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div style="padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--txt2);background:var(--bg2)">${d}</div>`).join('')}
      ${days.map(d=>{
        const dt=d.inMonth?new Date(y,m,d.num):null;
        const ds=dt?dt.toISOString().substring(0,10):'';
        const isToday=ds===todayStr;
        const dayEvts=d.inMonth?events.filter(e=>e.date===ds):[];
        return`<div style="padding:6px;min-height:80px;background:${d.inMonth?'var(--bg2)':'var(--bg)'};${isToday?'border:2px solid var(--red);border-radius:4px;':''}">
          <div style="font-size:12px;${d.inMonth?'':'color:var(--txt3)'}${isToday?';color:var(--red);font-weight:700':''};">${d.inMonth?d.num:''}</div>
          ${dayEvts.map(e=>`<div style="padding:2px 5px;background:${e.color}22;border-left:2px solid ${e.color};border-radius:2px;margin-top:3px;font-size:9px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onclick="showRequestDetail('${e.id}')" title="${e.title} — ${e.type} — ${AV_STATUSES[e.status]||e.status}"><span style="font-weight:600">${e.title.substring(0,15)}${e.title.length>15?'…':''}</span></div>`).join('')}
        </div>`}).join('')}
    </div>`;
}

function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderPage()}
function calWeekNav(dir){
  // Shift current reference date by 7 days
  const ref=new Date(calYear,calMonth,new Date().getDate());
  ref.setDate(ref.getDate()+dir*7);
  calYear=ref.getFullYear();calMonth=ref.getMonth();
  renderPage();
}

function getMyEligibility(){
  const curMonth=new Date().toISOString().substring(0,7);
  const sc=S.scores.find(s=>s.account_id===S.user.id&&s.month===curMonth);
  if(!sc)return{pct:0,label:'Sem avaliação',cls:'',color:'var(--txt3)',score:null,commRules:S.commission_rules};
  const elig=getEligibility(Number(sc.final_score),sc.block_status);
  elig.score=Number(sc.final_score);elig.commRules=S.commission_rules;
  return elig;
}

let extrasMode='budget'; // 'budget' or 'calc'

function setExtrasMode(mode){
  extrasMode=mode;

function setMargin(pct){
  if($('ex-margin-pct'))$('ex-margin-pct').value=pct;

function calcExtrasFromReceita(){
  // Receita desejada → calcula preço
  const ct=parseFloat($('ex-ctime')?.value)||0;
  const cd=parseFloat($('ex-cdiv')?.value)||0;
  const receita=parseFloat($('ex-receita')?.value)||0;
  const elig=getMyEligibility();
  const pct=scorePctDirect(elig.score,elig.blockStatus);
  const ldrPct=pct>0?0.10:0;
  // Price = (costs + receita) / (1 - taxRate - accPct - ldrPct)
  const taxRate=0.18;
  const divisor=1-taxRate-pct-ldrPct;
  const price=divisor>0?Math.round((ct+cd+receita)/divisor):0;
  if($('ex-budget'))$('ex-budget').value=price;
  if($('ex-calc-price'))$('ex-calc-price').textContent=fMoney(price);
  const imp=price*taxRate;const base=Math.max(0,price-imp-ct-cd);
  if($('ex-calc-breakdown'))$('ex-calc-breakdown').textContent=`${fMoney(ct+cd)} custos + ${fMoney(Math.round(imp))} impostos + ${fMoney(Math.round(base*pct))} account + ${fMoney(Math.round(base*ldrPct))} líder + ${fMoney(receita)} receita`;
  // Update margin field
  if($('ex-margin-pct')&&price>0)$('ex-margin-pct').value=Math.round(receita/price*100);
  calcExtras();
}

function calcExtrasFromMargin(){
  // Margem % → calcula receita → calcula preço
  const ct=parseFloat($('ex-ctime')?.value)||0;
  const cd=parseFloat($('ex-cdiv')?.value)||0;
  const marginPct=parseFloat($('ex-margin-pct')?.value)||0;
  const elig=getMyEligibility();
  const pct=scorePctDirect(elig.score,elig.blockStatus);
  const ldrPct=pct>0?0.10:0;
  const taxRate=0.18;
  // Price = costs / (1 - tax - acc - ldr - marginPct/100)
  const divisor=1-taxRate-pct-ldrPct-(marginPct/100);
  const price=divisor>0?Math.round((ct+cd)/divisor):0;
  const receita=Math.round(price*(marginPct/100));
  if($('ex-receita'))$('ex-receita').value=receita;
  if($('ex-budget'))$('ex-budget').value=price;
  if($('ex-calc-price'))$('ex-calc-price').textContent=fMoney(price);
  const imp=price*taxRate;const base=Math.max(0,price-imp-ct-cd);
  if($('ex-calc-breakdown'))$('ex-calc-breakdown').textContent=`${fMoney(ct+cd)} custos + ${fMoney(Math.round(imp))} impostos + ${fMoney(Math.round(base*pct))} account + ${fMoney(Math.round(base*ldrPct))} líder + ${fMoney(receita)} receita`;
  calcExtras();
}

function scorePctDirect(score,blockStatus){
  if(blockStatus&&blockStatus!=='none')return 0;
  if(score===null||score===undefined)return 0;
  if(score>=9)return 0.20;
  if(score>=7.5)return 0.15;
  if(score>=6)return 0.10;
  return 0;
}

function calcExtras(){
  const b=parseFloat($('ex-budget')?.value)||0;
  const ct=parseFloat($('ex-ctime')?.value)||0;
  const cd=parseFloat($('ex-cdiv')?.value)||0;
  const imp=b*0.18;
  const base=Math.max(0,b-imp-ct-cd);
  const elig=getMyEligibility();
  const pct=scorePctDirect(elig.score,elig.blockStatus);
  const acc=base*pct;
  const ldr=base*(pct>0?0.10:0); // líder PROD gets 10% when account is eligible
  const tgt=base-acc-ldr;
  
  if($('ex-pv-b'))$('ex-pv-b').textContent=fMoney(b);
  if($('ex-pv-i'))$('ex-pv-i').textContent='('+fMoney(imp)+')';
  if($('ex-pv-ct'))$('ex-pv-ct').textContent='('+fMoney(ct)+')';
  if($('ex-pv-cd'))$('ex-pv-cd').textContent='('+fMoney(cd)+')';
  if($('ex-pv-base'))$('ex-pv-base').textContent=fMoney(base);
  if($('ex-pv-acc'))$('ex-pv-acc').textContent=fMoney(acc);
  if($('ex-pv-acc-s'))$('ex-pv-acc-s').textContent=`${(pct*100).toFixed(0)}% — Score ${elig.score!==null?elig.score.toFixed(1):'—'}`;
  if($('ex-pv-ldr'))$('ex-pv-ldr').textContent=fMoney(ldr);
  if($('ex-pv-tgt'))$('ex-pv-tgt').textContent=fMoney(tgt);
  if($('ex-pv-tgt-s'))$('ex-pv-tgt-s').textContent=b>0?Math.round(tgt/b*100)+'% do budget':'';
  if($('ex-pv-score')){
    const s=elig.score;
    $('ex-pv-score').textContent=s!==null?s.toFixed(1):'—';
    $('ex-pv-score').style.color=elig.color;
  }
  if($('ex-pv-elig'))$('ex-pv-elig').innerHTML=`<span class="bg ${elig.cls}" style="font-size:10px">${elig.label}</span> <span style="font-weight:700;color:${elig.color}">${(pct*100).toFixed(0)}%</span>`;
  
  let alert='';
  if(pct===0&&b>0)alert=`<div style="background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--red)">Score abaixo de 6.0 ou bloqueio ativo — comissão não será aplicada.</div>`;
  else if(pct===0.10&&b>0)alert=`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--pack)">Score 6.0–7.4 → 10%. Melhore para 7.5+ e suba para 15%.</div>`;
  if($('ex-alert'))$('ex-alert').innerHTML=alert;
}

  const tipo=$('ex-tipo')?.value;
  const impacto=$('ex-impacto')?.value;

  if(!nome||!cliente||!tipo||b<=0){toast('Preencha nome, cliente, tipo e budget','error');return}
  const imp=b*0.18;const base=Math.max(0,b-imp-ct-cd);
  const elig=getMyEligibility();
  const pct=scorePctDirect(elig.score,elig.blockStatus);
  const acc=Math.round(base*pct);
  const ldr=Math.round(base*(pct>0?0.10:0));
  const tgt=Math.round(base-acc-ldr);
  const btn=$('ex-submit');btn.disabled=true;
  const toastEl=$('ex-toast');
  toastEl.innerHTML='<div style="background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--t1)">Enviando para o Monday...</div>';
  const itemName=`${S.user.name.split(' ')[0]} · ${cliente} · ${nome}`.replace(/"/g,"'");
  try{
    const payload={
      account:S.user.name.split(' ')[0],
      nome:itemName,
      cliente,tipo,impacto:impacto.split(' — ')[0],
      budget:b,custo_time:ct,custos_div:cd,
      base_comissao:Math.round(base),
      comissao_account:acc,comissao_leader:ldr,margem_tgt:tgt,
      stakeholders:stake,obs,
      score:elig.score,elegibilidade:elig.label,pct_efetivo:pct
    };
    const res=await fetch(MAKE_EXTRAS_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok)throw new Error('Webhook retornou '+res.status);
    toastEl.innerHTML='<div style="background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--prod)">Lançado com sucesso no Monday!</div>';
    setTimeout(()=>toastEl.innerHTML='',4000);
    // Clear form
    ['ex-nome','ex-budget','ex-ctime','ex-cdiv','ex-stake','ex-obs'].forEach(id=>{if($(id))$(id).value=''});
    calcExtras();
  }catch(e){
    toastEl.innerHTML=`<div style="background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--red)">Erro: ${e.message}</div>`;
  }
  btn.disabled=false;
}

    <div class="f-field">

    </div>
  `;
  
  // Show/hide action buttons based on state
  const btnA=$('m-qc-approve'),btnR=$('m-qc-reject');
  if(r.qc_status==='pending'){
    btnA.style.display='';btnR.style.display='';
    btnA.onclick=()=>qcAct('approved');
    btnR.onclick=()=>qcAct('rejected');
  }else{
    btnA.style.display='none';btnR.style.display='none';
  }

async function qcAct(newStatus){
  if(!qcCurrentId)return;
  const r=S.qc_requests.find(x=>x.id===qcCurrentId);
  if(!r){toast('Demanda não encontrada','error');return}
  const notes=($('qc-notes')?.value||'').trim();
  if(newStatus==='rejected'&&!notes){toast('Justifique a reprovação nas notas','error');return}
  
  // 1) Update Supabase
  try{
    await sbPatch('qc_requests',`id=eq.${qcCurrentId}`,{
      qc_status:newStatus,
      reviewer_id:S.user.id,
      reviewer_name:S.user.name,
      notes:notes||null,
      reviewed_at:new Date().toISOString()
    });
  }catch(e){toast('Erro ao salvar: '+e.message,'error');return}
  
  // 2) Update Monday — ONLY for rejected (push back to "Design REPROV")
  //    For approved, designer already set "Design Check" manually — no change needed
  if(newStatus==='rejected'){
    const board=QC_BOARDS.find(b=>b.board_id===r.monday_board_id);
    if(board){
      try{
        const mutQ=`mutation{change_simple_column_value(board_id:${board.board_id},item_id:${r.monday_item_id},column_id:"${board.dc_col}",value:"Design REPROV"){id}}`;
        await fetch('https://api.monday.com/v2',{method:'POST',headers:{'Content-Type':'application/json','Authorization':MONDAY_API_TOKEN,'API-Version':'2024-10'},body:JSON.stringify({query:mutQ})});
      }catch(e){console.error('Monday sync failed:',e)}
    }
  }
  
  toast(newStatus==='approved'?'Aprovado':'Reprovado','success');
  closeM('m-qc');
  qcCurrentId=null;
  await loadData();
  buildNav();
  renderPage();
}

function populateClientsAgrupado(sel){
  if(!sel||!window.CLIENTES)return;
  const placeholder=sel.querySelector('option[disabled]');
  sel.innerHTML='';if(placeholder)sel.appendChild(placeholder);
  const TL={'tgt':'Estúdio TGT','t12':'Time 1 & 2','t3':'Time 3','t4':'Time 4'};
  const TO=['tgt','t12','t3','t4'];
  const grupos={};
  Object.entries(window.CLIENTES).forEach(([key,data])=>{
    const t=data.time||'sem_time';if(!grupos[t])grupos[t]=[];grupos[t].push({key,data});
  });
  Object.values(grupos).forEach(a=>a.sort((x,y)=>{if(!!x.data.guia===!!y.data.guia)return x.data.nome.localeCompare(y.data.nome);return x.data.guia?-1:1}));
  TO.forEach(t=>{
    if(!grupos[t]||!grupos[t].length)return;
    const og=document.createElement('optgroup');og.label=TL[t]||t;
    grupos[t].forEach(({key,data})=>{const o=document.createElement('option');o.value=key;o.textContent=data.guia?data.nome:`${data.nome}  ·  (sem guia)`;og.appendChild(o)});
    sel.appendChild(og);
  });
  if(grupos['sem_time']&&grupos['sem_time'].length){
    const og=document.createElement('optgroup');og.label='Outros';
    grupos['sem_time'].forEach(({key,data})=>{const o=document.createElement('option');o.value=key;o.textContent=data.guia?data.nome:`${data.nome}  ·  (sem guia)`;og.appendChild(o)});
    sel.appendChild(og);
  }
}

let bfTab='text',bfFileState=null;
const BF_MAX_FILE=10*1024*1024,BF_MAX_CHARS=50000;

function bfSwitchTab(t){
  bfTab=t;
  document.querySelectorAll('.ag-tab').forEach(b=>b.classList.toggle('ag-tab-active',b.dataset.tab===t));

}

function bfDropClick(){if(!$('bf-drop').classList.contains('disabled'))$('bf-file').click()}

function bfOnClient(){
  const k=$('bf-client').value,c=window.CLIENTES[k];
  const w=$('bf-warn');
  if(c&&!c.guia)w.textContent=`⚠ ${c.nome} ainda não tem guia de marca cadastrado. Análise roda em modo genérico.`;
  else w.textContent='';

}

function bfUpdate(){
  const clientOk=!!$('bf-client')?.value;
  let len=0,textOk=false;
  if(bfTab==='text'){len=$('bf-text')?.value.length||0;textOk=len>=30}
  else{len=bfFileState?.extractedText?.length||0;textOk=!!bfFileState&&len>=30}
  if($('bf-counter'))$('bf-counter').textContent=`${len.toLocaleString('pt-BR')} caracteres`;
  const blocked=!(clientOk&&textOk);
  if($('bf-submit'))$('bf-submit').disabled=blocked;
  const hint=$('bf-hint');
  if(hint){
    let m='';
    if(!clientOk&&!textOk)m=bfTab==='text'?'Selecione o cliente e cole o briefing.':'Selecione o cliente e envie um arquivo.';
    else if(!clientOk)m='Selecione o cliente.';
    else if(!textOk)m=bfTab==='text'?(len===0?'Cole o briefing acima.':`Briefing muito curto (mínimo 30 caracteres — atual: ${len}).`):'Envie um arquivo PDF ou DOCX.';
    hint.textContent=m;
  }
}

function bfClearFile(){

  $('bf-file-prev').style.display='none';$('bf-file-err').textContent='';
  $('bf-file-text').textContent='';$('bf-file-name').textContent='';
  bfUpdate();
}

function bfClear(){
  if(bfTab==='text'){$('bf-text').value='';$('bf-text').focus()}
  else bfClearFile();
  bfUpdate();
}

function bfReset(){

  $('bf-result-content').innerHTML='';
}

// Setup file input listener + drag/drop (idempotent)
function bfSetupFile(){
  const inp=$('bf-file'),dz=$('bf-drop');
  if(!inp||inp.dataset.bound)return;
  inp.dataset.bound='1';
  inp.addEventListener('change',e=>{const f=e.target.files?.[0];if(f)bfHandleFile(f);e.target.value=''});
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();if(!dz.classList.contains('disabled'))dz.classList.add('drag')}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();dz.classList.remove('drag')}));
  dz.addEventListener('drop',e=>{if(dz.classList.contains('disabled'))return;const f=e.dataTransfer?.files?.[0];if(f)bfHandleFile(f)});
}

async function bfHandleFile(file){
  $('bf-file-err').textContent='';
  if(file.size>BF_MAX_FILE){$('bf-file-err').textContent='Arquivo ultrapassa 10MB.';return}
  const n=file.name.toLowerCase();
  const isPdf=file.type==='application/pdf'||n.endsWith('.pdf');
  const isDocx=file.type==='application/vnd.openxmlformats-officedocument.wordprocessingml.document'||n.endsWith('.docx');
  if(!isPdf&&!isDocx){$('bf-file-err').textContent='Formato não suportado. Use PDF ou DOCX.';return}
  $('bf-file-prev').style.display='none';$('bf-file-loading').style.display='';$('bf-drop').classList.add('disabled');
  try{
    let text=isPdf?await bfExtractPdf(file):await bfExtractDocx(file);
    text=(text||'').replace(/\r\n?/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/[ \t]+/g,' ').replace(/^[ \t]+|[ \t]+$/gm,'').trim();
    if(!text||text.length<30)throw new Error('Não foi possível extrair texto suficiente. Arquivo pode ser imagem escaneada.');
    let trunc=false;if(text.length>BF_MAX_CHARS){text=text.slice(0,BF_MAX_CHARS);trunc=true}
    bfFileState={file,extractedText:text};
    $('bf-file-name').textContent=file.name;$('bf-file-text').textContent=text;
    $('bf-file-chars').textContent=`${text.length.toLocaleString('pt-BR')} caracteres${trunc?' (truncado)':''}`;
    $('bf-file-prev').style.display='';
  }catch(e){$('bf-file-err').textContent=e.message||'Erro';bfFileState=null}
  finally{$('bf-file-loading').style.display='none';$('bf-drop').classList.remove('disabled');bfUpdate()}
}

async function bfExtractPdf(file){
  if(typeof pdfjsLib==='undefined')throw new Error('PDF.js não carregou.');
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i),c=await page.getTextContent();
    if(!c.items.length)continue;
    let lastY=null,line=[];const lines=[];
    c.items.forEach(it=>{const y=it.transform?it.transform[5]:null;if(lastY!==null&&Math.abs(y-lastY)>2){lines.push(line.join(' '));line=[]}line.push(it.str);lastY=y});
    if(line.length)lines.push(line.join(' '));
    pages.push(lines.join('\n'));
  }
  return pages.join('\n\n');
}

async function bfExtractDocx(file){
  if(typeof mammoth==='undefined')throw new Error('mammoth.js não carregou.');
  const r=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
  return r.value||'';
}

async function bfSubmit(){
  const k=$('bf-client').value,c=window.CLIENTES?.[k];if(!c)return;
  let briefing='',fonte='texto';
  if(bfTab==='text'){briefing=$('bf-text').value.trim()}
  else{briefing=bfFileState?.extractedText?.trim()||'';fonte=bfFileState?.file?.name||'arquivo'}
  if(briefing.length<30)return;
  const guiaTexto=c.guia&&typeof window.guiaParaTexto==='function'?window.guiaParaTexto(c.guia):null;
  $('bf-result').style.display='none';$('bf-loading').style.display='';$('bf-submit').disabled=true;
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent:'briefing',client:k,payload:{clienteNome:c.nome,briefing,guiaTexto,fonteBriefing:fonte}})});
    const data=await res.json().catch(()=>({}));
    if(!res.ok||!data.ok)throw new Error(data.error||`HTTP ${res.status}`);
    bfRenderResult(data.data,c);
  }catch(e){
    $('bf-result-content').innerHTML=`<div class="ag-res-err"><strong>Não foi possível analisar.</strong>${escapeHtml(e.message||'Erro')}</div>`;
    $('bf-result').style.display='';
  }finally{
    $('bf-loading').style.display='none';$('bf-submit').disabled=false;
    setTimeout(()=>$('bf-result').scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
}

function bfRenderResult(data,c){
  const{tipo_entrega,campos,score,total,resumo,gaps,inconsistencias,proxima_acao}=data;
  const pct=total?Math.round((score/total)*100):0;
  const sm={presente:{i:'✅',cls:'ok'},incompleto:{i:'⚠️',cls:'partial'},ausente:{i:'❌',cls:'missing'}};
  const items=(campos||[]).map(x=>{
    const s=sm[x.status]||sm.ausente;
    return `<li class="ag-checklist-item ${s.cls}"><span class="ag-check-icon">${s.i}</span><div><div class="ag-check-field">${escapeHtml(x.nome||x.id)}</div>${x.valor?`<div class="ag-check-value">${escapeHtml(x.valor)}</div>`:''}<div class="ag-check-note">${escapeHtml(x.nota||'')}</div></div></li>`;
  }).join('');
  const gapsH=(gaps&&gaps.length)?`<section class="ag-res-section"><h3 class="ag-res-title"><span class="ag-dot ag-dot-red"></span>Gaps a resolver</h3><ul class="ag-gap-list">${gaps.map(g=>`<li class="ag-gap-item"><div class="ag-gap-field">${escapeHtml(g.campo||'')}</div><div class="ag-gap-sug">${escapeHtml(g.sugestao||'')}</div></li>`).join('')}</ul></section>`:'';
  const inconsH=(inconsistencias&&inconsistencias.length)?`<section class="ag-res-section"><h3 class="ag-res-title"><span class="ag-dot ag-dot-yellow"></span>Inconsistências com a marca</h3><ul class="ag-incons-list">${inconsistencias.map(i=>`<li class="ag-gap-item"><div class="ag-incons-desc">${escapeHtml(i.descricao||'')}</div><div class="ag-incons-fix"><span class="lbl">Como alinhar:</span> ${escapeHtml(i.como_alinhar||'')}</div></li>`).join('')}</ul></section>`:'';
  const tudoOk=(!gaps||!gaps.length)&&(!inconsistencias||!inconsistencias.length);
  const okH=tudoOk?`<section class="ag-res-section"><h3 class="ag-res-title"><span class="ag-dot ag-dot-green"></span>Briefing completo e alinhado</h3><div class="ag-next">Todos os campos obrigatórios estão presentes e nada contradiz o guia da marca.</div></section>`:'';
  const nextH=proxima_acao?`<section class="ag-res-section"><h3 class="ag-res-title"><span class="ag-dot ag-dot-white"></span>Próxima ação</h3><div class="ag-next">${escapeHtml(proxima_acao)}</div></section>`:'';
  const opH=data.onepager?`<section class="ag-res-section"><h3 class="ag-res-title"><span class="ag-dot ag-dot-red"></span>Onepager para o designer</h3><div style="margin-bottom:12px;color:var(--txt2);font-size:13px">Documento A4 pronto pra passar pro criativo.</div><button class="ag-onepager-btn" id="bf-op-btn">↓ Baixar onepager PDF</button></section>`:'';
  const tipoBadge=tipo_entrega?`<span class="ag-tipo-badge">${escapeHtml(tipo_entrega)}</span>`:'';
  $('bf-result-content').innerHTML=`
    <div class="ag-res-sum">
      <div class="ag-res-sum-head"><span class="ag-res-sum-lbl">Cliente · ${escapeHtml(c.nome)}</span>${tipoBadge}</div>
      <div class="ag-res-sum-txt">${escapeHtml(resumo||'')}</div>
    </div>
    <div class="ag-score"><span class="ag-score-lbl">Completude</span><div class="ag-score-bar"><div class="ag-score-fill" style="width:0%"></div></div><span class="ag-score-val">${score}/${total}</span></div>
    <ul class="ag-checklist">${items}</ul>
    ${okH}${gapsH}${inconsH}${nextH}${opH}`;
  $('bf-result').style.display='';
  requestAnimationFrame(()=>{const f=$('bf-result-content').querySelector('.ag-score-fill');if(f)f.style.width=pct+'%'});
  if(data.onepager){
    const btn=$('bf-op-btn');
    if(btn)btn.onclick=()=>{
      if(!window.Onepager){alert('Módulo de onepager não carregou.');return}
      try{const html=window.Onepager.gerarHTML(data.onepager,c);window.Onepager.abrirParaImpressao(html)}
      catch(e){alert('Erro: '+(e.message||''))}
    };
  }
}

function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

async function atHandleFiles(files){
  $('at-err').textContent='';
  if(!files.length)return;
  for(const f of files){
    if(artePecas.length>=ARTE_MAX){$('at-err').textContent=`Limite de ${ARTE_MAX} peças atingido.`;break}
    if(f.size>ARTE_MAX_BYTES){$('at-err').textContent=`"${f.name}" ultrapassa 20MB.`;continue}
    try{
      if(f.type==='application/pdf')await atProcessPdf(f);
      else if(['image/png','image/jpeg','image/webp'].includes(f.type))await atProcessImg(f);
      else $('at-err').textContent=`Tipo não suportado: ${f.name}`;
    }catch(e){console.error(e);$('at-err').textContent=`Erro em "${f.name}": ${e.message}`}
  }
  atUpdate();
  $('at-thumbs').style.display=artePecas.length===0?'none':'';
}

async function atProcessImg(f){
  const {blob,dataUrl}=await atResize(f);
  atAdd({nomeArquivo:f.name,previewUrl:dataUrl,blob,imageMediaType:'image/jpeg'});
}

async function atProcessPdf(f){
  if(typeof pdfjsLib==='undefined')throw new Error('PDF.js não carregou.');
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;
  const tp=Math.min(pdf.numPages,ARTE_PDF_MAX);
  if(pdf.numPages>ARTE_PDF_MAX)$('at-err').textContent=`"${f.name}" tem ${pdf.numPages} páginas. Usando ${ARTE_PDF_MAX}.`;
  for(let i=1;i<=tp;i++){
    if(artePecas.length>=ARTE_MAX){$('at-err').textContent=`Limite de ${ARTE_MAX} atingido. Algumas páginas ignoradas.`;break}
    const page=await pdf.getPage(i);
    const v1=page.getViewport({scale:1});
    const s=Math.min(ARTE_MAX_SIDE/Math.max(v1.width,v1.height),2);
    const v=page.getViewport({scale:s});
    const c=document.createElement('canvas');c.width=v.width;c.height=v.height;
    const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
    await page.render({canvasContext:ctx,viewport:v}).promise;
    const {blob,dataUrl}=await atCanvasJpeg(c);
    atAdd({nomeArquivo:`${f.name} · pág ${i}`,previewUrl:dataUrl,blob,imageMediaType:'image/jpeg'});
  }
}

async function atResize(f){
  const bm=typeof createImageBitmap==='function'?await createImageBitmap(f):await new Promise((r,j)=>{const i=new Image(),u=URL.createObjectURL(f);i.onload=()=>{URL.revokeObjectURL(u);r(i)};i.onerror=()=>{URL.revokeObjectURL(u);j(new Error('Falha imagem'))};i.src=u});
  const {width:w,height:h}=bm,ms=Math.max(w,h),sc=ms>ARTE_MAX_SIDE?ARTE_MAX_SIDE/ms:1;
  const nw=Math.round(w*sc),nh=Math.round(h*sc);
  const c=document.createElement('canvas');c.width=nw;c.height=nh;
  const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,nw,nh);ctx.drawImage(bm,0,0,nw,nh);
  if(bm.close)bm.close();
  return atCanvasJpeg(c);
}

function atCanvasJpeg(c){
  return new Promise((r,j)=>{
    c.toBlob(b=>{
      if(!b){j(new Error('Falha JPEG'));return}
      const fr=new FileReader();
      fr.onload=()=>r({blob:b,dataUrl:fr.result});
      fr.onerror=()=>j(new Error('Falha ler'));
      fr.readAsDataURL(b);
    },'image/jpeg',ARTE_JPEG_Q);
  });
}

function atAdd({nomeArquivo,previewUrl,blob,imageMediaType}){
  const id=`p-${++arteCtr}`;
  const el=document.createElement('div');el.className='ag-thumb';el.dataset.id=id;
  el.innerHTML=`<img src="${previewUrl}" alt=""><button class="ag-thumb-remove" onclick="atRemove('${id}')">×</button><div class="ag-thumb-label">${escapeHtml(nomeArquivo)}</div>`;
  $('at-thumbs').appendChild(el);
  artePecas.push({id,nomeArquivo,blob,imageMediaType,previewUrl,element:el,status:'idle'});
}

function atRemove(id){
  const i=artePecas.findIndex(p=>p.id===id);if(i===-1)return;
  const p=artePecas[i];if(p.element?.parentNode)p.element.parentNode.removeChild(p.element);
  artePecas.splice(i,1);
  $('at-thumbs').style.display=artePecas.length===0?'none':'';
  atUpdate();
}

async function atSubmit(){
  const k=$('at-client').value,c=window.CLIENTES?.[k];if(!c||!artePecas.length)return;
  const guiaTexto=c.guia&&typeof window.guiaParaTexto==='function'?window.guiaParaTexto(c.guia):null;
  const ctx=$('at-context')?.value.trim()||'';
  $('at-result').style.display='none';$('at-loading').style.display='';
  $('at-submit').disabled=true;$('at-drop').classList.add('disabled');
  atProgress(0,artePecas.length);
  artePecas.forEach(p=>{p.status='processing';p.element.classList.add('processing')});
  let done=0;
  const results=await Promise.all(artePecas.map(async p=>{
    try{
      const imageBase64=await atBlobB64(p.blob);
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent:'arte',client:k,payload:{clienteNome:c.nome,guiaTexto,contexto:ctx,imageBase64,imageMediaType:p.imageMediaType,nomeArquivo:p.nomeArquivo}})});
      const data=await res.json().catch(()=>({}));
      if(!res.ok||!data.ok)throw new Error(data.error||`HTTP ${res.status}`);
      p.status='done';p.element.classList.remove('processing');p.element.classList.add('done');
      return{peca:p,ok:true,data:data.data};
    }catch(e){
      p.status='error';p.element.classList.remove('processing');p.element.classList.add('error');
      return{peca:p,ok:false,error:e.message||'Erro'};
    }finally{done++;atProgress(done,artePecas.length)}
  }));
  $('at-loading').style.display='none';$('at-submit').disabled=false;$('at-drop').classList.remove('disabled');
  atRenderResults(results,c);
  setTimeout(()=>$('at-result').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function atProgress(d,t){
  if($('at-progress'))$('at-progress').textContent=`${d} de ${t} concluídas`;
  if($('at-progress-bar'))$('at-progress-bar').style.width=(t?Math.round(d/t*100):0)+'%';
}

function atBlobB64(b){
  return new Promise((r,j)=>{
    const fr=new FileReader();
    fr.onload=()=>{const s=fr.result||'',i=String(s).indexOf(',');r(i>=0?String(s).slice(i+1):String(s))};
    fr.onerror=()=>j(new Error('Falha'));
    fr.readAsDataURL(b);
  });
}

function atRenderResults(results,c){
  const cnt={aprovado:0,ressalvas:0,reprovado:0,erro:0};
  results.forEach(r=>{if(!r.ok)cnt.erro++;else if(r.data?.status==='aprovado')cnt.aprovado++;else if(r.data?.status==='ressalvas')cnt.ressalvas++;else if(r.data?.status==='reprovado')cnt.reprovado++;else cnt.erro++});
  const sumH=`<div class="ag-arte-sum"><div class="ag-arte-sum-cell"><div class="ag-arte-sum-val ok">${cnt.aprovado}</div><div class="ag-arte-sum-lbl">Aprovadas</div></div><div class="ag-arte-sum-cell"><div class="ag-arte-sum-val warn">${cnt.ressalvas}</div><div class="ag-arte-sum-lbl">Com ressalvas</div></div><div class="ag-arte-sum-cell"><div class="ag-arte-sum-val rep">${cnt.reprovado+cnt.erro}</div><div class="ag-arte-sum-lbl">Reprov / erro</div></div></div>`;
  const cardsH=results.map(r=>atRenderCard(r)).join('');
  $('at-result-content').innerHTML=`<div class="ag-res-sum"><div class="ag-res-sum-head"><span class="ag-res-sum-lbl">Cliente · ${escapeHtml(c.nome)}</span></div><div class="ag-res-sum-txt">${results.length} ${results.length===1?'peça avaliada':'peças avaliadas'} no total.</div></div>${sumH}<div class="ag-arte-cards">${cardsH}</div>`;
  $('at-result').style.display='';
}

function atRenderCard({peca,ok,data,error}){
  if(!ok){
    return `<article class="ag-arte-card error"><div class="ag-arte-card-img"><img src="${peca.previewUrl}" alt=""></div><div class="ag-arte-card-body"><span class="ag-arte-status error"><span class="ag-arte-status-dot"></span>Erro na análise</span><span class="ag-arte-card-name">${escapeHtml(peca.nomeArquivo)}</span><p class="ag-arte-just">${escapeHtml(error||'Erro')}</p></div></article>`;
  }
  const sm={aprovado:{cls:'approved',badge:'approved',lbl:'Aprovado'},ressalvas:{cls:'warn',badge:'warn',lbl:'Aprovado com ressalvas'},reprovado:{cls:'reproved',badge:'reproved',lbl:'Reprovado'}};
  const s=sm[data.status]||sm.reprovado;
  const crit=(data.criterios||[]).map(c=>`<span class="ag-arte-crit-item ${c.ok?'ok':'fail'}" title="${escapeHtml(c.nota||'')}">${escapeHtml(c.nome)}</span>`).join('');
  const md=String(data.justificativa||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  return `<article class="ag-arte-card ${s.cls}"><div class="ag-arte-card-img"><img src="${peca.previewUrl}" alt=""></div><div class="ag-arte-card-body"><span class="ag-arte-status ${s.badge}"><span class="ag-arte-status-dot"></span>${s.lbl}</span><span class="ag-arte-card-name">${escapeHtml(peca.nomeArquivo)}</span><p class="ag-arte-just">${md}</p>${crit?`<div class="ag-arte-crit">${crit}</div>`:''}</div></article>`;
}

function getEligibility(score,blockStatus){
  if(blockStatus&&blockStatus!=='none')return{pct:0,label:'Suspenso',cls:'bg-red',color:'var(--red)'};
  if(score===null||score===undefined)return{pct:0,label:'—',cls:'',color:'var(--txt3)'};
  if(score>=9)return{pct:20,label:'Excelência',cls:'bg-green',color:'var(--prod)'};
  if(score>=7.5)return{pct:15,label:'Destaque',cls:'bg-green',color:'var(--prod)'};
  if(score>=6)return{pct:10,label:'Elegível',cls:'bg-amber',color:'var(--pack)'};
  return{pct:0,label:'Não elegível',cls:'bg-red',color:'var(--red)'};
}

  const p1=parseFloat($('sc-p1')?.value),p2=parseFloat($('sc-p2')?.value),p3=parseFloat($('sc-p3')?.value),p4=parseFloat($('sc-p4')?.value);
  const has1=!isNaN(p1),has2=!isNaN(p2),has3=!isNaN(p3),has4=!isNaN(p4);
  const ring=$('sc-ring'),f=$('sc-formula');
  // Update bars
  if(has1){$('sc-bar1').style.width=Math.min(p1*10,100)+'%';$('sc-v1').textContent=p1.toFixed(1)}else{$('sc-bar1').style.width='0%';$('sc-v1').textContent='—'}
  if(has2){$('sc-bar2').style.width=Math.min(p2*10,100)+'%';$('sc-v2').textContent=p2.toFixed(1)}else{$('sc-bar2').style.width='0%';$('sc-v2').textContent='—'}
  if(has3){$('sc-bar3').style.width=Math.min(p3*10,100)+'%';$('sc-v3').textContent=p3.toFixed(1)}else{$('sc-bar3').style.width='0%';$('sc-v3').textContent='—'}
  if(has4){$('sc-bar4').style.width=Math.min(p4*10,100)+'%';$('sc-v4').textContent=p4.toFixed(1)}else{$('sc-bar4').style.width='0%';$('sc-v4').textContent='—'}
  if(has1&&has2&&has3&&has4){
    const score=p1*0.3+p2*0.25+p3*0.25+p4*0.2;
    const blockVal=$('sc-block')?.value||'none';
    const elig=getEligibility(score,blockVal);
    ring.textContent=score.toFixed(1);
    ring.className='score-ring '+(score>=7?'good':score>=5?'ok':'bad');
    ring.style.width='96px';ring.style.height='96px';ring.style.fontSize='32px';
    f.innerHTML=`${p1}×30% + ${p2}×25% + ${p3}×25% + ${p4}×20% = ${score.toFixed(2)} · <span class="bg ${elig.cls}" style="font-size:10px;vertical-align:middle">${elig.label}</span> <b style="color:${elig.color}">Comissão: ${elig.pct}%</b>`;
    f.style.color=score>=7?'var(--prod)':score>=5?'var(--pack)':'var(--red)';
  }else{
    ring.textContent='—';ring.className='score-ring';ring.style.borderColor='var(--border2)';ring.style.color='var(--txt3)';
    ring.style.width='96px';ring.style.height='96px';ring.style.fontSize='32px';
    const filled=[has1,has2,has3,has4].filter(Boolean).length;
    f.textContent=filled>0?`${filled}/4 pilares preenchidos`:'Preencha as notas para calcular';
    f.style.color='var(--txt3)';
  }
}

async function saveScore(){
  const account=$('sc-account')?.value,month=$('sc-month')?.value;
  const p1=parseFloat($('sc-p1')?.value),p2=parseFloat($('sc-p2')?.value),p3=parseFloat($('sc-p3')?.value),p4=parseFloat($('sc-p4')?.value);
  if(!account||!month||isNaN(p1)||isNaN(p2)||isNaN(p3)||isNaN(p4)){toast('Preencha todos os campos','error');return}
  const data={account_id:account,month,p1_score:p1,p2_score:p2,p3_score:p3,p4_score:p4,block_status:$('sc-block')?.value||'none',updated_at:new Date().toISOString()};
  const p1n=$('sc-p1n')?.value?.trim();if(p1n)data.p1_notes=p1n;
  const p2n=$('sc-p2n')?.value?.trim();if(p2n)data.p2_notes=p2n;
  const p3n=$('sc-p3n')?.value?.trim();if(p3n)data.p3_notes=p3n;
  const p4n=$('sc-p4n')?.value?.trim();if(p4n)data.p4_notes=p4n;
  const bn=$('sc-bn')?.value?.trim();if(bn)data.block_notes=bn;
  if(S.user?.id)data.evaluated_by=S.user.id;
  try{
    // Check if exists by querying Supabase directly
    const existing=await sbGet('score_adm',`account_id=eq.${account}&month=eq.${month}&limit=1`);
    if(existing&&existing.length>0){
      // PATCH existing
      const {account_id,month,...updateData}=data; // remove unique key cols from update
      await sbPatch('score_adm',`id=eq.${existing[0].id}`,updateData);
    }else{
      // POST new
      await sbPost('score_adm',data);
    }
    closeM('m-score');S.scores=await sbGet('score_adm','order=month.desc,account_id');toast('Avaliação salva');
    buildNav();renderPage();
  }catch(e){console.error('saveScore error:',e,data);toast('Erro: '+e.message,'error')}
}

      <tbody>${baSorted.map(([n,h])=>`<tr><td>${n}</td><td class="rt" style="font-weight:700;font-family:var(--mono)">${fH(h)}</td><td class="rt">${totalH>0?(h/totalH*100).toFixed(0):0}%</td></tr>`).join('')}</tbody></table></div></div>
      <div class="tbl"><div class="tbl-h"><h3>Por Função</h3></div><div class="tbl-r"><table><thead><tr><th>Área</th><th class="rt">Horas</th><th class="rt">%</th></tr></thead>
      <tbody>${bfSorted.map(([n,h])=>`<tr><td>${n}</td><td class="rt" style="font-weight:700;font-family:var(--mono)">${fH(h)}</td><td class="rt">${totalH>0?(h/totalH*100).toFixed(0):0}%</td></tr>`).join('')}</tbody></table></div></div>
    </div>`;
}

// CLIENT VIEW — My Productions
async function pgClientProds(el){
  if(!isCli()){el.innerHTML='<div class="empty">Acesso restrito a clientes</div>';return}
  const myReqs=S.av_requests.filter(r=>r.client_id===S.user.client_id);
  
  el.innerHTML=`
    <div class="tbl"><div class="tbl-h"><h3>Produções (${myReqs.length})</h3></div>
    <div class="tbl-r"><table><thead><tr><th>Título</th><th>Tipo</th><th>Status</th><th>Prazo</th></tr></thead>
    <tbody>${myReqs.length?myReqs.map(r=>`<tr><td style="font-weight:600">${r.title}</td><td>${PROD_TYPES[r.prod_type]||r.prod_type}</td><td><span class="st-pill st-${r.status}">${AV_STATUSES[r.status]||r.status}</span></td><td>${fD(r.desired_deadline)}</td></tr>`).join(''):'<tr><td colspan="4" class="empty">Nenhuma produção registrada</td></tr>'}</tbody></table></div></div>`;
}

(async()=>{
  const saved=localStorage.getItem('tgt_hub_user');
  if(saved){
    try{
      S.user=JSON.parse(saved);
      // Verify user still exists
      const check=await sbGet('tt_members',`id=eq.${S.user.id}&is_active=eq.true`);
      if(check.length){S.user=check[0];await initApp();return}
    }catch(e){}
    localStorage.removeItem('tgt_hub_user');
  }
  $('auth-screen').style.display='flex';
})();
