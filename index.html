<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGT Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;
--red:#ED1C24;--red2:#c41920;--red-glow:rgba(237,28,36,.12);
--white:#fff;--txt:#e5e5e5;--txt2:#999;--txt3:#666;
--border:#2a2a2a;--border2:#333;
--t1:#3b82f6;--t3:#a855f7;--t4:#06b6d4;--pack:#f59e0b;--prod:#22c55e;--adm:#6b7280;
--radius:10px;--radius-sm:6px;
--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-box{width:360px;padding:48px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;text-align:center}
.auth-logo{margin-bottom:24px}
.auth-logo svg{width:120px;height:auto}
.auth-title{font-size:13px;color:var(--txt2);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase}
.auth-field{margin-bottom:16px;text-align:left}
.auth-field label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.auth-field input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-size:14px;font-family:var(--font);outline:none;transition:.2s}
.auth-field input:focus{border-color:var(--red)}
.auth-btn{width:100%;padding:14px;background:var(--red);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-top:8px;transition:.2s}
.auth-btn:hover{background:var(--red2)}
.auth-err{color:var(--red);font-size:12px;margin-top:12px;display:none}

/* LAYOUT */
.app{display:none;height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo svg{width:80px;height:auto}
.sb-logo .hub-badge{font-size:10px;font-weight:700;background:var(--red);color:var(--white);padding:2px 8px;border-radius:3px;letter-spacing:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:16px 20px 6px;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--txt2);cursor:pointer;font-size:13px;transition:.15s;border-left:3px solid transparent}
.sb-item:hover{background:var(--bg3);color:var(--txt)}
.sb-item.active{color:var(--white);background:var(--red-glow);border-left-color:var(--red)}
.sb-item svg{width:16px;height:16px;flex-shrink:0}
.sb-item .sb-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--red);color:var(--white);padding:1px 6px;border-radius:10px}
.sb-sub{padding-left:28px}
.sb-sub .sb-item{font-size:12px;padding:8px 20px}
.sb-user{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-uinfo{flex:1;min-width:0}.sb-uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-urole{font-size:10px;color:var(--txt2)}
.sb-logout{background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px}
.sb-logout:hover{color:var(--red)}

.main{margin-left:240px;height:100vh;display:flex;flex-direction:column}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.topbar-date{font-size:12px;color:var(--txt2);font-family:var(--mono)}
.menu-toggle{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg3);border:none;color:var(--txt);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:24px}

/* PILLS */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pill{padding:6px 14px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:.15s;white-space:nowrap;font-family:var(--font)}
.pill:hover{border-color:var(--txt3);color:var(--txt)}
.pill.active{background:var(--red);border-color:var(--red);color:var(--white)}
.pill-dates{display:flex;gap:8px;align-items:center;margin-left:8px}
.pill-dates input{padding:5px 10px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:var(--mono)}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-sel{padding:7px 12px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-family:var(--font);min-width:120px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red)}
.cl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.cv{font-size:28px;font-weight:800;line-height:1}
.cs{font-size:12px;color:var(--txt2);margin-top:6px}
.card-blue::before{background:var(--t1)}.card-purple::before{background:var(--t3)}.card-cyan::before{background:var(--t4)}.card-green::before{background:var(--prod)}.card-amber::before{background:var(--pack)}

/* TABLES */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.tbl-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-h h3{font-size:14px;font-weight:700}
.tbl-r{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.rt{text-align:right}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-r{background:var(--red);color:var(--white)}.btn-r:hover{background:var(--red2)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--txt)}.btn-o:hover{border-color:var(--txt3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{background:none;border:none;color:var(--txt2);cursor:pointer;padding:4px;display:flex;align-items:center}.btn-icon:hover{color:var(--red)}
.btn-del{color:var(--txt3)}.btn-del:hover{color:var(--red)}

/* BADGES */
.bg{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.bg-t1{background:rgba(59,130,246,.15);color:var(--t1)}.bg-t3{background:rgba(168,85,247,.15);color:var(--t3)}
.bg-t4{background:rgba(6,182,212,.15);color:var(--t4)}.bg-pack{background:rgba(245,158,11,.15);color:var(--pack)}
.bg-prod{background:rgba(34,197,94,.15);color:var(--prod)}.bg-adm{background:rgba(107,114,128,.15);color:var(--adm)}
.bg-red{background:rgba(237,28,36,.15);color:var(--red)}.bg-green{background:rgba(34,197,94,.15);color:var(--prod)}
.bg-amber{background:rgba(245,158,11,.15);color:var(--pack)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column}
.modal-lg{max-width:800px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700}
.modal-b{padding:20px;overflow-y:auto;flex:1}
.modal-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* FORMS */
.f-field{margin-bottom:16px}
.f-label{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.f-input,.f-sel,.f-area{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);font-size:13px;font-family:var(--font);outline:none;transition:.2s}
.f-input:focus,.f-sel:focus,.f-area:focus{border-color:var(--red)}
.f-area{min-height:80px;resize:vertical}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* PROGRESS */
.pbar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.pbar-red{background:var(--red)}.pbar-green{background:var(--prod)}.pbar-amber{background:var(--pack)}.pbar-blue{background:var(--t1)}

/* TIMER */
.timer-display{font-size:60px;font-weight:800;font-family:var(--mono);text-align:center;margin:24px 0;letter-spacing:2px}
.timer-display.running{color:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.timer-btn{padding:12px 32px;border-radius:var(--radius);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);transition:.15s}
.timer-start{background:var(--red);color:var(--white)}.timer-start:hover{background:var(--red2)}
.timer-stop{background:var(--bg4);color:var(--txt)}.timer-stop:hover{background:var(--border2)}

/* SCORE */
.score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0}
.score-ring.good{background:rgba(34,197,94,.15);color:var(--prod);border:3px solid var(--prod)}
.score-ring.ok{background:rgba(245,158,11,.15);color:var(--pack);border:3px solid var(--pack)}
.score-ring.bad{background:rgba(237,28,36,.15);color:var(--red);border:3px solid var(--red)}
.score-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-bar label{font-size:12px;color:var(--txt2);width:80px;text-align:right;flex-shrink:0}
.score-bar .sbar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.score-bar .sbar-fill{height:100%;border-radius:3px}
.score-bar .sval{font-size:12px;font-weight:700;width:30px;text-align:right}

/* STATUS PILLS */
.st-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.st-draft{background:rgba(107,114,128,.15);color:var(--adm)}
.st-pending_leader_review{background:rgba(59,130,246,.15);color:var(--t1)}
.st-leader_reviewing{background:rgba(168,85,247,.15);color:var(--t3)}
.st-budget_sent{background:rgba(245,158,11,.15);color:var(--pack)}
.st-account_approved{background:rgba(34,197,94,.15);color:var(--prod)}
.st-account_rejected{background:rgba(237,28,36,.15);color:var(--red)}
.st-scheduling{background:rgba(6,182,212,.15);color:var(--t4)}
.st-scheduled{background:rgba(6,182,212,.25);color:var(--t4)}
.st-in_capture{background:rgba(237,28,36,.15);color:var(--red)}
.st-in_edit{background:rgba(168,85,247,.15);color:var(--t3)}
.st-in_review{background:rgba(245,158,11,.15);color:var(--pack)}
.st-delivered{background:rgba(34,197,94,.15);color:var(--prod)}
.st-cancelled{background:rgba(237,28,36,.08);color:var(--txt3);text-decoration:line-through}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--txt3)}

/* CHECKBOX GRID */
.chk-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chk-item{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;transition:.15s;user-select:none}
.chk-item:hover{border-color:var(--txt3)}
.chk-item.checked{background:var(--red-glow);border-color:var(--red);color:var(--white)}
.chk-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--red);cursor:pointer}
.empty svg{margin-bottom:12px}
.loading{text-align:center;padding:48px;color:var(--txt3)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;animation:fadeIn .3s}
.toast-item.success{border-left:3px solid var(--prod)}.toast-item.error{border-left:3px solid var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
@media(max-width:768px){
.sidebar{transform:translateX(-100%);width:260px}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0}
.menu-toggle{display:flex}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.overlay.show{display:block}
.content{padding:16px}
.cards{grid-template-columns:1fr 1fr}
.f-row,.f-row3{grid-template-columns:1fr}
.timer-display{font-size:40px}
.pills{gap:4px}.pill{padding:5px 10px;font-size:11px}
.modal{max-width:100%;margin:8px}
}
@media(max-width:480px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-wrap" id="auth-screen">
<div class="auth-box">
<div class="auth-logo">
<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg"><text x="0" y="48" fill="#ED1C24" font-family="'IBM Plex Sans',sans-serif" font-weight="800" font-size="52">TGT</text><text x="138" y="22" fill="#999" font-family="'IBM Plex Sans',sans-serif" font-weight="400" font-size="11">A AGÊNCIA</text><text x="138" y="34" fill="#999" font-family="'IBM Plex Sans',sans-serif" font-weight="400" font-size="11">ALÉM DO</text><text x="138" y="46" fill="#999" font-family="'IBM Plex Sans',sans-serif" font-weight="400" font-size="11">MARKETING</text></svg>
</div>

<!-- APP -->

<!-- SIDEBAR -->

<svg viewBox="0 0 130 40" xmlns="http://www.w3.org/2000/svg"><text x="0" y="32" fill="#ED1C24" font-family="'IBM Plex Sans',sans-serif" font-weight="800" font-size="36">TGT</text></svg>

</div>

</div>
</aside>

<!-- MAIN -->
<div class="main">

<div class="topbar-title">

</div>

</div>

</div>
</div>

<div class="modal-ov" id="m-member"><div class="modal"><div class="modal-h"><span class="modal-title" id="m-member-title">Pessoa</span><button class="btn-icon" onclick="closeM('m-member')">✕</button></div><div class="modal-b" id="m-member-body"></div><div class="modal-f"><button class="btn btn-o" onclick="closeM('m-member')">Cancelar</button><button class="btn btn-r" id="m-member-save">Salvar</button></div></div></div>

<div class="modal-ov" id="m-client"><div class="modal"><div class="modal-h"><span class="modal-title" id="m-client-title">Cliente</span><button class="btn-icon" onclick="closeM('m-client')">✕</button></div><div class="modal-b" id="m-client-body"></div><div class="modal-f"><button class="btn btn-o" onclick="closeM('m-client')">Cancelar</button><button class="btn btn-r" id="m-client-save">Salvar</button></div></div></div>

<div class="modal-ov" id="m-equip"><div class="modal"><div class="modal-h"><span class="modal-title" id="m-equip-title">Equipamento</span><button class="btn-icon" onclick="closeM('m-equip')">✕</button></div><div class="modal-b" id="m-equip-body"></div><div class="modal-f"><button class="btn btn-o" onclick="closeM('m-equip')">Cancelar</button><button class="btn btn-r" id="m-equip-save">Salvar</button></div></div></div>

<div class="modal-ov" id="m-req"><div class="modal modal-lg"><div class="modal-h"><span class="modal-title" id="m-req-title">Nova Solicitação</span><button class="btn-icon" onclick="closeM('m-req')">✕</button></div><div class="modal-b" id="m-req-body"></div><div class="modal-f"><button class="btn btn-o" onclick="closeM('m-req')">Cancelar</button><button class="btn btn-r" id="m-req-save">Enviar Solicitação</button></div></div></div>

<div class="modal-ov" id="m-score"><div class="modal modal-lg"><div class="modal-h"><span class="modal-title" id="m-score-title">Avaliação Score ADM</span><button class="btn-icon" onclick="closeM('m-score')">✕</button></div><div class="modal-b" id="m-score-body"></div><div class="modal-f"><button class="btn btn-o" onclick="closeM('m-score')">Cancelar</button><button class="btn btn-r" id="m-score-save">Salvar Avaliação</button></div></div></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG

function getDateRange(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  const day=s=>s.toISOString().substring(0,10);
  const dow=now.getDay(),mon=new Date(now);mon.setDate(d-(dow===0?6:dow-1));
  const ranges={
    today:[day(now),day(now)],
    yesterday:[day(new Date(y,m,d-1)),day(new Date(y,m,d-1))],
    this_week:[day(mon),day(now)],
    last_week:[day(new Date(mon.getTime()-7*864e5)),day(new Date(mon.getTime()-864e5))],
    this_month:[`${y}-${String(m+1).padStart(2,'0')}-01`,day(now)],
    last_month:[`${y}-${String(m).padStart(2,'0')||12}-01`,`${y}-${String(m+1).padStart(2,'0')}-00`].map((v,i)=>{if(i===0){const mm=m===0?12:m;const yy=m===0?y-1:y;return `${yy}-${String(mm).padStart(2,'0')}-01`}const ld=new Date(y,m,0);return day(ld)}),
    this_year:[`${y}-01-01`,day(now)],
    custom:[customFrom||day(now),customTo||day(now)]
  };
  return ranges[dateRange]||ranges.this_month;
}

async function sbGet(table,params=''){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{headers:HDR_R});
  if(!r.ok)throw new Error(`GET ${table}: ${r.status}`);return r.json();
}
async function sbPost(table,data){
  const r=await fetch(`${SB_URL}/${table}`,{method:'POST',headers:HDR,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(`POST ${table}: ${r.status}`);return r.json();
}
async function sbPatch(table,params,data){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{method:'PATCH',headers:HDR,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(`PATCH ${table}: ${r.status}`);return r.json();
}
async function sbDel(table,params){
  const r=await fetch(`${SB_URL}/${table}?${params}`,{method:'DELETE',headers:{...HDR_R,'Prefer':'return=representation'}});
  if(!r.ok)throw new Error(`DEL ${table}: ${r.status}`);return r.json();
}

async function doLogin(){
  const email=$('a-email').value.trim(),pass=$('a-pass').value.trim();
  if(!email||!pass){showErr('Preencha todos os campos');return}
  try{
    // Login by tt_members.login_password
    const emailField=email.includes('@')?'email':'name';
    const members=await sbGet('tt_members',`${emailField}=eq.${encodeURIComponent(email)}&is_active=eq.true`);
    if(!members.length){showErr('Usuário não encontrado');return}
    const u=members[0];
    if(u.login_password!==pass){showErr('Senha incorreta');return}
    S.user=u;
    localStorage.setItem('tgt_hub_user',JSON.stringify(u));
    await initApp();
  }catch(e){showErr('Erro: '+e.message)}
}
function showErr(msg){const el=$('a-err');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000)}

async function doLogout(){
  S.user=null;localStorage.removeItem('tgt_hub_user');
  $('app').style.display='none';$('auth-screen').style.display='flex';
}

async function loadData(){
  try{
    const [members,clients,cats]=await Promise.all([
      sbGet('tt_members','is_active=eq.true&order=team,name'),
      sbGet('tt_clients','is_active=eq.true&order=team,name'),
      sbGet('categories','order=name')
    ]);
    S.members=members;S.clients=clients;S.categories=cats;
    // Load entries for date range
    await loadEntries();
    // Equipment
    try{S.equipment=await sbGet('equipment','order=name')}catch(e){S.equipment=[]}
    // AV Requests
    try{S.av_requests=await sbGet('av_requests','order=created_at.desc')}catch(e){S.av_requests=[]}
    // Score ADM
    try{S.scores=await sbGet('score_adm','order=month.desc,account_id')}catch(e){S.scores=[]}
    // Commission rules
    try{S.commission_rules=await sbGet('commission_rules','order=prod_type')}catch(e){S.commission_rules=[]}

  }catch(e){console.error('loadData:',e);toast('Erro ao carregar dados','error')}
}

async function loadEntries(){
  const [from,to]=getDateRange();
  let params=`started_at=gte.${from}T00:00:00&started_at=lte.${to}T23:59:59&order=started_at.desc`;
  
  if(isCli()){
    // Client sees entries for their company only
    if(S.user.client_id) params=`client_id=eq.${S.user.client_id}&${params}`;
    else{S.entries=[];return}
  }else if(isA()||isPL()){
    // Admin and Prod Leader see all
  }else if(isAcc()){
    // Account sees own entries + entries from their team members
    // For now load all, filter client-side after loading account associations
  }else{
    // User sees only own
    params=`member_id=eq.${S.user.id}&${params}`;
  }
  
  S.entries=await sbGet('tt_time_entries',params);
  
  // Also always load running entries (except for clients)
  if(!isCli()){
    try{
      const runningEntries=await sbGet('tt_time_entries','is_running=eq.true');
      runningEntries.forEach(r=>{if(!S.entries.find(e=>e.id===r.id))S.entries.push(r)});
    }catch(e){}
  }
}

async function startTimer(){
  const client=$('t-client')?.value,action=$('t-action')?.value,desc=$('t-desc')?.value||'';
  if(!client){toast('Selecione um cliente','error');return}
  try{
    const data={member_id:S.user.id,client_id:client,action:action||null,description:desc,started_at:new Date().toISOString(),is_running:true};
    const res=await sbPost('tt_time_entries',data);
    activeEntryId=res[0].id;timerStart=new Date();running=true;timerSec=0;
    toast('Timer iniciado');nav('timer');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function stopTimer(){
  if(!activeEntryId)return;
  try{
    const ended=new Date().toISOString();
    await sbPatch('tt_time_entries',`id=eq.${activeEntryId}`,{is_running:false,ended_at:ended});
    running=false;timerStart=null;activeEntryId=null;timerSec=0;
    await loadEntries();toast('Timer parado');nav('timer');
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function saveManualEntry(){
  const desc=$('me-desc')?.value||'',date=$('me-date')?.value,hours=parseFloat($('me-hours')?.value),client=$('me-client')?.value,action=$('me-action')?.value;
  const memberId=isA()&&$('me-member')?$('me-member').value:S.user.id;
  if(!date||!hours||!client){toast('Preencha data, horas e cliente','error');return}
  try{
    const started=new Date(date+'T09:00:00');const ended=new Date(started.getTime()+hours*3600000);
    await sbPost('tt_time_entries',{member_id:memberId,client_id:client,action:action||null,description:desc,started_at:started.toISOString(),ended_at:ended.toISOString(),is_running:false,hours:hours,duration_minutes:Math.round(hours*60)});
    closeM('m-entry');await loadEntries();toast('Lançamento salvo');renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

async function saveRequest(){
  const title=$('rq-title')?.value,client=$('rq-client')?.value,type=$('rq-type')?.value;
  if(!title||!client||!type){toast('Preencha título, cliente e tipo','error');return}
  const n=v=>{const s=(v||'').trim();return s===''?null:s};
  const ni=v=>{const x=parseInt(v);return isNaN(x)?null:x};
  // Read checked video types
  const vtypes=[...$('rq-vtypes').querySelectorAll('input:checked')].map(i=>i.value).join(', ');
  // Read checked formats
  const formats=[...$('rq-formats').querySelectorAll('input:checked')].map(i=>i.value).join(', ');
  try{
    const body={
      title:title.trim(),
      client_id:client,
      requested_by:S.user.id,
      prod_type:type,
      objective:n($('rq-obj')?.value),
      expected_impact:null,
      video_type:n(vtypes),
      quantity_deliverables:ni($('rq-qty')?.value)||1,
      formats:n(formats),
      desired_deadline:n($('rq-deadline')?.value),
      reference_links:n($('rq-refs')?.value),
      briefing_notes:n($('rq-notes')?.value),
      status:'pending_leader_review'
    };
    await sbPost('av_requests',body);
    closeM('m-req');S.av_requests=await sbGet('av_requests','order=created_at.desc');toast('Solicitação criada');renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

function switchReqTab(tab){
  const dEl=$('req-tab-detail'),bEl=$('req-tab-budget');
  const dTab=$('tab-detail'),bTab=$('tab-budget');
  if(tab==='detail'){if(dEl)dEl.style.display='';if(bEl)bEl.style.display='none';if(dTab)dTab.classList.add('active');if(bTab)bTab.classList.remove('active')}
  else{if(dEl)dEl.style.display='none';if(bEl)bEl.style.display='';if(dTab)dTab.classList.remove('active');if(bTab)bTab.classList.add('active')}
}

function toggleBudgetMode(){
  const ext=$('bg-external')?.checked;
  const extSec=$('bg-ext-section');if(extSec)extSec.style.display=ext?'block':'none';
  const noExt=$('bg-no-ext');if(noExt)noExt.style.display=ext?'none':'';
  calcBudget();
}

function calcBudget(){
  const v=id=>{const el=$(id);return el?parseFloat(el.value)||0:0};
  // Costs
  const costs=v('bg-crew')+v('bg-travel')+v('bg-food')+v('bg-equip')+v('bg-talent')+v('bg-location')+v('bg-edit')+v('bg-motion')+v('bg-color')+v('bg-audio')+v('bg-other');
  const el=id=>$(id);
  if(el('bg-total-cost'))el('bg-total-cost').textContent=fMoney(costs);
  
  const ext=$('bg-external')?.checked;
  const price=ext?v('bg-client-price'):v('bg-suggested-price');
  
  const taxPct=v('bg-tax')/100;
  const taxAmt=price*taxPct;
  if(el('bg-tax-val'))el('bg-tax-val').textContent=fMoney(taxAmt);
  if(el('bg-total-tax'))el('bg-total-tax').textContent=fMoney(taxAmt);
  
  const commAccPct=v('bg-comm-acc')/100;
  const commAccVal=price*commAccPct;
  if(el('bg-comm-acc-val'))el('bg-comm-acc-val').textContent=fMoney(commAccVal);
  
  const commLdrPct=v('bg-comm-ldr')/100;
  const commLdrVal=price*commLdrPct;
  if(el('bg-comm-ldr-val'))el('bg-comm-ldr-val').textContent=fMoney(commLdrVal);
  
  const totalComm=commAccVal+commLdrVal;
  if(el('bg-total-comm'))el('bg-total-comm').textContent=fMoney(totalComm);
  
  const margin=price-costs-taxAmt-totalComm;
  const marginPct=price>0?(margin/price)*100:0;
  if(el('bg-margin-val')){el('bg-margin-val').textContent=fMoney(margin);el('bg-margin-val').style.color=margin>=0?'var(--prod)':'var(--red)'}
  if(el('bg-margin-pct')){el('bg-margin-pct').textContent=marginPct.toFixed(1)+'%';el('bg-margin-pct').style.color=margin>=0?'var(--prod)':'var(--red)'}
  
  // Show eligibility info if available
  const eligEl=el('bg-elig-info');
  if(eligEl&&S.scores.length){
    const curMonth=new Date().toISOString().substring(0,7);
    const accMembers=S.members.filter(m=>m.access_level==='account');
    let eligHtml='';
    accMembers.forEach(a=>{
      const sc=S.scores.find(s=>s.account_id===a.id&&s.month===curMonth);
      if(sc){
        const score=Number(sc.final_score);
        const pct=scorePctDirect(score,sc.block_status);
        const elig=getEligibility(score,sc.block_status);
        eligHtml+=`<span style="font-size:10px;margin-right:12px">${a.name.split(' ')[0]}: <b style="color:${elig.color}">${score.toFixed(1)}</b> → <span class="bg ${elig.cls}" style="font-size:9px">${(pct*100).toFixed(0)}%</span></span>`;
      }
    });
    eligEl.innerHTML=eligHtml;
  }
}

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),calView='month';

async function pgProdCalendar(el){
  const y=calYear,m=calMonth;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const monthName=first.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const today=new Date();
  const todayStr=today.toISOString().substring(0,10);
  
  // Get scheduled productions from av_schedule
  let schedules=[];
  try{schedules=await sbGet('av_schedule','select=*,request:av_requests(title,client_id,status)')}catch(e){}
  
  if(calView==='week'){
    // Week view: current week or week containing today in calMonth
    const ref=new Date(y,m,today.getMonth()===m&&today.getFullYear()===y?today.getDate():1);
    const dow=ref.getDay()||7;
    const weekStart=new Date(ref);weekStart.setDate(ref.getDate()-(dow-1));
    
    const weekDays=[];
    for(let i=0;i<7;i++){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);weekDays.push(d)}
    
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn btn-o btn-sm" onclick="calWeekNav(-1)">◀</button>
          <h3 style="text-transform:capitalize;min-width:200px;text-align:center">${weekDays[0].toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} — ${weekDays[6].toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}</h3>
          <button class="btn btn-o btn-sm" onclick="calWeekNav(1)">▶</button>
        </div>
        <div class="pills" style="margin-bottom:0">
          <div class="pill ${calView==='month'?'active':''}" onclick="calView='month';renderPage()">Mês</div>
          <div class="pill ${calView==='week'?'active':''}" onclick="calView='week';renderPage()">Semana</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:var(--radius);overflow:hidden">
        ${weekDays.map(d=>{
          const ds=d.toISOString().substring(0,10);
          const isToday=ds===todayStr;
          const dayProds=schedules.filter(s=>s.capture_date===ds);
          return`<div style="background:var(--bg2);min-height:200px;padding:10px;${isToday?'border:2px solid var(--red);border-radius:4px;':''}">
            <div style="font-size:11px;color:var(--txt2);margin-bottom:4px">${d.toLocaleDateString('pt-BR',{weekday:'short'})}</div>
            <div style="font-size:18px;font-weight:700;${isToday?'color:var(--red)':''};margin-bottom:8px">${d.getDate()}</div>
            ${dayProds.map(p=>{const req=p.request;return`<div style="padding:4px 8px;background:var(--red-glow);border-left:3px solid var(--red);border-radius:3px;margin-bottom:4px;font-size:11px">${req?.title||'Produção'}</div>`}).join('')}
          </div>`}).join('')}
      </div>`;
    return;
  }
  
  // Month view
  const startDay=(first.getDay()||7);
  const days=[];
  for(let i=2-startDay;i<=last.getDate();i++){
    days.push({num:i,inMonth:i>=1&&i<=last.getDate()});
  }
  while(days.length%7!==0)days.push({num:days.length+2-startDay,inMonth:false});
  
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-o btn-sm" onclick="calNav(-1)">◀</button>
        <h3 style="text-transform:capitalize;min-width:220px;text-align:center">${monthName}</h3>
        <button class="btn btn-o btn-sm" onclick="calNav(1)">▶</button>
        <button class="btn btn-o btn-sm" onclick="calYear=${today.getFullYear()};calMonth=${today.getMonth()};renderPage()">Hoje</button>
      </div>
      <div class="pills" style="margin-bottom:0">
        <div class="pill ${calView==='month'?'active':''}" onclick="calView='month';renderPage()">Mês</div>
        <div class="pill ${calView==='week'?'active':''}" onclick="calView='week';renderPage()">Semana</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border-radius:var(--radius);overflow:hidden">
      ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div style="padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--txt2);background:var(--bg2)">${d}</div>`).join('')}
      ${days.map(d=>{
        const dt=d.inMonth?new Date(y,m,d.num):null;
        const ds=dt?dt.toISOString().substring(0,10):'';
        const isToday=ds===todayStr;
        const dayProds=d.inMonth?schedules.filter(s=>s.capture_date===ds):[];
        return`<div style="padding:8px;min-height:80px;background:${d.inMonth?'var(--bg2)':'var(--bg)'};${isToday?'border:2px solid var(--red);border-radius:4px;':''}">
          <div style="font-size:12px;${d.inMonth?'':'color:var(--txt3)'}${isToday?';color:var(--red);font-weight:700':''};">${d.inMonth?d.num:''}</div>
          ${dayProds.map(p=>{const req=p.request;return`<div style="padding:2px 6px;background:var(--red-glow);border-left:2px solid var(--red);border-radius:2px;margin-top:4px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${req?.title||'Prod'}</div>`}).join('')}
        </div>`}).join('')}
    </div>`;
}

function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderPage()}
function calWeekNav(dir){
  // Shift current reference date by 7 days
  const ref=new Date(calYear,calMonth,new Date().getDate());
  ref.setDate(ref.getDate()+dir*7);
  calYear=ref.getFullYear();calMonth=ref.getMonth();
  renderPage();
}

const MAKE_EXTRAS_WEBHOOK='https://hook.us2.make.com/f8udalcn1tphq9ums02x2aoxgx79r0lm';
const EXTRAS_TYPES=['Vídeo / Audiovisual','Horas adicionais','Projeto avulso','Bonificação gráfica','Bonificação plataforma','Campanha emergencial','Outro'];
const EXTRAS_IMPACT=['Alto — venda direta / diretoria','Médio — sustenta presença','Baixo — ajuste / operacional'];

function getMyEligibility(){
  const curMonth=new Date().toISOString().substring(0,7);
  const sc=S.scores.find(s=>s.account_id===S.user.id&&s.month===curMonth);
  if(!sc)return{pct:0,label:'Sem avaliação',cls:'',color:'var(--txt3)',score:null,commRules:S.commission_rules};
  const elig=getEligibility(Number(sc.final_score),sc.block_status);
  elig.score=Number(sc.final_score);elig.commRules=S.commission_rules;
  return elig;
}

function scorePctDirect(score,blockStatus){
  if(blockStatus&&blockStatus!=='none')return 0;
  if(score===null||score===undefined)return 0;
  if(score>=9)return 0.20;
  if(score>=7.5)return 0.15;
  if(score>=6)return 0.10;
  return 0;
}

function calcExtras(){
  const b=parseFloat($('ex-budget')?.value)||0;
  const ct=parseFloat($('ex-ctime')?.value)||0;
  const cd=parseFloat($('ex-cdiv')?.value)||0;
  const imp=b*0.18;
  const base=Math.max(0,b-imp-ct-cd);
  const elig=getMyEligibility();
  const pct=scorePctDirect(elig.score,elig.blockStatus);
  const acc=base*pct;
  const ldr=base*(pct>0?0.10:0); // líder PROD gets 10% when account is eligible
  const tgt=base-acc-ldr;
  
  if($('ex-pv-b'))$('ex-pv-b').textContent=fMoney(b);
  if($('ex-pv-i'))$('ex-pv-i').textContent='('+fMoney(imp)+')';
  if($('ex-pv-ct'))$('ex-pv-ct').textContent='('+fMoney(ct)+')';
  if($('ex-pv-cd'))$('ex-pv-cd').textContent='('+fMoney(cd)+')';
  if($('ex-pv-base'))$('ex-pv-base').textContent=fMoney(base);
  if($('ex-pv-acc'))$('ex-pv-acc').textContent=fMoney(acc);
  if($('ex-pv-acc-s'))$('ex-pv-acc-s').textContent=`${(pct*100).toFixed(0)}% — Score ${elig.score!==null?elig.score.toFixed(1):'—'}`;
  if($('ex-pv-ldr'))$('ex-pv-ldr').textContent=fMoney(ldr);
  if($('ex-pv-tgt'))$('ex-pv-tgt').textContent=fMoney(tgt);
  if($('ex-pv-tgt-s'))$('ex-pv-tgt-s').textContent=b>0?Math.round(tgt/b*100)+'% do budget':'';
  if($('ex-pv-score')){
    const s=elig.score;
    $('ex-pv-score').textContent=s!==null?s.toFixed(1):'—';
    $('ex-pv-score').style.color=elig.color;
  }
  if($('ex-pv-elig'))$('ex-pv-elig').innerHTML=`<span class="bg ${elig.cls}" style="font-size:10px">${elig.label}</span> <span style="font-weight:700;color:${elig.color}">${(pct*100).toFixed(0)}%</span>`;
  
  let alert='';
  if(pct===0&&b>0)alert=`<div style="background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--red)">Score abaixo de 6.0 ou bloqueio ativo — comissão não será aplicada.</div>`;
  else if(pct===0.10&&b>0)alert=`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--pack)">Score 6.0–7.4 → 10%. Melhore para 7.5+ e suba para 15%.</div>`;
  if($('ex-alert'))$('ex-alert').innerHTML=alert;
}

async function submitExtras(){
  const nome=$('ex-nome')?.value?.trim();
  const cliente=$('ex-cliente')?.value;
  const tipo=$('ex-tipo')?.value;
  const impacto=$('ex-impacto')?.value;
  const b=parseFloat($('ex-budget')?.value)||0;
  const ct=parseFloat($('ex-ctime')?.value)||0;
  const cd=parseFloat($('ex-cdiv')?.value)||0;
  const stake=$('ex-stake')?.value?.trim()||'';
  const obs=$('ex-obs')?.value?.trim()||'';
  if(!nome||!cliente||!tipo||b<=0){toast('Preencha nome, cliente, tipo e budget','error');return}
  const imp=b*0.18;const base=Math.max(0,b-imp-ct-cd);
  const elig=getMyEligibility();
  const pct=scorePctDirect(elig.score,elig.blockStatus);
  const acc=Math.round(base*pct);
  const ldr=Math.round(base*(pct>0?0.10:0));
  const tgt=Math.round(base-acc-ldr);
  const btn=$('ex-submit');btn.disabled=true;
  const toastEl=$('ex-toast');
  toastEl.innerHTML='<div style="background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--t1)">Enviando para o Monday...</div>';
  const itemName=`${S.user.name.split(' ')[0]} · ${cliente} · ${nome}`.replace(/"/g,"'");
  try{
    const payload={
      account:S.user.name.split(' ')[0],
      nome:itemName,
      cliente,tipo,impacto:impacto.split(' — ')[0],
      budget:b,custo_time:ct,custos_div:cd,
      base_comissao:Math.round(base),
      comissao_account:acc,comissao_leader:ldr,margem_tgt:tgt,
      stakeholders:stake,obs,
      score:elig.score,elegibilidade:elig.label,pct_efetivo:pct
    };
    const res=await fetch(MAKE_EXTRAS_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok)throw new Error('Webhook retornou '+res.status);
    toastEl.innerHTML='<div style="background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--prod)">Lançado com sucesso no Monday!</div>';
    setTimeout(()=>toastEl.innerHTML='',4000);
    // Clear form
    ['ex-nome','ex-budget','ex-ctime','ex-cdiv','ex-stake','ex-obs'].forEach(id=>{if($(id))$(id).value=''});
    calcExtras();
  }catch(e){
    toastEl.innerHTML=`<div style="background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.2);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--red)">Erro: ${e.message}</div>`;
  }
  btn.disabled=false;
}

function getEligibility(score,blockStatus){
  if(blockStatus&&blockStatus!=='none')return{pct:0,label:'Suspenso',cls:'bg-red',color:'var(--red)'};
  if(score===null||score===undefined)return{pct:0,label:'—',cls:'',color:'var(--txt3)'};
  if(score>=9)return{pct:20,label:'Excelência',cls:'bg-green',color:'var(--prod)'};
  if(score>=7.5)return{pct:15,label:'Destaque',cls:'bg-green',color:'var(--prod)'};
  if(score>=6)return{pct:10,label:'Elegível',cls:'bg-amber',color:'var(--pack)'};
  return{pct:0,label:'Não elegível',cls:'bg-red',color:'var(--red)'};
}

function calcScoreLive(){
  const p1=parseFloat($('sc-p1')?.value),p2=parseFloat($('sc-p2')?.value),p3=parseFloat($('sc-p3')?.value),p4=parseFloat($('sc-p4')?.value);
  const has1=!isNaN(p1),has2=!isNaN(p2),has3=!isNaN(p3),has4=!isNaN(p4);
  const ring=$('sc-ring'),f=$('sc-formula');
  // Update bars
  if(has1){$('sc-bar1').style.width=Math.min(p1*10,100)+'%';$('sc-v1').textContent=p1.toFixed(1)}else{$('sc-bar1').style.width='0%';$('sc-v1').textContent='—'}
  if(has2){$('sc-bar2').style.width=Math.min(p2*10,100)+'%';$('sc-v2').textContent=p2.toFixed(1)}else{$('sc-bar2').style.width='0%';$('sc-v2').textContent='—'}
  if(has3){$('sc-bar3').style.width=Math.min(p3*10,100)+'%';$('sc-v3').textContent=p3.toFixed(1)}else{$('sc-bar3').style.width='0%';$('sc-v3').textContent='—'}
  if(has4){$('sc-bar4').style.width=Math.min(p4*10,100)+'%';$('sc-v4').textContent=p4.toFixed(1)}else{$('sc-bar4').style.width='0%';$('sc-v4').textContent='—'}
  if(has1&&has2&&has3&&has4){
    const score=p1*0.3+p2*0.25+p3*0.25+p4*0.2;
    const blockVal=$('sc-block')?.value||'none';
    const elig=getEligibility(score,blockVal);
    ring.textContent=score.toFixed(1);
    ring.className='score-ring '+(score>=7?'good':score>=5?'ok':'bad');
    ring.style.width='96px';ring.style.height='96px';ring.style.fontSize='32px';
    f.innerHTML=`${p1}×30% + ${p2}×25% + ${p3}×25% + ${p4}×20% = ${score.toFixed(2)} · <span class="bg ${elig.cls}" style="font-size:10px;vertical-align:middle">${elig.label}</span> <b style="color:${elig.color}">Comissão: ${elig.pct}%</b>`;
    f.style.color=score>=7?'var(--prod)':score>=5?'var(--pack)':'var(--red)';
  }else{
    ring.textContent='—';ring.className='score-ring';ring.style.borderColor='var(--border2)';ring.style.color='var(--txt3)';
    ring.style.width='96px';ring.style.height='96px';ring.style.fontSize='32px';
    const filled=[has1,has2,has3,has4].filter(Boolean).length;
    f.textContent=filled>0?`${filled}/4 pilares preenchidos`:'Preencha as notas para calcular';
    f.style.color='var(--txt3)';
  }
}

async function saveScore(){
  const account=$('sc-account')?.value,month=$('sc-month')?.value;
  const p1=parseFloat($('sc-p1')?.value),p2=parseFloat($('sc-p2')?.value),p3=parseFloat($('sc-p3')?.value),p4=parseFloat($('sc-p4')?.value);
  if(!account||!month||isNaN(p1)||isNaN(p2)||isNaN(p3)||isNaN(p4)){toast('Preencha todos os campos','error');return}
  const final_score=Math.round((p1*0.3+p2*0.25+p3*0.25+p4*0.2)*100)/100;
  const data={account_id:account,month,p1_score:p1,p1_notes:$('sc-p1n')?.value||null,p2_score:p2,p2_notes:$('sc-p2n')?.value||null,p3_score:p3,p3_notes:$('sc-p3n')?.value||null,p4_score:p4,p4_notes:$('sc-p4n')?.value||null,final_score,block_status:$('sc-block')?.value||'none',block_notes:$('sc-bn')?.value||null,evaluated_by:S.user.id,updated_at:new Date().toISOString()};
  try{
    // Upsert: try patch first, then post
    const existing=S.scores.find(s=>s.account_id===account&&s.month===month);
    if(existing)await sbPatch('score_adm',`id=eq.${existing.id}`,data);
    else await sbPost('score_adm',data);
    closeM('m-score');S.scores=await sbGet('score_adm','order=month.desc,account_id');toast('Avaliação salva');renderPage();
  }catch(e){toast('Erro: '+e.message,'error')}
}

    S.user.login_password=newPass;
    localStorage.setItem('tgt_hub_user',JSON.stringify(S.user));
    $('pf-oldpass').value='';$('pf-newpass').value='';$('pf-newpass2').value='';
    toast('Senha alterada com sucesso');
  }catch(e){toast('Erro: '+e.message,'error')}
}

// ═══════════════════════════════════════════════
// CLIENT VIEW — Dashboard (external client users)
// ═══════════════════════════════════════════════
async function pgClientView(el){
  if(!isCli()){el.innerHTML='<div class="empty">Acesso restrito a clientes</div>';return}
  const clientCompany=S.clients.find(c=>c.id===S.user.client_id);
  if(!clientCompany){el.innerHTML='<div class="empty">Nenhuma empresa vinculada ao seu perfil. Contate o administrador.</div>';return}
  
  const myEntries=S.entries.filter(e=>e.client_id===S.user.client_id&&!e.is_running);
  const totalH=myEntries.reduce((s,e)=>s+(e.hours||0),0);
  const target=Number(clientCompany.target_hours_month)||0;
  const pct=target>0?totalH/target*100:0;
  
  // By action (no names — privacy)
  const byAction={};myEntries.forEach(e=>{const a=e.action||'Geral';byAction[a]=(byAction[a]||0)+(e.hours||0)});
  const baSorted=Object.entries(byAction).sort((a,b)=>b[1]-a[1]);
  
  // By function (job_title instead of name)
  const byFunction={};myEntries.forEach(e=>{const m=S.members.find(mm=>mm.id===e.member_id);const fn=m?m.job_title||'Equipe':'Equipe';byFunction[fn]=(byFunction[fn]||0)+(e.hours||0)});
  const bfSorted=Object.entries(byFunction).sort((a,b)=>b[1]-a[1]);
  
  el.innerHTML=datePillsHTML()+`
    <div style="margin-bottom:20px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px">${clientCompany.name.charAt(0)}</div>
      <div><div style="font-weight:700;font-size:16px">${clientCompany.name}</div><div style="font-size:12px;color:var(--txt2)">Horas contratadas: ${target?fH(target)+'/mês':'Sob demanda'}</div></div>
    </div>
    <div class="cards">
      <div class="card"><div class="cl">Horas consumidas</div><div class="cv">${fH(totalH)}</div>${target?`<div class="pbar"><div class="pbar-fill ${pct>100?'pbar-red':pct>80?'pbar-amber':'pbar-green'}" style="width:${Math.min(pct,100)}%"></div></div><div class="cs">${pct.toFixed(0)}% do pacote</div>`:''}</div>
      <div class="card card-blue"><div class="cl">Lançamentos</div><div class="cv">${myEntries.length}</div></div>
      <div class="card card-green"><div class="cl">Atividades</div><div class="cv">${Object.keys(byAction).length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="tbl"><div class="tbl-h"><h3>Por Atividade</h3></div><div class="tbl-r"><table><thead><tr><th>Ação</th><th class="rt">Horas</th><th class="rt">%</th></tr></thead>
      <tbody>${baSorted.map(([n,h])=>`<tr><td>${n}</td><td class="rt" style="font-weight:700;font-family:var(--mono)">${fH(h)}</td><td class="rt">${totalH>0?(h/totalH*100).toFixed(0):0}%</td></tr>`).join('')}</tbody></table></div></div>
      <div class="tbl"><div class="tbl-h"><h3>Por Função</h3></div><div class="tbl-r"><table><thead><tr><th>Área</th><th class="rt">Horas</th><th class="rt">%</th></tr></thead>
      <tbody>${bfSorted.map(([n,h])=>`<tr><td>${n}</td><td class="rt" style="font-weight:700;font-family:var(--mono)">${fH(h)}</td><td class="rt">${totalH>0?(h/totalH*100).toFixed(0):0}%</td></tr>`).join('')}</tbody></table></div></div>
    </div>`;
}

// CLIENT VIEW — My Productions
async function pgClientProds(el){
  if(!isCli()){el.innerHTML='<div class="empty">Acesso restrito a clientes</div>';return}
  const myReqs=S.av_requests.filter(r=>r.client_id===S.user.client_id);
  
  el.innerHTML=`
    <div class="tbl"><div class="tbl-h"><h3>Produções (${myReqs.length})</h3></div>
    <div class="tbl-r"><table><thead><tr><th>Título</th><th>Tipo</th><th>Status</th><th>Prazo</th></tr></thead>
    <tbody>${myReqs.length?myReqs.map(r=>`<tr><td style="font-weight:600">${r.title}</td><td>${PROD_TYPES[r.prod_type]||r.prod_type}</td><td><span class="st-pill st-${r.status}">${AV_STATUSES[r.status]||r.status}</span></td><td>${fD(r.desired_deadline)}</td></tr>`).join(''):'<tr><td colspan="4" class="empty">Nenhuma produção registrada</td></tr>'}</tbody></table></div></div>`;
}

// ═══════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════
(async()=>{
  const saved=localStorage.getItem('tgt_hub_user');
  if(saved){
    try{
      S.user=JSON.parse(saved);
      // Verify user still exists
      const check=await sbGet('tt_members',`id=eq.${S.user.id}&is_active=eq.true`);
      if(check.length){S.user=check[0];await initApp();return}
    }catch(e){}
    localStorage.removeItem('tgt_hub_user');
  }
  $('auth-screen').style.display='flex';
})();
</script>
